rlassen."}]}, "Spr 18,12": {"k": "Vor dem Verderben wird das Herz eines Menschen hoch- mütig , aber vor der Ehre <kommt> Demut . Ehre kann man sich nicht nehmen, sie kommt zum Demütigen. Wer sich selbst zurücknehmen kann und die Nöte der anderen so ernst nimmt, wie seine eigenen, den wird man schätzen und für seinen Einsatz auszeichnen. Ein solches Leben gelingt – vor den Menschen und vor Gott! Das Gegenteil von Demut ist Hochmut. Wenn das Herz eines Men- schen, d.h. sein Denken arrogant wird, er sich für etwas Besseres hält, auf die Schwachen herabblickt und ihnen nicht mit Barmher- zigkeit begegnet, dann ist das ein erster Schritt Richtung Verderben. Selbstüberschätzung, Eigenliebe und Unbelehrbarkeit sind die Vor- boten des Untergangs. Wenn Salomo in Sprüche 4,23 darauf besteht, dass man sein Herz (= Denken) behütet und zwar mehr als alles, was zu bewahren ist , dann ist der Hochmütige dazu nicht bereit. Sein ver- queres Denken führt ihn ins Unglück, denn wer die Lüge glaubt – und sei es die Lüge von der eigenen Überlegenheit – der wird mit ihr untergehen. Bist du ein demütiger Mensch? Siehst du die Nöte von anderen und bist du bereit, im Rahmen deiner Möglichkeiten zu helfen? Wie gehst du mit dem Gedanken um, etwas Besseres zu sein ?", "f": [{"n": "764", "t": "W. Mannes"}, {"n": "765", "t": "S. a. die Anmerkungen zu Sprüche 16,18"}, {"n": "766", "t": "S. a. die Anmerkungen zu Sprüche 15,33"}, {"n": "767", "t": "Bitte denke nicht, dass es richtig wäre, sich für den letzten Depp zu halten! Du sollst von dir so denken, wie es richtig ist (vgl. Römer 12,3). Freue dich über das, was du kannst und worin du gut bist, aber werde nicht arrogant! Ein gesundes Selbstwertgefühl gepaart mit Sozialkompetenz und Nächstenliebe, das macht einen reifen Christen aus."}, {"n": "768", "t": "W. Wort, Sache"}, {"n": "769", "t": "Gerade für Ehen, die etwas schwieriger sind, kann sogar noch ein Schritt dazwischen liegen: Das Wiederholen des Gehörten mit eigenen Worten („Schatz, habe ich dich eben richtig verstanden? Du hast gesagt, dass...“). Es ist total wichtig, dass Eheleute nicht anei- nander vorbeireden und genau verstehen, was der Partner meint. Sonst streitet man sich womöglich über Dinge, die der andere nie so gemeint, man selbst aber so gehört hat!"}]}, "Spr 21,4": {"k": "Ein herablassender Blick und Hochmut des Herzens, die Leuchte der Gesetzlosen ist Sünde. Der Böse schaut auf andere Menschen herab, aber stolze Augen sind Gott ein Gräuel (Sprüche 6,16.17). Der Hochmut des Herzens steht für eine überhebliche Haltung, die nur auf den eigenen Vorteil aus ist. Wenn mit der Leuchte die Hoffnung des Menschen gemeint ist (vgl. 2Samuel 21,17), dann fasst die zweite Zeile die erste zusam- men: Die einzige Hoffnung, die der Gesetzlose hat, ist ein Leben in der Sünde. Gibt es Menschen(gruppen), die du verachtest und auf die du herabschaust? Fällt es dir leicht, auf deinen eigenen Vorteil zu verzichten?", "f": [{"n": "867", "t": "W. Höhe der Augen"}, {"n": "868", "t": "W. Weite, Breite. Das weite Herz (Psalm 101,5) oder die weite Seele (Sprüche 28,25) sind auf das Böse und auf Streit aus. Vielleicht steckt dahinter der Gedanke des Aufgebla- senseins."}, {"n": "869", "t": "O. der Neubruch. Schwer zu entscheiden, weil der Begriff tatsächlich beides bedeutet und in allen anderen Stellen die Leuchte nur bildhaft für Nachkommen steht. Allerdings kann diese Art von „Leuchte“ auch als Hoffnung interpretiert werden."}, {"n": "870", "t": "Wenigstens um Ausreden zu erfinden (Vgl. Sprüche 26,13.16)."}, {"n": "871", "t": "Deshalb ist der Fleißige auch nicht der Workaholic, dessen Leben sich um die Arbeit dreht! Weil er nicht nur fleißig ist, sondern auch weise, weiß er darum, dass echter Über- fluss sich auf alle Bereiche des Lebens (Besitz, Beziehungen, Wissen, Einfluss...) beziehen muss."}]}, "Spr 27,2": {"k": "Es rühme dich ein anderer und nicht dein Mund, ein Fremder und nicht deine Lippen. „Eigenlob stinkt, Freundes Lob hinkt, fremdes Lob klingt!“, sagt das Sprichwort. Eigenlob ist das Kennzeichen der Stolzen und die wer- den von Gott verachtet (Sprüche 6,17; 14,25; 16,5) und von Men- schen gemieden (Sprüche 8,13). Wer sich selbst ins rechte Licht rückt, der wird in den Augen seiner Zuhörer nicht größer, sondern kleiner! Wer immer darauf hinweisen muss, was er alles geleistet und getan hat, gewinnt keine Anerkennung, sondern verliert sie letztendlich. Sein Ruf wird nicht besser, sondern schlechter! Der Weise gibt nicht mit seinen Erfolgen an, sondern überlässt es ande- ren, ein Loblied zu singen. Wenn man uns zur Angeberei zwingt, dann sollten wir unsere Schwachheit ins Zentrum stellen, so wie Paulus das in der Auseinandersetzung mit den falschen Aposteln tut (2Korinther 11,31; 12,5), damit alle Welt sehen kann, wie groß der Gott ist, der hinter uns steht! Neigst du zur Angeberei? Siehst du das Großartige in anderen Menschen und bist du bereit, sie dafür vor anderen zu loben?", "f": [{"n": "1010", "t": "Wörtlich: Ärger des Narren . Hier entweder der Ärger, der durch einen Narren verur- sacht wird, oder der Ärger, der im Naturell eines Narren angelegt ist."}, {"n": "1011", "t": "Die Eifersucht des Ehemanns auf einen Nebenbuhler ist gut, der Neid von Saul auf Da- vid war böse."}]}, "Spr 29,23": {"k": "Der Hochmut eines Menschen wird ihn erniedrigen; wer aber niedrigen Geistes ist, wird Ehre erlangen. Der Hochmütige hält sich für besonders und für unantastbar. Er glaubt, ohne Gott leben zu können und er verachtet gesellschaftliche Konventionen und Moral. Er ist sich selbst der Nächste. Die Folge dieser Lebenseinstellung ist Erniedrigung. Der Hochmütige, der sich gegen Gott stellt und die Bedürfnisse seiner Mitmenschen mit Fü- ßen tritt, wird sich selbst mit dieser Haltung ins Abseits stellen und der Verachtung aussetzen. Der Demütige, der mit dem niedrigen Geist , weiß um seine Abhän- gigkeit von Gott. Er ist grundsätzlich für den Nächsten, will ihm nicht schaden, sondern kümmert sich um dessen Bedürfnisse (vgl. Philipper 2,3.4). Diese Haltung bringt ihm Ehre bei Gott und den Menschen ein. Welche Größen aus Politik und Showbusiness fallen dir ein, de- ren Hochmut sie zu Fall gebracht hat? Hast du einen niedrigen Geist und ein Interesse an den Bedürfnissen deiner Mitmen- schen?", "f": [{"n": "1078", "t": "Oder: Seele"}, {"n": "1079", "t": "Entweder ist die Furcht vor einem anderen Menschen oder die ansteckende Furcht eines anderen Menschen im Blick. Beide Interpretationen machen keinen großen Unter- schied."}]}, "Spr 10,2": {"k": "Durch Gesetzlosigkeit erworbene Schätze nützen nichts, aber Gerechtigkeit errettet vom Tod. Schätze können ihren Besitzer vor zukünftigen Schwierigkeiten be- wahren, aber wurden sie durch Gesetzlosigkeit , d.h. durch sündiges Verhalten, gewonnen, dann sind sie nicht von ewigem Wert ( nützen nichts ). Sie können ihrem Besitzer keinen Vorteil in den Augen Gottes verschaffen. Gerechtigkeit ist in diesem Vers das Gegenstück zu durch Gesetzlo- sigkeit erworbene Schätze . Im Blick ist also der gerechte Umgang mit Geld, z.B. großzügiges Geben (Daniel 4,24, Matthäus 6,1-4). Der Gerechte gibt gern und errettet sein Leben vom Tod . Wie schon an anderer Stelle gezeigt ist, der Begriff Tod nicht mit dem klini- schen Tod identisch, sondern das Gegenstück zum ewigen Leben. Niemand kann mit noch so viel Geld ewiges Leben kaufen (Psalm 49,8-10), aber praktische Gerechtigkeit als Ausdruck persönlicher Gottesfurcht überwindet den Tod durch Entrückung/Auferstehung (Psalm 49,4.16). Kann man an deinem gerechten Umgang mit Geld erkennen, dass du auf dem Weg in den „Himmel“ bist?", "f": [{"n": "402", "t": "W. Schätze der Gesetzlosigkeit"}, {"n": "403", "t": "Der Begriff nützen steht in den prophetischen Texten und der Weisheitsliteratur zu- meist für eine weitreichende, im absoluten Sinn gemeinte Nützlichkeit (vgl. 1Samuel 12,21; Hiob 35,3). Natürlich „nützen“ durch Gesetzlosigkeit erworbene Schätze , wenn man davon ein neues Auto kaufen will, aber sie bringen keinen Schutz am „Tag des Zorns“ (Sprüche 11,4)."}, {"n": "404", "t": "Vgl. „Exkurs: Das Leben“."}]}, "Spr 11,4": {"k": "Vermögen nützt nichts am Tag des Zorns, aber Gerechtig- keit errettet vom Tod. Dass Gerechtigkeit vom Tod errettet , wissen wir schon aus Sprüche 10,2b. Die Parallele Tag des Zorns und Tod lässt darauf schließen, dass Salomo das Gericht Gottes meint, denn nur Gott ist Herr über Leben und Tod . Am Tag des Gerichts schützt kein noch so großes Vermögen, sondern nur Gerechtigkeit . Finanzstärke gibt keine abso- lute Sicherheit.", "f": [{"n": "448", "t": "S. Anmerkungen zu Sprüche 2,7"}, {"n": "449", "t": "S. Anmerkungen zu Sprüche 2,22"}, {"n": "450", "t": "Im Blick auf Menschen muss „Vollkommenheit“ als Reife verstanden werden. Die Voll- kommenen sind nicht sündlos (vgl. Prediger 7,20), sondern aufrichtig um das Gute bemüht, ohne offensichtliche, grobe Sünde und verbinden ein tiefes geistliches Wissen mit Erfah- rung und Hingabe in der Umsetzung."}, {"n": "451", "t": "Zwei Bilder sind m.E. im Blick: der gerade Weg als Gegenstück zum gewundenen, ver- schlungenen, der nicht zum Ziel führt (oder wenn überhaupt nur über Umwege), und der „ebene“ Weg, der keine Hindernisse besitzt und auf dem man schnell und problemlos vor- wärts kommt. Vielleicht kann man beide Ideen verbinden und sagen, dass der gerade Weg schnell zum Ziel führt."}, {"n": "452", "t": "Auch wenn es daneben noch ein dem Menschen eigenes, grundsätzliches Wissen um Gut und Böse gibt (vgl. Römer 2,14.15) und wenn man bestimmte geistliche Prinzipien di- rekt aus der Schöpfung (Römer 1,20) sowie der Geschichte (Haggai 1,7) und der Kunst (Apostelgeschichte 17,28) ableiten kann."}]}, "Spr 10,3": {"k": "Der HERR lässt die Seele des Gerechten nicht hungern, aber die Gier der Gesetzlosen stößt er hinweg. Dieser Vers schließt an den vorangehenden an und zeigt die theolo- gische Basis, die hinter Sprüche 10,2 steht. Die Seele des Gerechten ist Gott wichtig. Er lässt sie nicht hungern , d.h. er gibt ihr, wonach sie im Innersten verlangt und das ist die Ge- wissheit, dass der Tod überwunden ist und nicht das letzte Wort hat. Die Gier der Gesetzlosen , die in dieser Welt alles für sich will und am besten noch das ewige Leben dazu, ist Gott zuwider. Solche Men- schen stößt er weg. Die Gesetzlosen werden von Gier getrieben. Sie folgen den Lüsten und Wünschen ihres bösen Herzens und landen bei Lüge, Bosheit, Betrug, Unmoral, Unterdrückung, Perversion usw. Solche Menschen mögen auf der Erde Erfolg haben, aber sie gehen ewigem Mangel entgegen (s.a. Sprüche 11,6). Am Ende sind die Gerechten satt und die Gesetzlosen werden hun- gern. Wonach bist du „gierig“? Sehnst du dich vor allem nach Dingen, die du für dich willst (Selbstverwirklichung) oder freust du dich mehr auf das, was Gott für dich hat (Selbstverleugnung)?", "f": []}, "Spr 10,9": {"k": "Wer in seiner Vollkommenheit wandelt, wandelt sicher; wer aber seine Wege krümmt, wird bekannt werden. Unter Vollkommenheit verstehen die Sprüche nicht Perfektion, son- dern moralische Integrität und persönliche Reife, die so sehr Teil des Charakters sind, dass ihnen notwendiger Weise ein gottgefälli- ges Verhalten entspringen. Der Mensch, der in seiner Vollkommen- heit wandelt , lebt als einer, der Gott und seinen Geboten uneinge- schränkt und von ganzem Herzen folgt. Wer auf krummen Wege n geht, folgt nicht Gott, sondern lebt als Ego- ist, der seine eigenen Wünsche über die Bedürfnisse der Gesell- schaft und über die Gebote Gottes stellt. Ein solcher Mensch wir be- kannt werden , d.h. niemand kann Bosheit für immer verstecken. Entweder wird sie schon diesseits spätestens aber jenseits der Ewigkeit offenbar (vgl. 1Timotheus 5,24). Während der Gerechte keine Angst vor dem menschlichen oder göttlichen Gericht zu haben braucht und sicher ist, sollte der Unge- rechte damit rechnen, dass er spätestens Gott bekannt ist und für seine bösen Taten gerichtet wird. Wie würden deine Freunde von dir denken, wenn sie dein gan- zes Leben, also auch die Schattenseiten kennen würden?", "f": [{"n": "414", "t": "Mit dem Bild „Weg“ eines Menschen beschreiben die Sprüche den Lebensweg, die Le- bensführung und die daraus erwachsenden Konsequenzen (vgl. Anmerkungen zu Sprüche 1,15)."}]}, "Spr 11,1": {"k": "Trügerische Waagschalen sind dem HERN ein Gräuel, aber volles Gewicht ist sein Wohlgefallen. Trügerische Waagschalen , bezeichnen einen Handwaage, mit der der Verkäufer den Käufer betrügt. Das kann auf verschieden Weise geschehen (z.B. durch falsche Gewichte , einen gebogenen Balken oder falsche Handhabung), ist aber in jedem Fall Betrug und dem HERRN ein Gräuel . Gräuel und Wohlgefallen bilden ein Gegensatzpaar. Der Begriff Gräuel bezeichnet Verhaltensweisen, die Gott nicht ausstehen kann und die sein Gericht nach sich ziehen. Gott ist kein distanzierter Be- trachter, sondern aktiv an jeder wirtschaftlichen Transaktion inte- ressiert. Wer sein Wohlgefallen erlangen will, muss auch im Blick auf die eigenen Geschäftspraktiken absolut ehrlich sein und darf nie- manden übervorteilen. Gab es schon einmal eine Situation in deinem Leben, dass du einen anderen Menschen betrogen hast? Wenn ja, ist die Sache in Ordnung gebracht?", "f": [{"n": "443", "t": "Sprüche 25,13 verbietet das Mitführen von zweierlei Gewichtssteinen, wobei ein (zu) schwerer zum Einkaufen und ein (zu) leichter zum Verkaufen verwendet wurde. Wegen"}, {"n": "444", "t": "bei einer Balkenwaage."}, {"n": "445", "t": "O. Stolz, Hochmut, Vermessenheit; s.a. die Erklärungen zu Sprüche 13,10!"}, {"n": "446", "t": "Hinweis: Übermut darf nicht mit „Mut“ verwechselt werden. Wir sind noch lange nicht stolz, wenn wir uns an schwierige Aufgaben herantrauen und uns etwas zutrauen. Eine milde Form der Selbstüberschätzung ist durchaus positiv, wenn sie uns dazu bringt, unsere wahren Grenzen kennen zu lernen. In gleicher Weise darf Bescheidenheit nicht mit „Ängst- lichkeit“ verwechselt werden. Der Furchtsame mag nicht zum Hochmut neigen, aber er ist in seiner freiwilligen Selbstbegrenzung nicht weise, weil er sich weigert, seine Fähigkeiten in Konfrontation mit der Welt kennen zu lernen (vgl. Matthäus 25,25 der Knecht, der sein Talent aus Angst vergräbt)."}]}, "Spr 21,8": {"k": "Vielgewunden ist der Weg des schuldbeladenen Mannes; der Lautere aber, sein Tun ist gerade. Der schuldbeladene Mann muss einen vielgewundenen Weg ge- hen, d.h. er bewegt sich wie in einem Labyrinth und weiß nicht, ob er ans Ziel kommt. Sein Leben ist nicht kalkulierbar, hat keine Ste- tigkeit und er wird durch seine moralischen Fehlentscheidungen immer wieder in seiner eigenen Entwicklung gebremst. Die „leicht umstrickende Sünde“ (Hebräer 12,1) erweckt oft den Anschein, als könne im Leben ohne negative Konsequenzen mitnehmen , aber dem ist nicht so – bei Weitem nicht! Sünde macht den eigenen Le- bensweg immer kaputt, sie zieht in die falsche Richtung und zwingt uns somit ihren Weg auf. Selbst da, wo Sünde schnell bekannt und bereinigt wird, hat sie ihre Spuren im Leben eines Menschen bereits hinterlassen und seinen Weg geprägt. Sünde raubt Lebenskraft und Zielstrebigkeit, weil sie uns immer wieder zu Umwegen zwingt. Hat Sünde mich vom geraden Lebensweg abgebracht, muss ich erst ein- mal wieder zurückfinden. Das Tun des Mannes, der die Sünde meidet, ist gerade , d.h. moralisch in Ordnung, aber auch zielführend . Er kommt auf direktem Weg ans Ziel. Erinnerst du dich an Umwege, die dein Leben aufgrund von Sünde genommen hat? Hast du eine halbwegs klare Vorstel- lung davon, wohin du willst?", "f": [{"n": "874", "t": "O. falsch, unehrlich"}, {"n": "875", "t": "eine duplizierte Form des Verbs für wenden"}, {"n": "876", "t": "Quasi als eine Art Bonus"}, {"n": "877", "t": "Die Betonung leite ich aus dem Parallelismus mit „gewunden“ ab. Beide Glieder des Pa- rallelismus beeinflussen sich in ihrer Bedeutung. Gerade verleiht dem gewunden eine mo- ralische, gewunden verleiht dem gerade eine zielführende Komponente."}, {"n": "878", "t": "W. eine Frau der Streitigkeiten"}, {"n": "879", "t": "Kriterien für eine gute Ehefrau: Sprüche 12,4: tüchtig; 14,1: weise; 31,10ff: tüchtig, ver- trauenswürdig, gütig, verantwortungsvoll, fleißig, hat Überblick, geschäftstüchtig, stark, barmherzig, vorausschauend, ein Schmuck für ihren Mann, kräftig, würdevoll, zuversicht- lich, weise, freundlich und sie fürchtet Gott."}]}, "Spr 28,6": {"k": "Besser ein Armer, der in seiner Vollkommenheit wandelt, als ein Verkehrter, der auf zwei Wegen <geht> und dabei reich ist. Der Spruch zeigt auf, wie viel besser moralische Integrität als mate- rieller Reichtum ist. Mit „Vollkommenheit“ wird die Reife, die Klugheit und die Bewäh- rung des gläubigen Armen beschrieben, der, obwohl notleidend, Gottes Gebote nicht verlässt. Er ist trotz seiner Armut besser dran als einer, der reich ist, sich aber verkehrt verhält. Wohlstand ist kein guter Grund, ungerecht zu leben. Der Reiche ist hier einer, der „auf zwei Wegen geht“. Das Bild ist nicht ganz so leicht zu verstehen. Mit Blick auf das Falsche seines Verhaltens stehen die beiden Wege, die der Verkehrte wählt, wohl für den falschen Weg, den er einschlägt und den geschönten Weg, den er seiner Umgebung zeigt. Sein Lebensstil ist von Unwahrhaf- tigkeit und Schönfärberei geprägt. Er will Reichtum um jeden Preis, auch auf Kosten der Wahrheit und der Gerechtigkeit. Wie weit würdest du gehen, um reich zu werden? Wie wichtig ist dir Wohlstand? Macht dir die Vorstellung ein armer Gerech- ter zu sein not?", "f": [{"n": "1041", "t": "Siehe auch die Anmerkungen zu Sprüche 2,7."}, {"n": "1042", "t": "Ein Schlemmer ist ein Mensch, der beim Essen kein Maß findet. Der Schlemmer ist das Gegenstück zum Säufer. Sein Leben ist von Genusssucht, Verschwendung, Hemmungslo- sigkeit und Unbeherrschtheit geprägt. Er will alles, sofort und macht sich keine Gedanken über die Konsequenzen."}]}, "Spr 12,16": {"k": "Der Ärger des Narren tut sich am selben Tage kund, aber der Kluge verbirgt die Beleidigung . Der Kluge weiß nicht nur durch sein Reden, Gutes zu tun, er weiß auch, wann es besser ist, den Mund zu halten. Selbstbeherrschung im Angesicht einer Beleidigung ist etwas sehr Weises! Während der Ärger den Narren dazu bringt, sich aufzuregen, „an die Decke zu ge- hen“ oder wütend zu werden, verbirgt der Kluge seine Gefühle. Er lässt sich nicht von seinen negativen Emotionen leiten, sondern kann eine Beleidigung entweder runter schlucken oder zu passen- der Zeit ansprechen. Wer am selben Tag , d.h. unmittelbar nach einer Kränkung, den Kränkenden zur Rede stellt, wird dabei kaum sach- lich und liebevoll vorgehen. Leicht kann es dann dazu kommen, dass „Böses mit Bösem oder Scheltwort mit Scheltwort“ (1Petrus 3,8) vergolten wird. Der Kluge weiß um den Reflex zum Bösen, der im Herzen eines Menschen eingebaut ist. Wir wollen sofort zurück schlagen und unser Recht verteidigen, aber weise ist ein solches Verhalten nicht. In der Bergpredigt fordert der Herr Jesus seine Jün- ger auf, der Gewaltspirale ein Ende zu setzen (Matthäus 5,38-42) und formuliert bewusst einseitig: „Widersteht nicht dem Bösen! “ Wann bist du das letzte Mal, angestachelt durch eine Beleidung, „in die Luft gegangen“ und bist damit selbst zum Täter gewor- den? Bist du bereit, darauf zu verzichten?", "f": [{"n": "524", "t": "O. Schmähung, Schande, Geringschätzung, Entehrung, Kränkung, Missachtung..."}, {"n": "525", "t": "An dieser Stelle redet Jesus nicht über die Themen Selbstverteidigung, Benachrichti- gung der Polizei oder den Schutz der eigenen Menschenwürde. Es geht um den Themen- komplex „Beleidigung und böses Verhalten, gegen das ich nichts tun kann“. Ich liebe einen Verbrecher nicht, wenn ich ihm gestatte, mich zum Opfer zu machen! Im Fall einer Belei- digung sieht das anders aus."}, {"n": "526", "t": "W. Zeuge der Lügen"}, {"n": "527", "t": "Hier ist nicht ganz klar, ob er Falschheit „ausspricht“ oder ob er selbst ein „Betrug“ ist. Es spielt für die Auslegung, aber keine große Rolle."}, {"n": "528", "t": "Der „Zeuge“ kann identisch mit dem Ankläger sein (5Mose 19,16)!"}]}, "Spr 12,23": {"k": "Ein kluger Mensch behält <sein> Wissen für sich , aber das Herz der Toren ruft Narrheit aus. Die Toren wissen nicht, wann es Zeit ist, den Mund zu halten und plärren ihre Narrheit in die Welt hinaus. Ein kluger Mensch kann schweigen. Er wird nicht von dem Wunsch getrieben, im Mittelpunkt zu stehen oder mit seinem Wissen anzu- geben. Beherrscht kann er auf den richtigen Zeitpunkt warten, um sein Wissen denen mitzuteilen, die es brauchen und richtig damit umzugehen wissen. Wissen allein ist nämlich in vielen Situationen keine Hilfe und bringt falsch eingesetzt keinen Segen. Der Apostel Paulus warnt deshalb: „Die Erkenntnis bläht auf, die Liebe aber er- baut.“ (1Korinther 8,2) Hast du die Wahrheit dieses Verses schon einmal erlebt und dich selbst dabei ertappt, zu schnell oder unbedacht geredet zu haben?", "f": [{"n": "539", "t": "Der Spruch erinnert an Sprüche 12,16 und 13,16."}, {"n": "540", "t": "W. verbirgt es, versteckt es, bedeckt es"}, {"n": "541", "t": "O. die Lässigkeit, die lässige (Hand)."}, {"n": "542", "t": "Der Fronpflichtige war kein Sklave, sondern musste für den Herrscher Zwangsarbeiten erledigen (1Könige 5,27.28)."}, {"n": "543", "t": "O. Furcht, Beschwernis, Angst"}]}, "Spr 15,1": {"k": "Eine sanfte Antwort wendet Grimm ab, aber ein verletzen- des Wort schürt den Ärger. Dieser Vers ist so wichtig! Eine sanfte Antwort ist liebevoll, einsich- tig, beruhigend. Sie nimmt die Verstimmung und den Grimm beim Gegenüber wahr und ernst. Wie leicht ist es, in einer hitzigen De- batte selbst noch Öl ins Feuer zu schütten und durch ein verletzen- des Wort den schon bestehenden Ärger noch anzuheizen. Aber ge- nau das sollen wir nicht tun! Wir sollen Friedensstifter sein. Dazu ist es nötig, dass wir unsere Emotionen im Griff haben. Dazu ist es nö- tig, das richtige Wort zu finden, um eine angespannte Situation zu entschärfen. Dazu ist es nötig, demütig zu sein, mich nicht zu ernst zu nehmen, meine eigenen Verletzungen runter zu schlucken und nett zu bleiben, auch wenn ich mich innerlich ärgere. Gott ist gegen Streit und wir sollten ihn deshalb mit allen Mitteln vermeiden (vgl. Sprüche 17,14). Jakobus schreibt zurecht, dass wir „langsam zum Zorn“ sein sollen, weil wir damit nicht „Gottes Gerechtigkeit“ wirken (Jakobus 1,19.20). Denke an deinen letzten Streit, bei dem es richtig laut wurde. Mit welchen Worten hättest du damals die Situation entschär- fen können? Warum wolltest du nicht deseskalieren?", "f": [{"n": "638", "t": "W. geht recht mit Weisheit um (vgl. 1Mose 4,7)."}]}, "Spr 15,28": {"k": "Das Herz der Gerechten wägt eine Antwort ab, aber aus dem Mund der Gesetzlosen sprudeln die Bosheiten. Schon die Art des Redens ist oft ein Indiz für seine Qualität. Beim Gerechten braucht die Antwort Zeit, weil er sie abwägt . Er denkt über das nach, was er sagen will, und darüber, wie er es sagen soll. Ganz anders die Bösen. Aus ihrem Mund sprudeln die Worte nur so heraus. Und wenn man bei den Gerechten eine kluge Antwort erwar- ten kann, so bringen die Gesetzlosen Bosheiten zustande. Hast du dich im Griff und kannst dir – wenn du gefragt wirst – für eine gute Antwort Zeit lassen? Oder spürst du in dir einen Druck, schnell etwas sagen zu müssen?", "f": [{"n": "652", "t": "W. macht die Knochen fett. Die „Knochen“ stehen hier für das ganze Wesen aus Physis und Psyche. Das Bild beschreibt Stärke, Stabilität, Überfluss, Gesundheit und volle Zufrie- denheit."}]}, "Spr 16,32": {"k": "Besser ein Langmütiger als ein Held, und <besser>, wer seinen Geist beherrscht, als wer eine Stadt erobert. Wer die Weisheit des Alters gewinnen will (vgl. Sprüche 16,31), der tut gut daran, sein eigenes Temperament ( Geist ) in den Griff zu be- kommen. Wer sich selbst nicht meistert, kann die Probleme der Welt nicht meistern. Ein Langmütiger kann geduldig darüber hin- wegsehen, dass man ihm Unrecht tut. Ein solcher ist für eine Gesell- schaft wertvoller als ein Held , der eine Stadt erobert . Wer nicht gleich in die Luft geht, der ist wirklich stark. Wer seinen Geist be- herrscht , der lebt siegreich. Große Taten können Charakterdefizite nicht aufwiegen. Gott legt mehr Wert auf mein Sein als auf mein Tun! Bist du ein Hitzkopf, der gern und leicht in die Luft geht? Hast du Langmut, Geduld, Selbstbeherrschung etc. schon gelernt? Wenn nein, bei wem musst du dich noch entschuldigen und wer könnte dir helfen?", "f": [{"n": "692", "t": "O. und. Es ist nicht ganz klar, ob der Vers das Zusammenspiel Mensch-Gott oder die Souveränität Gottes über alles Menschliche betonen will."}, {"n": "693", "t": "Der Begriff „Los“ kann in der Bibel auch für das durch den Losentscheid zugewiesene Land (vgl. Josua 14ff) stehen und dann Erbe, Besitz oder allgemein die Lebensumstände bezeichnen."}]}, "Spr 17,27": {"k": "Wer seine Worte zurück hält , besitzt Erkenntnis; und wer kühlen Geistes ist, ist ein verständiger Mann . Wer einen kühlen Geist bewahrt, der kann mit schwierigen Situatio- nen, vor allem wenn er angegriffen wird, richtig umgehen. In hitzi- gen Momenten zeichnet sich der verständige Mann durch Erkennt- nis und eine zurückhaltende Sprache aus. Das Plappermaul, das sich mit Worten überschlägt und seiner inneren Erregung folgend drauf- losredet, verhält sich wie ein Dummkopf. Wenn es schon grundsätzlich gut ist, nicht zu viel zu reden, wie viel mehr in solchen Situationen, in denen ein Wort zu viel oder mit dem falschen Zun- genschlag echten Schaden anzurichten vermag? Kannst du den Mund halten? Oder musst du immer deinen Senf dazu geben, egal ob das klug ist oder nicht? Bist du jemand mit einem kühlen Geist , der es in brenzligen Situationen versteht, still zu sein?", "f": [{"n": "744", "t": "Wir dürfen durch den Vergleich mit dem Unschuldigen davon ausgehen, dass die Edlen hier auch unschuldig sind. Natürlich gibt es auch unter den Edlen Narren und Schurken (Jesaja 32,5), auf die dann dieser Spruch nicht zutrifft."}, {"n": "745", "t": "O. für sich behält, aufspart"}, {"n": "746", "t": "O. „... und ein verständiger Mann <besitzt> einen kühlen Geist.“"}]}, "Spr 10,12": {"k": "Hass führt zum Streit , aber Liebe deckt alle Übertretun- gen zu. Menschen sind Sünder und verletzten durch ihre Worte und Taten. Jeder Mensch ist für die Gesellschaft ein Risiko. Deshalb ist es von besonderer Bedeutung, in welcher Haltung wir der allgegenwärti- gen Sünde begegnen. Wer mit Hass reagiert, der bahnt den Weg zum Konflikt , aber wer liebevoll Übertretungen zudeckt , ist weise. Es ist klug, den Mantel des Schweigens und Vergessens über Sünden zu breiten, um nicht unnötig Trennung zu verursachen (vgl. Sprüche 17,9). Wahre Liebe erträgt (1Korinther 13,5-7) Fehler , dient dem Feind (Sprüche 25,21.22) und handelt geduldig, weil sie um die ei- gene Fehlerhaftigkeit weiß (Sprüche 19,11). Wer den Streit sucht, ist nicht liebevoll und nicht weise (Sprüche 20,3). Wenn unsere zwi- schenmenschlichen Beziehungen von Zank und Streit geprägt sind, ist es gut, dass wir uns fragen, mit welcher Grundeinstellung wir an- deren Menschen begegnen. Vielleicht liegt das Problem nicht immer nur bei den Anderen, sondern auch in uns, weil wir ihren Sünden nicht mit Liebe begegnen wollen. Wann hast du das letzte Mal Sünde zugedeckt und liebevoll auf das Fehlverhalten einer anderen Person reagiert?", "f": [{"n": "415", "t": "O. erregt Zwietracht, weckt Zank auf (vgl. Hohelied 2,7)."}, {"n": "416", "t": "auch i.S.v. „alle Arten von“"}, {"n": "417", "t": "Sie tut das wohlwissend der Tatsache, dass es Sünden gibt, die angesprochen (Matthäus 18,15-17) und in der Gemeinde gerichtet (1Korinther 5,11-13) werden müssen. Liebe schweigt nicht immer, aber sie weiß auch, wie wichtig das Zudecken von Sünde für den Erhalt von Gemeinschaft ist."}, {"n": "418", "t": "Z.B. Eltern, die sie belehrt haben."}, {"n": "419", "t": "Das kann sein die Familie oder die Gesellschaft."}]}, "Spr 10,18": {"k": "Wer Hass verbirgt, hat Lügenlippen; und wer Verleumdung verbreitet, ist ein Tor. Wer Hass verbirgt ist ein Lügner. Im Gespräch tut er so als würde er sein Gegenüber lieben, aber auch wenn sich auf seinen Lügenlippen nette Worte finden, ist jedes einzelne davon eine Unwahrheit. Wenn es sich bei den beiden Vershälften um dieselbe Person han- delt, dann will der Vers zum Ausdruck bringen, dass verborgener Hass sich irgendwann durch Verleumdung entlädt. Dabei kann es sich um Anspielungen, Halbwahrheiten, verzerrte oder übertrie- bene Darstellungen usw. handeln; immer mit dem Ziel, dem Ande- ren zu schaden. Wer das tut, ist ein Tor . Seine Dummheit besteht da- rin, dass er sich nicht seiner Antipathie stellt und Beziehung baut, was zugegebenermaßen schwierig sein kann, wenn ich einen Men- schen nicht mag, aber schlechtes Reden hinter dem Rücken ist keine kluge Alternative. Zerstöre ich die Reputation einer Person, wird es mir noch schwerer fallen, eine Freundschaft mit ihr aufzubauen. Findet sich Hass in unserem Herzen müssen wir dieses Gefühl als grobe Sünde entlarven und aus unserem Leben entfernen. Hast du schon einmal über eine Person, die du nicht mochtest, schlecht geredet?", "f": [{"n": "427", "t": "W. Herz"}]}, "Spr 11,12": {"k": "Wer seinen Nächsten verachtet, hat keinen Verstand, aber ein verständiger Mensch schweigt. Die Verachtung eines Nächsten , d.h. jedweder Person, die mir be- gegnet, ist falsch, weil jeder Mensch nach dem Ebenbild Gottes ge- schaffen ist, von Gott geliebt wird und nur mein Stolz mich glauben macht, besser zu sein. Wer es trotzdem tut, dem mangelt es an Verstand . Dem Verachten von Menschen wegen ihrer Herkunft, ihres Aussehens, ihrer Fähigkeiten usw. liegt also ein Mangel an Ein- sicht und Denkvermögen zugrunde. Ein verständiger Mensch hat es gelernt, seinen Mund zu halten. Er muss nicht seine Gedanken und Gefühle hinaus plärren, auch dann nicht, wenn er ängstlich oder verletzt ist. Manchmal kommt man um ein kritisches Gespräch nicht herum, es braucht dann Glauben, Selbstbeherrschung und Liebe zum Nächsten, um die richtige Zeit dafür abzupassen (vgl. Sprüche 15,23; 25,11). Bis dahin ist es gut, wenn man schweigt . Gibt es Menschen, die du verachtest? Warum denkst du so über sie?", "f": [{"n": "462", "t": "O. Mann"}, {"n": "463", "t": "In dem Spruch geht es um Verachtung, die sich durch abfälliges Reden zeigt. Natürlich ist es grundsätzlich falsch, Menschen zu verachten, auch dann, wenn es „nur“ im Herzen geschieht (vgl. Sprüche 10,18)."}, {"n": "464", "t": "W. Herz. Siehe „Exkurs: Das Herz“ nach Sprüche 2,2."}, {"n": "465", "t": "Gemeint sind private Geheimnisse, die bei einem persönlichen Gespräch unter Freun- den oder Familienangehörigen offenbart werden (vgl. Sprüche 3,32)."}, {"n": "466", "t": "O. zuverlässig"}, {"n": "467", "t": "O. das Wort, Gespräch, die Angelegenheit"}]}, "Spr 11,13": {"k": "Wer als Verleumder umhergeht, gibt ein Geheimnis preis; wer aber treuen Geistes ist, deckt die Sache zu. Was im Privaten besprochen wird, gehört nicht an die Öffentlich- keit. Die Bibel kennt den Schutz der Privatsphäre, der auch ohne be- sondere Kenntnismachung gilt. Wer das im kleinen Kreis Bespro- chene weitergibt, wird zum Verleumder . Verleumdung beginnt also nicht damit, dass ich schlecht über eine Person rede, um ihr zu scha- den (vgl. 3Mose 19,16), sondern in dem Moment, wo ich aus wel- chem Grund auch immer, ein Geheimnis weitersage. Dabei kann es sich ebenso um Kriegslisten handeln (Psalm 83,4 „listige An- schläge“) wie um (scheinbar) unbedeutende Vertraulichkeiten (Sprüche 25,9). Als Christen sollen wir verschwiegen und treuen Geistes sein. Man kann uns dahingehend vertrauen, dass wir ein persönliches Ge- spräch oder eine Diskussion grundsätzlich als vertraulich einstufen. Aus Liebe machen wir die Position unseres Nächsten nicht öffent- lich zugänglich. Diese Haltung wird uns auch davor bewahren, uns hinter der Meinung eines Dritten zu verstecken. Wir glauben und verteidigen dann nur, was wir selbst verstanden oder erlebt haben, und nicht was uns zugetragen wurde. Fällt es dir leicht, ein Geheimnis für dich zu behalten? Fühlst du manchmal einen Druck in der Brust, Neuigkeiten und private Details auszuplaudern?", "f": [{"n": "464", "t": "W. Herz. Siehe „Exkurs: Das Herz“ nach Sprüche 2,2."}, {"n": "465", "t": "Gemeint sind private Geheimnisse, die bei einem persönlichen Gespräch unter Freun- den oder Familienangehörigen offenbart werden (vgl. Sprüche 3,32)."}, {"n": "466", "t": "O. zuverlässig"}, {"n": "467", "t": "O. das Wort, Gespräch, die Angelegenheit"}, {"n": "468", "t": "Oder Beratung, Ratschlag"}]}, "Spr 26,22": {"k": "Die Worte des Ohrenbläsers sind wie Leckerbissen, und sie gleiten hinab in das Innerste der Persönlichkeit. Wir hören nur zu gern den Tratsch und den Klatsch – leider! Läste- reien und Geschwätz sind Leckerbissen, die sich Menschen kaum entgehen lassen. Die Worte eines Ohrenbläsers haben es leicht, in das Innerste unserer Persönlichkeit vorzudringen. Und genau das macht sie so gefährlich! Sie können ihr zerstörerisches Werk in uns vollbringen, ohne dass wir ihnen etwas entgegenzusetzen haben. Unser Herz ist dem Schlechtreden wehrlos ausgeliefert. Es hat ein dramatisches Faible für schlüpfrige Details und Gemeinheiten. Man kann sich nur schützen, indem man einen Ohrenbläser meidet (Sprüche 26,20; vgl. 22,10). Was macht das Gerede eines Ohrenbläsers (oder einer Tratsch- tante) so lecker? Wie kann man sich vor Ohrenbläsern schüt- zen?", "f": [{"n": "1005", "t": "Der Spruch wiederholt wortwörtlich Sprüche 18,8. Ich habe deshalb die Auslegung die- ses Spruches hier wiederholt."}, {"n": "1006", "t": "Der Begriff irden ist ein Synonym für tönern und bezeichnet aus gebranntem Ton her- gestellte Gegenstände."}]}, "Spr 26,24": {"k": "Der Hasser heuchelt mit seinen Lippen, aber in seinem Innern hegt er Betrug. Wenn er seine Stimme lieblich macht, traue ihm nicht; denn sieben Gräuel sind in seinem Herzen. Diese beiden Sprüche konfrontieren uns mit der Tatsache, dass wir Feinde haben, die uns bewusst schaden wollen und denen wir nicht trauen dürfen – egal wie nett sie daherreden! Es gibt eine sehr gefährliche Form von Hass, die sich hinter freundlichen Worten und einem gewinnenden Lächeln versteckt. Der Weise ist nicht naiv und fällt auf diese Art des Betrugs nicht herein. Die sieben Gräuel im Her- zen des Bösen sind ein Bild für die vollständige Verdorbenheit des Hassers. Das ganze Spektrum böser Ideen, Motive und Taten findet sich in seinem Innern. Wer seinen Worten vertraut, der wird es bü- ßen. Bist du naiv? Neigst du dazu, Menschen zu schnell zu vertrauen; vielleicht nur deshalb, weil sie freundlich zu dir sind? Wann bist du das letzte Mal von einem bösen Menschen übers Ohr ge- hauen worden?", "f": [{"n": "1006", "t": "Der Begriff irden ist ein Synonym für tönern und bezeichnet aus gebranntem Ton her- gestellte Gegenstände."}]}, "Spr 13,10": {"k": "Es gibt Streit nur mit Übermut ; bei denen aber, die sich raten lassen, Weisheit. Mit Übermut ist eine Einstellung gemeint, die in der Bibel auf Men- schen zutrifft, die sich nicht belehren lassen (5Mose 17,11), die sich für Gottes Diener ausgeben, ohne es zu sein (5Mose 18,22), und stolz sind (Jeremia 50,31.32); sie wird mit „Bosheit des Herzens“ gleich gesetzt (1Samuel 17,28). Wer von seinem Übermut geleitet wird, nimmt keinen Rat an. Die sich raten lassen , zeigen damit, dass sie nicht zu hoch von sich den- ken. Das Gegensatzpaar Streit und Weisheit will folgendes ausdrü- cken: Wer sich streitet ist nie weise (vgl. Sprüche 20,3) und wer weise ist, sucht den Frieden. Der arrogante Dummkopf mit dem zu großen Ego lässt sich nicht belehren und jeder Versuch, ihn zurecht zu weisen, endet immer im Streit. Wo man sich streitet, gibt es also einen Mangel an Demut, Selbsterkenntnis und der Bereitschaft, sich etwas sagen zu lassen. Es ist ein wichtiger Schritt auf dem Weg zur Weisheit , die eigenen Grenzen zu erkennen, Kritik zuzulassen und gute Ratschläge anzu- nehmen. Von wem würdest du keinen Rat annehmen? Und warum ist das so?", "f": [{"n": "560", "t": "Diese Aussage gilt im Rahmen der Randbedingungen, die durch eine von Sünde ge- prägte Welt gesetzt werden. An anderer Stelle habe ich schon darüber geschrieben, dass der Gerechte nicht immer der zeitliche Sieger ist. Auf lange Sicht jedoch, wird sein Ansatz der brauchbare sein."}, {"n": "561", "t": "O. in, durch, in Verbindung mit, als Folge von..."}, {"n": "562", "t": "O. Vermessenheit. Die Edomiter stehen als Volk für diese Untugend (Jeremia 49,16; Obadja 1,3)."}, {"n": "563", "t": "W. aus der Nichtigkeit, d.h. aus dem Nichts oder aus nichtigen Quellen"}, {"n": "564", "t": "W. handvollweise"}]}, "Spr 10,8": {"k": "Wer weisen Herzens ist, nimmt Gebote an; aber ein närri- scher Schwätzer kommt zu Fall. Das weise Herz weiß um die eigene Begrenztheit und nimmt Gebote an . Der Erwerb von Weisheit setzt die demütige Einsicht voraus, dass ein anderer mehr weiß als ich und mir besseren Rat geben kann, als es die Ideen sind, die aus mir selbst hervorsprudeln. Bes- serwisserei, Hochmut oder das falsche Verliebtsein in die eigenen Gedanken sind Gegner echter Erkenntnis und Einsicht. Wieder ist der Parallelismus nicht exakt. Das Gegenstück zu dem, der ein weises Herz hat, wird der närrische Schwätzer . Seine Dumm- heit zeigt sich im Umgang mit Worten. Statt zu hören und das Wis- sen der Weisen anzuzapfen, gibt er Plattheiten, Zoten und Lügen von sich. Was er sagt, hat keinen Wert, es ist dummes Zeug. Statt Belehrung zu suchen, schwingt er sich zum Lehrer auf, der doch nichts weiß und letztlich zu Fall kommt . Sein vermeintliches Wissen offenbart sich am Ende als Einbildung und er scheitert am wirkli- chen Leben. Kennst du so einen besserwisserischen, „närrischen Schwät- zer, der viel erzählt und viel von seiner eigenen Meinung hält, aber am Leben scheitert?", "f": [{"n": "413", "t": "W. Der Dummkopf der Lippen."}, {"n": "414", "t": "Mit dem Bild „Weg“ eines Menschen beschreiben die Sprüche den Lebensweg, die Le- bensführung und die daraus erwachsenden Konsequenzen (vgl. Anmerkungen zu Sprüche 1,15)."}]}, "Spr 18,15": {"k": "Das Herz des Verständigen erwirbt Erkenntnis, und das Ohr der Weisen sucht nach Erkenntnis. Wer sich Erkenntnis wünscht und klug werden will, der muss nach- denken (Herz) und zuhören (Ohr). Eigentlich ist es ganz einfach. In- teressant wird der Vers, weil er behauptet, dass der Verständige bzw. der Weise nach Erkenntnis strebt und sie gewinnt. Wie in Sprü- che 1,5 ist hier also nicht der Anfänger in den Dingen der Weisheit im Blick, sondern der Experte. Die Sprüche sind eben gerade nicht nur für die Einfältigen und Unwissenden. Man wird ein Weiser, in- dem man Weisen zuhört, aber es ist auch weise, mit dem Ohr weiter nach Erkenntnis zu suchen. Dasselbe gilt fürs Nachdenken. Es ist klug über göttliche Weisheit nachzudenken, aber ein Verständiger weiß auch, dass es immer noch mehr zu verstehen gibt. Vielleicht kann man formulieren: Ein wirklich Kluger zeichnet sich dadurch aus, dass er eine tief sitzende Lust auf ein Mehr an Erkenntnis be- sitzt. Er weiß schon eine Menge, aber er will mehr, weil er sich über zwei Dinge im Klaren ist: (1) Erkenntnis ist Stückwerk (1Korinther 13,9) und (2) ich als Lernender bin Geschöpf, werde also in diesem Leben nie auslernen . Die Tiefe göttlicher Weisheit lässt sich von uns nicht ausloten. Hast du diese tief sitzende Lust auf Erkenntnis? Wie willst du eine Kultur des Nachdenkens über geistliche Zusammenhänge in deinem Leben etablieren? Wem hörst du zu , um von ihm zu lernen?", "f": [{"n": "773", "t": "Mir persönlich ist mein Ruhetag in diesem Zusammenhang sehr wichtig geworden. Ein Tag in der Woche voller Schlaf, Genuss und einem Denkverbot, was Gemeindeprobleme angeht... super! Mir schenkt „mein Montag“ jede Woche neu Lebensfreude und „volle Ak- kus“."}, {"n": "774", "t": "Das gilt unabhängig vom IQ!"}, {"n": "775", "t": "Natürlich geht es nicht nur ums Zuhören! In der Antike hat man so gelernt. Heute gibt es weitere Möglichkeiten z.B. Bücher oder Videos."}, {"n": "776", "t": "W. eines Mannes"}, {"n": "777", "t": "S. dazu die Anmerkungen zu Sprüche 15,27"}, {"n": "778", "t": "Das ist ein Wink mit dem Zaunpfahl für Ehemänner!"}]}, "Spr 19,25": {"k": "Schlage den Spötter, so wird der Einfältige klug; und weise den Verständigen zurecht, so wird er Erkenntnis verstehen. Macht es Sinn, einen Spötter zu strafen? Eigentlich zeigen die Sprü- che, dass er unbelehrbar ist (vgl. Sprüche 9,7; 13,1; 15,12). Er selbst hat also wenig Nutzen von einer Verurteilung und doch kann er für den Einfältigen als ein abschreckendes Beispiel herhalten. Der Ein- fältige lernt aus den Fehlern des Spötters und wird so klug. Wer bereits verständig ist, der weiß auch, wie man angemessen mit einer Korrektur umgeht. Wird er zurechtgewiesen, hört er zu, durchdenkt das Gesagte und wird so noch mehr Erkenntnis verste- hen. Es lohnt sich also, klugen Leuten Ratschläge zu geben, weil sie davon enorm profitieren. Wie ist dein Umgang mit Zurechtweisung? Wie sehr profitierst du davon, dass man dich korrigiert? Was war die letzte Kritik, die du angenommen hast?", "f": [{"n": "826", "t": "Hier darf man nicht vergessen, dass bis heute im Orient nicht jeder seinen eigenen Tel- ler besitzt, sondern von einer gemeinsamen Platte mit den Händen gegessen wird."}, {"n": "827", "t": "Es geht hier mehr um das väterliche Vermögen als um die Person des Vaters."}]}, "Spr 21,11": {"k": "Wenn man den Spötter bestraft, so wird der Einfältige weise; und durch das Beobachten der Weisen , nimmt er Er- kenntnis an. Obwohl die Bestrafung eines Spötters diesen kaum retten kann (vgl. Sprüche 9,7.8; 13,1; 14,6; 15,12) wird der Spötter durch die Bestra- fung zu einem heilsamen Vorbild für den Einfältigen (Sprüche 19,25; 21,11). Aber die Erziehung eines Einfältigen geschieht noch auf eine andere Weise: Durch das Vorbild der Weisen (vgl. Sprüche 6,6). Sowohl gute als schlechte Vorbilder prägen die Denkweise von Ein- fältigen. In der Erziehung ist es deshalb von großer Wichtigkeit, dass der Teenager erlebt, wohin Falschheit führt und wie sich kluge Menschen verhalten. Mit welchem Weisen könntest du (bzw. dein Teenager) Zeit verbringen, um von ihm zu lernen? Welchen Einfluss mag das unreflektierte „Beobachten“ von Serienhelden auf das Denken von jungen Menschen haben?", "f": [{"n": "881", "t": "Eine andere Übersetzung als in der revidierten Elberfelder Bibel („wenn man den Wei- sen belehrt“), die aber von Targum und Vulgata gestützt wird. Weitere Erläuterungen s. Waltke, Bd 2, S. 161, FN. 15"}, {"n": "882", "t": "Wie schon in Sprüche 1,4 dargestellt, ist hier der unbedarfte Jugendliche im Blick, der in Gefahr steht, sich an falsche Vorbilder zu hängen."}, {"n": "883", "t": "Z. T. wird Gott in alten Übersetzungen ergänzt, um die Doppeldeutigkeit aufzulösen."}]}, "Spr 27,5": {"k": "Besser offener Tadel als verborgene Liebe. In der Bibel gehören Korrektur und Liebe ganz eng zueinander. Di- rekt hintereinander werden die Israeliten aufgefordert, einander ernstlich zurechtzuweisen und einander zu lieben (3Mose 19,17.18). Der Tadel in diesem Spruch ist eine Zurechtweisung aus Liebe. Es geht nicht darum jemanden überkritisch oder pharisäerhaft fertig zu machen, noch dazu vor anderen. Hinter dem Tadel steckt Für- sorge, Interesse und Verantwortungsbewusstsein. Wer seine Liebe versteckt, indem er sich nicht traut, die Sünde eines Freundes offen anzusprechen, handelt schlechter als der, welcher Sünde beim Na- men nennt; selbst dann, wenn seine Korrektur auf eine unge- schickte Weise vorgetragen wird. Stehst du in der Gefahr, Freunde nicht zu korrigieren, weil du ihnen nicht weh tun willst? Wozu führt dieses Verhalten?", "f": [{"n": "1012", "t": "Wörtlich: Wunden. Es sind die Wunden gemeint, die mir ein Freund zufügt."}]}, "Spr 14,15": {"k": "Der Einfältige glaubt jedem Wort , aber der Kluge merkt auf seine Schritte. Ein Leben, das gelingen soll, braucht Unterscheidungsvermögen. Genau das aber hat der Einfältige nicht: Er glaubt jedem Wort . Und weil er das tut, wird er zum Spielball aller Einflüsse, von denen er glaubt, dass sie gut für ihn sind. Der Apostel Paulus beschreibt Reife dagegen so: „Denn wir sollen nicht mehr Unmündige sein, hin- und hergeworfen und umhergetrieben von jedem Wind der Lehre durch die Betrügerei der Menschen durch ihre Verschlagenheit zu listig ersonnenem Irrtum.“ (Epheser 4,14) Der Einfältige lässt sich leben, lässt sich die Perspektive aufs Leben, die Prioritäten und die Wertmaßstäbe vorgeben. Dabei achtet er nicht darauf, wo ihn diese Beeinflussung hinführt. Er ist einfach froh, dass er selbst nicht nach- denken und keine Entscheidung treffen muss. Er schwimmt mit der Masse, hört auf die Trends der Zeit und geht auf dem breiten „Weg, der zum Verderben führt.“ (Matthäus 7,13) Ganz anders der Kluge . Er denkt nach, bevor er Entscheidungen (= Schritte ) trifft und reflektiert darüber, wo sie ihn hingebracht ha- ben. Er glaubt nicht jedem Wort , sondern dem Wort Gottes, das ihm Maßstab und Korrektur ist. Auch wenn der Kluge sich nicht aus den Erfolgen des Lebens heraus definiert (vgl. Sprüche 14,14), so hat er doch kein Interesse daran, sein Leben durch Dummheit zu ruinie- ren. Wo bist du zum letzten Mal als Leichtgläubiger einer Lüge so richtig auf den Leim gegangen?", "f": [{"n": "614", "t": "I.S.v. „allem und jedem“"}, {"n": "615", "t": "O. beobachten, bedenken, verstehen"}, {"n": "616", "t": "Ein paar allgemeine Einführungen zum „Einfältigen“ finden sich in den Erklärungen zu Sprüche 1,4."}]}, "Spr 17,16": {"k": "Wozu Geld in der Hand eines Toren, um Weisheit zu kau- fen, wenn ihm doch der Verstand fehlt ? Der Spruch skizziert den grotesken Versuch eines Toren, der zum Weisen geht, um von ihm Klugheit zu kaufen. Er denkt, dass man alles kaufen kann und behandelt Weisheit wie eine Ware. Seine Ver- suche, weise zu werden, sind abstrus und lächerlich. Er hat keine Vorstellung davon, was Weisheit ist und wie man sie erwirbt. Weisheit beginnt mit Gottesfurcht (Sprüche 9,10) und ist ein Ge- schenk Gottes für den, der sie sucht und treu den Geboten des H folgt (Sprüche 2). Im Gegensatz dazu hat der Tor keinen Sinn für Moral und ist intellektuell nicht bereit, Weisheit zu erlernen. Sein Mangel an Verstand macht es ihm unmöglich, weise zu werden. Wie steht es um deine Bemühungen, weise zu werden? Ver- hältst du dich wie ein Dummkopf, der keine rechte Vorstellung davon hat, wie man Weisheit erwirbt? Fehlt es dir auch an Ver- stand? Wie sinnvoll und durchdacht sind deine Versuche, weise zu werden?", "f": [{"n": "725", "t": "W. (Zeile B: ) ... und kein Herz."}, {"n": "726", "t": "I. S. v. unter allen Umständen; immer wenn ich ihn brauche; egal, wie es mir geht."}, {"n": "727", "t": "W. der"}, {"n": "728", "t": "O. und"}, {"n": "729", "t": "Oder jeder andere Verwandte"}, {"n": "730", "t": "Z.B. Krieg, Missernte, Krankheit, Versklavung"}]}, "Spr 18,2": {"k": "Keine Lust hat der Narr auf Verständnis, sondern nur daran, dass sein Herz sich offenbart. Das Problem eines Narren besteht darin, dass er auf die falschen Dinge Lust verspürt. Er hat keine Lust auf Verständnis. Das Lernen von Weisheit, das Nachdenken über die Zusammenhänge des Le- bens, eine kritische Reflexion seiner Erfahrungen oder seines Le- bens interessiert ihn einfach nicht. Fest davon überzeugt, dass er den Durchblick hat und niemanden braucht, der ihn belehrt, hat er keine Freude an Gottes Wort oder am Gespräch mit den Alten und Weisen. Leider hält ihn das nicht davon ab, den Mund aufzumachen! Er hat zwar keine Lust auf Erkenntnis, aber er genießt es, wenn alle sehen, was sich an (dummen) Gedanken in seinem Herzen verbirgt. Beratungsresistenz, Besserwisserei und ein ausgeprägtes Sen- dungsbewusstsein kommen bei ihm zusammen und machen ihn zu einem sehr unangenehmen Gesprächspartner. Kennst du beratungsresistente Menschen, die selbstbewusst ihre schrägen Gedanken präsentieren, während alle um sie herum merken, dass ihr Leben nicht funktioniert? Hast du Lust auf Verständnis oder wird deine Beschäftigung mit den Sprü- chen von Disziplin , fremden Erwartungen, schlechtem Ge- wissen oder Pharisäertum voran getrieben?", "f": [{"n": "748", "t": "Disziplin ist eine Frucht des Geistes (Galater 5,22) und keine schlechte Motivation. Ich glaube nur, dass Lust eine bessere Grundlage ist, um sich voll reinzuknien!"}, {"n": "749", "t": "O. Tadel, Vorwurf, Stigma, Hohn"}, {"n": "750", "t": "Und wer das anders sieht, macht sich damit selbst in den Augen der Öffentlichkeit zum Schurken."}]}, "Spr 23,9": {"k": "<Spruch #10> Rede nicht zu den Ohren eines Toren, denn er wird die Klugheit deiner Worte verachten. Der Prediger sagt, dass es eine Zeit zum Schweigen und eine Zeit zum Reden gibt (Prediger 3,7); ein Gespräch mit einem Dummkopf ist eine Zeit zum Schweigen . Es ist sinnlos, einem Toren mit Klug- heit zu kommen. Er hat dafür nur Verachtung übrig. Stehst du in der Gefahr, dummen Menschen auf die Nerven zu gehen, weil du ihnen erklären willst, was sie falsch machen?", "f": [{"n": "923", "t": "Sprüche 26,5 weist darauf hin, dass es Ausnahmen zu dieser Regel geben kann."}, {"n": "924", "t": "Das ganze Land gehört Gott und die Israeliten bekommen es nur zur Benutzung (3Mose 25,23)."}]}, "Spr 26,4": {"k": "Antworte einem Dummkopf nicht gemäß seiner Narrheit, damit nicht auch du ihm gleich wirst. Antworte einem Dummkopf gemäß seiner Narrheit, damit er nicht weise bleibt in seinen Augen. Wer sich auf einen verbalen Schlagabtausch mit Trotteln einlässt, der steht in der Gefahr, sich auf deren Niveau einzulassen und das wäre grundverkehrt. Wer mit Deppen argumentiert, womöglich ihr Vokabular übernimmt und ausfällig wird, wer sich in unsachge- mäße und beleidigende Diskussionen verstrickt, die nicht mehr sachorientiert und gewinnend sein wollen, der sollte lieber gleich gar nicht antworten, als sich selbst wie ein Idiot zu verhalten. Auf der anderen Seite kann es für den Dummkopf sehr wertvoll sein, wenn man seine unwahre Sicht aufs Leben aufdeckt. Der Depp hält sich ja selbst für weise! Trifft er auf einen kompetenten Gesprächs- partner, der ihm seine falsche Selbstwahrnehmung aufschließt, so kann er sich vielleicht noch ändern und selbst weise werden. Nicht immer ist klar, wie man sich weise verhält. Es kann richtig sein, auf das dumme Geschwätz eines Dummkopfes zu antworten, es kann aber auch falsch sein. In Fragen der Weisheit trifft man oft ein Dilemma von Schutzzielen an. In diesem Fall sind es folgende zwei: 1) Ich will nicht, dass der Trottel mich prägt, dass ich womög- lich selbst sündige, weil er mit seinem Verhalten auf mich abfärbt. 2) Ich will, dass der Tölpel merkt, wie dumm er argumentiert, damit er sich ändern kann und nicht die Folgen seiner Begriffsstutzigkeit tragen muss. Welches Schutzziel ist wichtiger? Das ist nicht leicht zu beantworten und kommt auf die jeweilige Situation an. Weisheit hat also nicht nur damit zu tun, dass ich die Handlungsalternativen kenne, sondern auch damit, dass Gott mir in der jeweiligen Situation hilft, die beste Alternative auszuwählen. In welchen Situationen hast du selbst schon gemerkt, dass man in einer gegebenen Situation mehr als ein Schutzziel verfolgen kann (aber eben nicht gleichzeitig)?", "f": []}, "Spr 26,5": {"k": "Antworte einem Dummkopf nicht gemäß seiner Narrheit, damit nicht auch du ihm gleich wirst. Antworte einem Dummkopf gemäß seiner Narrheit, damit er nicht weise bleibt in seinen Augen. Wer sich auf einen verbalen Schlagabtausch mit Trotteln einlässt, der steht in der Gefahr, sich auf deren Niveau einzulassen und das wäre grundverkehrt. Wer mit Deppen argumentiert, womöglich ihr Vokabular übernimmt und ausfällig wird, wer sich in unsachge- mäße und beleidigende Diskussionen verstrickt, die nicht mehr sachorientiert und gewinnend sein wollen, der sollte lieber gleich gar nicht antworten, als sich selbst wie ein Idiot zu verhalten. Auf der anderen Seite kann es für den Dummkopf sehr wertvoll sein, wenn man seine unwahre Sicht aufs Leben aufdeckt. Der Depp hält sich ja selbst für weise! Trifft er auf einen kompetenten Gesprächs- partner, der ihm seine falsche Selbstwahrnehmung aufschließt, so kann er sich vielleicht noch ändern und selbst weise werden. Nicht immer ist klar, wie man sich weise verhält. Es kann richtig sein, auf das dumme Geschwätz eines Dummkopfes zu antworten, es kann aber auch falsch sein. In Fragen der Weisheit trifft man oft ein Dilemma von Schutzzielen an. In diesem Fall sind es folgende zwei: 1) Ich will nicht, dass der Trottel mich prägt, dass ich womög- lich selbst sündige, weil er mit seinem Verhalten auf mich abfärbt. 2) Ich will, dass der Tölpel merkt, wie dumm er argumentiert, damit er sich ändern kann und nicht die Folgen seiner Begriffsstutzigkeit tragen muss. Welches Schutzziel ist wichtiger? Das ist nicht leicht zu beantworten und kommt auf die jeweilige Situation an. Weisheit hat also nicht nur damit zu tun, dass ich die Handlungsalternativen kenne, sondern auch damit, dass Gott mir in der jeweiligen Situation hilft, die beste Alternative auszuwählen. In welchen Situationen hast du selbst schon gemerkt, dass man in einer gegebenen Situation mehr als ein Schutzziel verfolgen kann (aber eben nicht gleichzeitig)?", "f": []}, "Spr 26,12": {"k": "Siehst du eine Person , die in ihren Augen weise ist, für einen Dummkopf ist mehr Hoffnung als für sie. Schlimmer noch als ein Dummkopf ist ein Dummkopf, der sich selbst für weise hält. In den Sprüchen gibt es kaum Hoffnung für ei- nen Narren. Weil er nicht aus seinen Fehlern lernt (Sprüche 26,11), liegt seine einzige Hoffnung in strenger, unnachgiebiger Korrektur (Sprüche 26,3). Aber selbst diese kleine Chance auf Veränderung verspielt der, der sich selbst für weise hält. Wer die grundsätzliche Entscheidung getroffen hat, alles besser zu wissen, sich nichts sagen zu lassen und alle anderen für dumm zu halten, der ist in einer aus- sichtlosen Situation. Er kann nur darauf warten, dass sein Leben im Fiasko endet. Wie denkst du über dich? Hältst du dich für weise oder lässt du den Gedanken zu, dass andere reifer und weiser sein könnten als du es selbst bist?", "f": [{"n": "999", "t": "Wörtlich: einen Mann"}, {"n": "1000", "t": "Siehe auch die Anmerkungen zu Sprüche 22,13."}, {"n": "1001", "t": "Siehe auch die Anmerkungen zu Sprüche 19,24."}]}, "Spr 6,6": {"k": "Geh hin zur Ameise , du Fauler, sieh ihre Wege und werde weise! Nicht nur der Bürge kann sich schnelle Not zuziehen, sondern auch der Faulpelz. Diesmal ist es nicht die ehebrecherische Frau (Sprüche 5,7-10), noch der Schuldner (Sprüche 6,1-5), sondern die Schöp- fungsordnung, die für das finanzielle Desaster verantwortlich ist. Ein Fauler lebt entgegen den Regeln der Schöpfung, wenn er ver- sucht zu ernten, ohne vorher zu säen. Seine Weisheit liegt noch un- ter der einer Ameise , der ihr Instinkt genügt, um fleißig zu sein. Aber es gibt für ihn Hoffnung, wenn er sich warnen lässt. Betrachtet er die Wege , d.h. das Leben, einer Ameise mit jener Mischung aus Selbstdisziplin, vorausschauendem Handeln und Fleiß, so kann er erkennen, was ihm fehlt. Und diese Einsicht wird für ihn zum Aus- gangspunkt, um selbst weise zu handeln.", "f": [{"n": "290", "t": "Wahrscheinlich „Messor semirufus“, die Ernteameise, weil sie überall in Palästina zu- hause ist und Getreidekörner in ihrem Nest sammelt."}, {"n": "291", "t": "Es handelt sich um eine Führungsperson, die Entscheidungen und Urteile fällt, das Recht durchsetzt und das Volk im Kampf anführt (Josua 10,24; Richter 11,6)."}]}, "Spr 6,7": {"k": "Sie, die keinen Richter , Vorsteher und Gebieter hat, Die Ameise verfügt über genug gottgegebene Intelligenz, um ihre Arbeit effektiv und weise einzuteilen. Sie braucht keinen von außen, der ihr Vorschriften macht. Und darin wird sie dem Faulen zum Vor- bild. Auch er kann sich disziplinieren, die Arbeit zu tun, die er tun muss, um gut leben zu können. Leben ist nicht unendlich kompliziert. Manchmal reicht ein klein bisschen Biologie-Unter- richt, um die wichtigsten Lektionen zu verstehen.", "f": [{"n": "290", "t": "Wahrscheinlich „Messor semirufus“, die Ernteameise, weil sie überall in Palästina zu- hause ist und Getreidekörner in ihrem Nest sammelt."}, {"n": "291", "t": "Es handelt sich um eine Führungsperson, die Entscheidungen und Urteile fällt, das Recht durchsetzt und das Volk im Kampf anführt (Josua 10,24; Richter 11,6)."}]}, "Spr 6,8": {"k": "sie bereitet im Sommer ihr Brot, hat in der Ernte ihre Nah- rung eingesammelt. Eine Lektion, die der Faule verstehen muss geht so: Du musst zur rechten Zeit arbeiten, wenn du dauerhaft genug zu essen haben willst. Die Ameise macht es richtig. Im Sommer bereitet sie sich auf den Winter vor und in der Ernte ist sie fleißig. Gott gibt ihr genug Nahrung, aber das Sammeln zur rechten Zeit nimmt er ihr nicht ab. Dasselbe gilt für den Faulen. Er darf nicht warten, bis er „Lust“ aufs Arbeiten hat oder bis die Not ihn treibt - dann ist es schon viel zu spät. Deshalb ist die folgende Frage gerechtfertigt:", "f": [{"n": "292", "t": "W. Plural. Es geht um ein paar Nickerchen."}, {"n": "293", "t": "Schlummer bezeichnet einen leichten Schlaf."}, {"n": "294", "t": "Die „Hand“ reicht als Begriff von den Ellbogen bis zu den Fingerspitzen. Hier kann also auch ein Verschränken der Arme vor der Brust gemeint sein."}]}, "Spr 12,11": {"k": "Wer sein Land bebaut, wird mit Brot gesättigt werden; wer aber nichtigen Dingen nachjagt, ist unverständig . Dieser Vers spricht nicht gegen den Wert von Jobs außerhalb der Landwirtschaft. Am Beispiel des Bauern wird das Prinzip erläutert, dass fleißige Arbeit satt macht. Es kommt im Leben eben doch da- rauf an, die richtigen Dinge zu tun. Wer nichtigen Dingen nachjagt ist ein Träumer, ein Spieler, einer, der keine Verantwortung für sein Leben übernehmen will. Sein Leben dreht sich um Sachen, die ihn nicht weiter bringen (z.B. Computerspiele, Zeitunglesen, Träumen vom nächsten Urlaub usw.). Die nichtigen Dinge sind an sich keine Sünde, können Spaß machen, sie mögen eine Bereicherung für den Ruhetag darstellen, aber sie taugen nicht zur Ausrichtung des Le- bens. Wer sie zum Ziel seines Lebens erklärt ist unverständig . Ein solcher Mensch hat nicht verstanden, wie das Leben funktioniert und welchen realen Zwängen jeder Mensch unterworfen ist, wenn er überleben will. Das Ergebnis fleißiger Arbeit kann leicht von äußeren Umständen wie Naturkatastrophen oder Kriegen in Mitleidenschaft gezogen werden, aber das Prinzip gilt trotzdem. Außerdem gibt es „nichtige Dinge“, die viel Geld abwerfen und sich als äußerst lukrativ erwei- sen (z.B. Bill Gates Einstieg in die Computerindustrie, Mark Zucker- bergs Aufbau von facebook oder Emil Noldes Ausdauer als junger Maler). Vielleicht ist es nicht immer einfach, in einer modernen, technisierten Gesellschaft das Spektrum zu erfassen, das sich hinter der Formulierung wer sein Land bebaut versteckt. Und trotzdem wird sich nachdenkliches, fleißiges Arbeiten immer auszahlen. Welche „nichtigen Dinge“ gibt es in deinem Leben? Welchen Stellenwert nehmen sie ein? Wie viel Lebenszeit, Geld, kreative Energie oder Träume investierst du?", "f": [{"n": "518", "t": "W. es mangelt ihm an Herz."}, {"n": "519", "t": "Der Spruch wird in Sprüche 28,19 wiederholt (mit etwas verändertem Schluss)."}, {"n": "520", "t": "O. Fangnetz, Falle. Gemeint ist, was sich in der Falle befindet (Metonymie)."}]}, "Spr 14,23": {"k": "Bei jeder Mühe ist Gewinn, aber leeres Gerede <führt> nur zur Armut. Einsatz zahlt sich immer aus! Wer sich müht, der erwirbt einen Ge- winn . Dieser Vers sagt nicht, dass die Widrigkeiten des Lebens die- sen Profit nicht wieder zunichte machen können! Vielmehr ver- gleicht er leeres Geschwätz mit echter Mühe . Der Fleißige ist dem Schwätzer überlegen. Es reicht nicht von einer Idee immer nur zu reden, man muss sie auch in die Tat umsetzen. Wer dieses Prinzip nicht begreift, der wird Armut erfahren. Worte allein sind nicht ge- nug! Träumst und redest du manchmal von Dingen, die du tun müss- test, aber bist nicht bereit, sie anzupacken? Was für Sachen sind das?", "f": [{"n": "623", "t": "I.S.v. jeder einzelnen Mühe und jeder Art von Mühe."}, {"n": "624", "t": "W. das Reden der Lippen"}, {"n": "625", "t": "W. ist Betrug"}]}, "Spr 15,19": {"k": "Der Weg eines Faulen ist wie eine Dornenhecke, aber der Pfad der Aufrichtigen ist gebahnt. In Matthäus 25,26 nennt Jesus einen Menschen, der seine Talente nicht nutzt, „böser und fauler Knecht“. Hier wird durch die Antithese vom Faulen und vom Aufrichtigen dasselbe ausgedrückt. Faulheit ist eine Form von Boshaftigkeit und zahlt sich nicht aus. Der Lebensweg ( Pfad ) eines Aufrichtigen ist gebahnt , was nichts an- deres bedeutet, als dass er sicher ans Ziel kommt. Für den, der sich dazu entschließt sein Leben nach der offenbarten Weisheit Gottes auszurichten, gibt es keine unüberwindbaren Hindernisse. Ein sol- ches Leben kann anstrengend werden, aber nicht aussichtslos. Ganz anders der Weg eines Faulen . Sein Leben vergleicht Salomo mit einer Dornenhecke. Es ist eine schmerzhafte Erfahrung. Er mag Träume und Ziele haben, aber er wird sie nicht erreichen. Faulheit macht das Leben qualvoll. Welche Ziele möchtest du im Leben erreichen? Welchen „Pfad“ willst du einschlagen?", "f": [{"n": "646", "t": "Der sehr ähnliche Vers in Sprüche 10,1 betont an dieser Stelle den Kummer der Mutter."}]}, "Spr 18,9": {"k": "Auch wer sich lässig zeigt bei seiner Arbeit, der ist ein Bruder des Verderbers . Leben gelingt nur dem Fleißigen. Der Faulpelz oder wer sich lässig zeigt bei seiner Arbeit, der wird letztendlich sein Leben ruinieren. Der Lässige nimmt seine Pflichten nicht so genau. Er arbeitet mehr als der Faule, aber nicht gewissenhaft genug. Es bleiben solche Ar- beiten liegen, die er eigentlich hätte unbedingt erledigen müssen. Er tut sie aber nicht und so muss er die negativen Konsequenzen tra- gen. Folgen, die so gravierend sein können, dass er sein Leben gleich einer Plünderung hätte preisgeben können. In einer Agrargesell- schaft macht dieser Vers sofort Sinn. Wenn ich heute meine Tiere nicht füttere oder mein Feld nicht bestelle, dann gibt es einen Punkt, an dem ich mich nicht mehr darum kümmern muss, weil die Tiere verendet sind und der Zeitpunkt für die Aussaat vorüber ist. Das Prinzip gilt aber nicht nur für Bauern, sondern für jeden. Es gibt ein zu spät für die ganz wichtigen Aufgaben im Leben . Bist du der lässige Typ, der Arbeiten gern aufschiebt? Wo hast die Wahrheit dieses Spruches schon einmal am eigenen Leib erfahren? Wie findest du heraus, welche Aufgaben heute ganz besonders wichtig sind und nicht aufgeschoben werden dür- fen?", "f": [{"n": "759", "t": "Denke in diesem Zusammenhang auch an Politiker, Arbeitskollegen, Pastoren oder Menschen aus dem Showbusiness. Wo hast du dir eine Meinung über einen Menschen ge- bildet, von dem du nicht mehr kennst, als ein paar Artikel in der Klatschpresse?"}, {"n": "760", "t": "W. Herr der Zerstörung"}, {"n": "761", "t": "Beispiele gefällig? Ein Mann, der seiner Frau Romantik versagt, nicht mit ihr ausgeht, ihr keine Liebesbriefe schreibt und sie nicht ehrt, wird irgendwann ihr Herz verlieren. Wer nicht so früh wie möglich damit beginnt, Bibelverse auswendig zulernen, der wird sich im Alter schwer damit tun und ihm wird viel Prägung und Segen entgehen. Der Student, der Prüfungsvorbereitung nicht ernst nimmt, wird lernen müssen, dass man unvorbereitet nicht jede Prüfung besteht. Eltern, die lässig sind in der frühkindlichen Erziehung, werden feststellen, dass sie einen Teenager kaum mehr bändigen können."}, {"n": "762", "t": "W. und ist hoch. Es geht hier um die strategische Bedeutung eines Turms. Auf einem Turm kämpfe ich von oben nach unten und bin hinter der Brüstung kaum erreichbar für gegnerische Geschosse."}]}, "Spr 12,27": {"k": "Nicht brät der Lässige sein Wild; aber kostbares Gut ei- nes Menschen ist es, wenn er fleißig ist. Dieser im Grundtext schwierige Vers, kontrastiert zwei Menschen- typen: den Fleißigen und den „Entspannten“. Der Lässige ist hier identisch mit dem Faulen. Es fehlt ihm an Ent- schlusskraft. Er macht sich nicht auf, das Wild zu jagen und deshalb fehlt es ihm an Erfolgserlebnissen ( brät ). Ein Mensch, der fleißig ist , besitzt ein kostbares Gut , nämlichen einen Charakter, der von Initiative, Einsatzfreude, Spaß am Schaffen und Disziplin geprägt ist. Das Fleißigsein selbst ist ein Schatz, weil es ihm die Möglichkeit verschafft, seine Ziele zu erreichen. Wie beurteilst du persönlich den Wert eines fleißigen Charak- ters?", "f": [{"n": "546", "t": "W. die Lässigkeit"}, {"n": "547", "t": "Hier könnte man gut mit „ewiges Leben“ übersetzen, da es sich um das Gegenstück zu „Unsterblichkeit“ handelt. Auf alle Fälle ist hier mit dem Begriff „Leben“ mehr als „natürli- ches Leben“ gemeint. Siehe „Exkurs: Das Leben“."}, {"n": "548", "t": "S. Anmerkungen zu Sprüche 1,15."}, {"n": "549", "t": "W. ist Pfad"}, {"n": "550", "t": "W. „Nicht-Tod“, kein Tod; Der Begriff ist schwierig, da er ein hapax legomenon ist und die Konstruktion mit einer für Verben typischen Verneinung gebildet wird. Deshalb über- setzen hier alle antiken Versionen (und über 20 mittelalterliche Kodizes) gegen die Mehr- zahl der Kodizes in masoretischer Tradition mit „zum Tod“ und ändern die Bedeutung des Verses sinngebend ab. „Nicht-Tod“ ist im Ugaritischen und im nachbiblischen Hebräisch die Bezeichnung für „Unsterblichkeit“. Die Apokryphen formulieren recht ähnlich: „Denn die Gerechtigkeit kennt keinen Tod.“ Weisheit Salomos 1,15"}]}, "Spr 14,4": {"k": "Ohne Rinder ist der Stall sauber; aber es gibt viel Er- trag durch die Kraft eines Stieres. Natürlich machen Rinder Arbeit, aber wer auf sie als „Hilfsmittel“ verzichtet, der wir nicht viel Ertrag erwirtschaften, sein Stall ist sau- ber , aber seine Scheune leer. Wer klug investiert und sich z.B. der Kraft eines Stieres bedient, ge- winnt durch den Einsatz seines tierischen Traktors einen immensen Vorteil. Dieser Vers unterstreicht das Prinzip: Wer intelligent wirtschaften will, braucht die richtigen Arbeitsmittel. Man kann an der falschen Stelle sparen. In einer technologischen Gesellschaft bedeutet dieser Vers für mich, dass ich nicht immer nur sagen kann: „Brauch ich nicht!“ Ich muss nicht jeden Trend mitmachen, aber es lohnt sich, gut darüber nachzudenken, mit welchen Hilfsmitteln ich arbeiten sollte . Benutzt du für deinen Dienst die richtigen Arbeitsmittel? Was könnte dir helfen, dein Leben effektiver zu gestalten?", "f": [{"n": "590", "t": "Im Blick ist jede Form von Arbeitstier, das beim Pflügen, Ernten, Dreschen und Trans- portieren der Ernte hilft."}, {"n": "591", "t": "O. die Futterkrippe, der Futtertrog"}, {"n": "592", "t": "O. wenn man den Plural nicht abstrakt übersetzt, sondern als Plural stehen lässt: „Viele Ernten“."}, {"n": "593", "t": "Wie sehr hat mir eine gute To-Do-Liste, der Umstieg auf das MacBook Air und ein Smart- phone als Gebetsliste, Bibelverslerndatei und Notizbuch gut getan."}]}, "Spr 22,29": {"k": "<Spruch #6> Siehst du einen Mann, der gewandt ist in seinem Geschäft? Vor Königen wird er stehen, er wird nicht vor Niedrigen ste- hen. Dieser Spruch will Lust auf Leistung machen, indem er den Grund für ein erfolgreiches Geschäftsleben präsentiert: Es ist die Kompe- tenz des Geschäftsmannes. Wer seinen Job gut macht, wird eine in- ternationale Reputation bis in die höchsten Kreise ( Könige ) erlan- gen. Er wird bekannt, angesehen, einflussreich und wohlhabend werden. So jemand muss sich nicht mit den Niedrigen abgeben, die nichts zu sagen haben und kaum Profit abwerfen. Mach deinen Job gut, sei fleißig, fachkundig und geschickt! Dann ist dir der Erfolg si- cher. Bist du in den Dingen, die du tust (egal ob Schule oder Beruf), „gewandt“, d.h. geschickt, kompetent, fachkundig, fleißig...? Machst du deine Aufgaben „richtig“ oder neigst du zu Ober- flächlichkeit, Gleichgültigkeit und Inkompetenz? Sprüche 23,1 Wenn du dich hinsetzt, um mit einem Herrscher zu speisen, so beachte wohl, wen du vor dir hast; und setze ein Mes- ser an deine Kehle, wenn du gierig bist. Lass dich nicht gelüsten nach seinen Leckerbissen, denn sie sind eine verführerische Speise. Bemühe dich nicht, reich zu werden; lass ab von deiner Klugheit. Willst du deine Augen <auf Reichtümer> richten? Wenn du es machst, sind sie fort! Ganz sicher machen sie sich Flügel. Wie ein Adler werden sie gen Himmel fliegen. Iss nicht das Brot des Miss- günstigen, und lass dich nicht einmal nach seinen Leckerbissen ge- lüsten. Denn wie er in seinem Inneren denkt, so ist er <wirklich>. \"Iss und trink!\", spricht er zu dir, aber sein Herz ist nicht mit dir. Du wirst den Bissen, den du gegessen hast, ausspeien, und deine freundlichen Worte hast du verschwendet. Rede nicht zu den Oh- ren eines Toren, denn er wird die Klugheit deiner Worte verachten. Verrücke nicht die alte Grenze, und dringe nicht ein in die Felder der Waisen. Denn ihr Erlöser ist stark; er wird ihren Rechtsstreit wider dich führen. Bring dein Herz zur Unterweisung, und deine Ohren zu den Worten der Erkenntnis. Entziehe nicht dem Kna- ben die Züchtigung; wenn du ihn mit der Rute schlägst, wird er nicht sterben. Du schlägst ihn mit der Rute, und du errettest seine Seele von dem Scheol. Mein Sohn, wenn dein Herz weise ist, so wird sich mein Herz freuen – ja, meins; und meine Nieren wer- den frohlocken, wenn deine Lippen Geradheit reden. Dein Herz beneide nicht die Sünder, sondern eifere allezeit um die Furcht des H . Ganz gewiss gibt es ein Ende, und deine Hoffnung wird nicht abgeschnitten werden. Höre du, mein Sohn, und werde weise, und leite dein Herz geradeaus auf dem Weg. Sei nicht un- ter Weinsäufern, noch unter denen, die Fleisch verprassen; denn ein Säufer und ein Schlemmer verarmen, und Schlummer kleidet in Lumpen. Höre auf deinen Vater, der dich gezeugt hat, und verachte deine Mutter nicht, wenn sie alt geworden ist. Kaufe Wahrheit und verkaufe nicht Weisheit und Unterweisung und Ver- stand. Ganz sicher frohlockt der Vater eines Gerechten; und wer einen Weisen gezeugt hat, der freut sich über ihn. Lass deinen Vater und deine Mutter sich freuen, und lass, die dich geboren hat, frohlocken! Gib mir, mein Sohn, dein Herz, und lass deine Augen Gefallen haben an meinen Wegen! Denn die Hure ist eine tiefe Grube und die Fremde ein enger Brunnen; ja, sie lauert wie ein Bandit, und vermehrt die Treulosen unter den Menschen. Wer hat Ach, wer hat Weh, wer Streitereien, wer Leid, wer Wunden ohne Not? Wer ein Blitzen in den Augen? Die spät beim Wein sitzen, die einkehren, um den Mischkrug zu kosten. Sieh den Wein nicht an, wie er rot schimmert, wenn er im Becher funkelt, leicht hinun- tergleitet. Am Ende beißt er wie eine Schlange und vergiftet (dich) wie eine Viper. Deine Augen werden Seltsames sehen, und dein Mund wird verkehrte Dinge reden. Und du wirst wie einer sein, der auf Hoher See schläft, und wie einer, der auf der Spitze ei- nes Mastes schläft. \"Man hat mich geschlagen, es schmerzte mich nicht; man hat mich verprügelt, ich fühlte es nicht. Wann werde ich aufwachen, um damit weiterzumachen, ihn noch mehr zu suchen?\"", "f": [{"n": "918", "t": "Die 30 Sprüche beginnen mit Sprüche 22,20.21."}, {"n": "919", "t": "Oder: was"}, {"n": "920", "t": "Wörtlich: Speise der Lügen (o. Verführungen)"}]}, "Spr 24,27": {"k": "Erledige draußen deine Arbeit und stelle sie für dich fertig auf dem Feld; danach sollst du dann dein Haus bauen. Diesmal geht es um die richtigen Prioritäten bei der Arbeit. Es kommt auf die Reihenfolge an, wenn man im Leben Erfolg haben will. Das Bild setzt eine Gesellschaft voraus, wie wir sie im Buch Ruth finden. Man wohnte in der Stadt und hatte draußen seine Fel- der für den Anbau von Feldfrüchten und als Weide für das Vieh. Es ist völlig logisch, dass ich zuerst die Felder bearbeiten muss, bevor ich mir Zeit nehme, mein Haus zu bauen. Die Arbeit draußen stellt nämlich die ökonomische Grundlage für den Hausbau dar. Erst kommt das Bestellen der Felder und dann, wenn alles fertig ist und langsam vor sich hinwächst, ist die Zeit gekommen, das Wohnhaus zu bauen (bzw. auszubauen). Es gibt Aufgaben, die sind wichtig und dringend, und deshalb sollte man sie zuerst erledigen. Auch der Hausbau ist wichtig, aber eben nicht dringend. Man kann sich damit beschäftigen, wenn man die überlebensnotwendigen Aufgaben er- ledigt hat. Welche Aufgaben in deinem Leben sind wichtig und dringend (zeitgebunden)? Wie sorgst du dafür, dass diese Aufgaben rechtzeitig erledigt werden?", "f": [{"n": "962", "t": "Oder: gerade, recht, richtig, aufrichtig,"}, {"n": "963", "t": "Herodot beschreibt die Praxis der Perser, dass gleichrangige Männer, die sich treffen, einander auf den Mund küssen (Historien 1.134). Ein seelsorgerlicher Rat: Aus diesem Vers wird gern das Prinzip abgeleitet, dass junge Menschen erst heiraten sollen („das Haus bauen“), wenn sie genügend eigenes Geld verdienen, um sich ernähren zu können („erledige draußen deine Arbeit“). So wünschenswert es sein mag, als Ehepaar von den Eltern unabhängig zu sein, so sehr muss man sich auch der Grenzen dieses Verses bewusst sein. Heute warten junge Leute kein halbes Jahr auf die Hochzeit, bis das Feld bearbeitet ist, sondern sie warten teilweise ein halbes Jahrzehnt aufeinander, brennen vor Verlangen und das in einer"}, {"n": "965", "t": "Der Einschub soll die im Text enthaltene rhetorische Frage hervorheben."}, {"n": "966", "t": "Gemeint ist hier natürlich die Aussage, die der Zeuge macht."}]}, "Spr 27,18": {"k": "Wer den Feigenbaum hegt, wird seine Frucht essen; und wer über seinen Herrn wacht, wird geehrt werden. Der Weise versteht, dass Erfolg und Ehre nicht einfach so und auch nicht über Nacht kommen. Wer Früchte ernten will, der muss seinen Feigenbaum über Monate hinweg hegen und pflegen. Wer von sei- nem Chef ( Herrn ) Anerkennung bekommen will, der muss seine Aufgaben nicht nur ab und zu erledigen, sondern auf Jahre hinaus immer wieder gute Arbeit abliefern. Bist du treu in den Aufgaben, die man dir anvertraut? Bist du bereit, auf Erfolge im Leben hinzuarbeiten und dich darum zu kümmern, dass es deinem „Feigenbaum“ gut geht? Um welche „Feigenbäume“ musst du dich in deinem Leben kümmern?", "f": [{"n": "1026", "t": "Den Begriff Scheol kann man je nach Zusammenhang mit Grube, Grab oder Hölle über- setzen. Siehe Exkurs: Der Scheol."}]}, "Spr 12,9": {"k": "Besser, wer gering ist und einen Knecht hat, als wer vor- nehm tut und hat <doch> Mangel an Brot. Dieser Spruch macht Mut, zu seinen eigenen Möglichkeiten zu ste- hen. Wer vornehm tut , will durch seinen Lebensstil beeindrucken. Ein solcher Mensch ist ein Angeber und Aufschneider. Sein Erschei- nungsbild (z.B. das Auto, die Kleidung oder die Geschenke, die er macht) täuscht über den Mangel hinweg, von dem sein Leben in Wahrheit geprägt ist. Statt sich satt zu essen ( Mangel an Brot ), ver- braucht er seine kümmerlichen Ressourcen, um einen Schein von Wohlstand aufrecht zu erhalten. Der Besitz eines Sklaven ( Knecht ) ist noch kein Ausdruck von Reich- tum. Mäßiger Wohlstand, der uns satt macht, aber in den Augen der Gesellschaft gering erscheinen lässt, ist besser als Heuchelei. Paulus wird schreiben: „Die Gottseligkeit aber mit Genügsamkeit ist ein großer Gewinn.“ (1Timotheus 6,6) Es ist kein erstrebenswertes Ziel, in den Augen der Anderen besser da zu stehen, als wir es in Wirk- lichkeit sind. Wir leben unser Leben nicht, um die Gesellschaft zu beeindrucken , sondern um sie zu prägen. Was ich mir nicht leis- ten kann, das brauche ich mir auch nicht zu kaufen. Ich bin nicht, was meine Statussymbole vorgeben, und ich bin kein Sklave der ge- sellschaftlichen Erwartung. Ich bin ich, so wie Gott mich berufen hat, am richtigen Platz mit den richtigen Ressourcen ausgestattet, um meine Aufgabe im Reich Gottes zu erfüllen (1Korinther 7,20.21). Wo versuchst du in deinem Leben vor anderen Menschen „Ein- druck zu schinden“? Entspricht dein Auftreten in der Gesell- schaft (Auto, Handy, Urlaub, Kleidung, Wohnung usw.) deinem tatsächlichen Einkommen?", "f": [{"n": "514", "t": "Gemeint ist: Jemand, der es zulässt, dass man ihn für unbedeutend hält."}, {"n": "515", "t": "Das Prinzip gilt auch für die Bereiche Kompetenz und Religiosität. Wie leicht geschieht es, dass wir nicht zu unserem Unwissen stehen und geistlicher erscheinen wollen, als wir es in Wirklichkeit sind!"}, {"n": "516", "t": "W. Seele, Leben."}, {"n": "517", "t": "O. Empfinden."}]}, "Spr 15,17": {"k": "Besser ein Gericht Gemüse mit Liebe als ein gemästeter Ochse mit Hass. Hier steht das Gericht Gemüse für ein bescheidenes Essen, qualitativ und quantitativ nicht wirklich überzeugend, aber, weil von Men- schen gegessen, die sich in Liebe zugetan sind, wird diese einfache Mahlzeit zum Genuss und hat einen großen Wert. Anders ein gemäs- teter Ochse , Bild für das beste und feinste Essen (vgl. Lukas 15,23), wenn man ihn mit Menschen „genießt“, die man nicht mag ( Hass ). Unser Herz sehnt sich mehr nach guter Gemeinschaft und Liebe als nach gutem Essen. Ein einfaches Abendessen unter Freunden mit billigem Wein und fettigen Würstchen ist befriedigender als ein Abend im Nobel-Restaurant unter Arbeitskollegen, die sich spinnefeind sind. Passen wir auf, dass Luxus uns nicht dazu ver- führt, die wirklich wichtigen Dinge im Leben nicht wertzuschätzen. Wann hast du die Wahrheit dieses Spruches das letzte Mal in deinem Leben erfahren und gute Gemeinschaft „mit Liebe“ ge- nossen?", "f": []}, "Spr 20,1": {"k": "Der Wein ist ein Spötter, Rauschtrank ein Krakeeler, und jeder, der davon torkelt ist nicht weise. Die Bibel warnt vor dem falschen Umgang mit Alkohol. Wer zu viel trinkt ( torkelt ) und sich nicht mehr im Griff hat, der ist nicht weise. Wein erfreut das Herz des Menschen (Psalm 104,15; vgl. Prediger 10,19) und ist ein Zeichen von göttlichem Segen (1Mose 27,28), aber Gott verbietet das Betrinken (Epheser 5,18), weil der Betrunkene seine Zunge nicht mehr unter Kontrolle hat. Er wird zum Spötter, Krakeeler, schimpft, macht anzügliche Bemerkungen, provoziert und fängt Streit an. Mit Weisheit hat so ein Verhalten nichts zu tun. Wann hast du dich das letzte Mal betrunken? Welche schlech- ten Erfahrungen hast du schon mit betrunkenen Freunden ge- macht? Bist du sicher, dass du kein Alkoholproblem hast?", "f": [{"n": "831", "t": "O.: Besitz, Los"}, {"n": "832", "t": "Ein alkoholhaltiges Getränk aus Gerste (Bier), Honig (Met) oder ein Synonym für Wein (4Mose 28,7)."}, {"n": "833", "t": "W. die Furcht des Königs"}, {"n": "834", "t": "O. sündigt gegen seine Seele"}]}, "Spr 25,16": {"k": "Hast du Honig gefunden, so iss, bis du genug hast, damit du davon nicht zu viel bekommst und ihn erbrichst. Honig konnte gefunden werden, wenn man auf einen Stock wilder Bienen traf (vgl. Richter 14,8.9; 1Samuel 14,26.27). Honig ist süß und nahrhaft. Isst man jedoch mehr, als einem gut tut, muss man damit rechnen, dass man sich übergibt. Der Spruch ermutigt dazu, leckeres Essen zu genießen, aber dabei nicht die Selbstbeherr- schung zu verlieren. Zu viel Leckereien sind ungesund . Verlierst du bei gutem Essen manchmal die Beherrschung und isst wie ein Scheunendrescher? Gibt es bestimmte Lebensmit- tel, nach denen du „süchtig“ bist? Tut dir das gut?", "f": []}, "Spr 27,7": {"k": "Eine satte Seele zertritt Honigseim ; aber der hungrigen Seele ist alles Bittere süß. Während der Satte das beste Essen verachtet, ist der Ausgehungerte bereit, alles zu essen. Beide begehen einen Fehler. Der Volle kann das Gute nicht wertschätzen und der Hungrige isst alles – auch das, was ihm nicht gut tut oder die gegen Gottes Willen sind. Im Hinblick auf menschliche Bedürfnisse (Essen, Sport, Genussmit- tel, Gemeinschaft, Feiern, Freundschaft, ...) sollten wir immer die Mitte zwischen übermäßigem Genuss und Mangel anstreben. Zuviel des Guten macht uns blind für den Wert der guten Gaben Gottes. Ge- nuss wird so zur Qual. Eine ausgehungerte Seele hingegen, die sich nach etwas Genuss verzehrt, wird schließlich auch solche Formen des Genusses akzeptieren, die ihr nicht gut tun. Es ist ebenso falsch, der eigenen Seele das Gute vorzuenthalten, wie es falsch
