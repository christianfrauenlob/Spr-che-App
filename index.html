<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sprüche 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--col:#1F3864;--bg:#f4f6fb;--card:#fff;--text:#111;--sub:#666;--border:#dde;--rep:#44546A}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
#topbar{position:sticky;top:0;z-index:100;background:var(--col);color:#fff;
  padding:10px 14px 0;box-shadow:0 2px 8px rgba(0,0,0,.25)}
#tb-row{display:flex;align-items:center;gap:10px}
#wn-block{display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,.15);border-radius:8px;padding:4px 10px;min-width:46px}
#wn-big{font-size:1.5rem;font-weight:700;line-height:1.1}
#wn-lbl{font-size:.62rem;opacity:.65;text-transform:uppercase;letter-spacing:.06em}
#tb-meta{flex:1;min-width:0}
#tb-short{font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#tb-date{font-size:.68rem;opacity:.6;margin-top:2px}
#tb-block{font-size:.63rem;opacity:.45;letter-spacing:.05em}
#nav-btns{display:flex;gap:6px}
.nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;
  border-radius:7px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:rgba(255,255,255,.3)}
#progress{height:2px;background:rgba(255,255,255,.18);border-radius:2px;overflow:hidden;margin-top:6px}
#progress-bar{height:100%;background:rgba(255,255,255,.7);transition:width .3s}
#modebar{display:flex;background:#fff;border-bottom:1px solid var(--border);
  position:sticky;top:var(--topbar-h,100px);z-index:99}
.mode-btn{flex:1;padding:9px 2px;border:none;background:none;font-size:.76rem;
  color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;line-height:1.2}
.mode-btn.active{color:var(--col);border-bottom-color:var(--col);font-weight:600}
#dots{display:flex;justify-content:center;gap:5px;padding:7px 0 3px;
  background:#fff;border-bottom:1px solid var(--border)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .2s}
.dot.active{background:var(--col)}.dot.rep{background:#c8c8c8}
#mode-hint{padding:6px 14px;font-size:.74rem;color:var(--sub);
  background:#fff;border-bottom:1px solid var(--border)}
#slider{flex:1;overflow:hidden;position:relative}
#slides{display:flex;transition:transform .3s cubic-bezier(.4,0,.2,1);height:100%}
.slide{min-width:100vw;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.vcard{background:#fff;border-radius:11px;box-shadow:0 1px 4px rgba(0,0,0,.07);
  overflow:hidden;border-left:4px solid var(--col);cursor:pointer;transition:transform .12s,box-shadow .15s}
.vcard:active{box-shadow:0 2px 10px rgba(0,0,0,.14);transform:scale(.985)}
.vcard-inner{padding:10px 13px 12px}
.vcard-ref{font-size:.72rem;font-weight:700;letter-spacing:.07em;color:var(--col);
  text-transform:uppercase;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.vcard-badge{font-size:.64rem;opacity:.4;font-weight:400}
.vcard-text{font-size:1rem;line-height:1.65;color:var(--text)}
.anker-hide{color:#c5c9d4;letter-spacing:.07em}
.einstieg-hide{display:inline-block;background:#e5e9f4;border-radius:3px;color:transparent;
  min-width:2ch;user-select:none}
.rep-card{background:var(--rep);color:#fff;border-radius:11px;padding:22px 18px;text-align:center}
.rep-title{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.rep-sub{font-size:.88rem;opacity:.75;margin-bottom:10px}
.rep-hint{font-size:.78rem;opacity:.5;line-height:1.5}
/* ── Sheet ── */
#ks{position:fixed;inset:0;z-index:200;pointer-events:none;opacity:0;transition:opacity .25s;display:flex;flex-direction:column}
#ks.open{pointer-events:all;opacity:1}
#ks-bg{position:absolute;inset:0;background:rgba(0,0,0,.45)}
#ks-panel{position:absolute;bottom:0;left:0;right:0;max-height:92vh;display:flex;flex-direction:column;
  background:#fff;border-radius:18px 18px 0 0;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#ks.open #ks-panel{transform:translateY(0)}
#ks-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 4px}
#ks-header{padding:0 16px 12px;border-bottom:1px solid #eee}
#ks-hrow{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
#ks-ref{font-size:1rem;font-weight:700;letter-spacing:.05em}
#ks-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#888;
  padding:2px 4px;line-height:1;border-radius:6px;flex-shrink:0}
#ks-close:active{background:#f0f0f0}
#ks-verse{font-size:.86rem;color:#555;margin-top:5px;font-style:italic;line-height:1.5}
#ks-body{overflow-y:auto;padding:16px;flex:1;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
#ks-komm{font-size:.97rem;line-height:1.78;color:#222}
/* footnotes */
.fn-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;
  padding:10px 0;border-top:1px solid #eee;margin-top:12px;user-select:none}
.fn-toggle-icon{width:20px;height:20px;border-radius:50%;background:var(--col);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
.fn-toggle-icon svg{fill:#fff}
.fn-toggle.open .fn-toggle-icon{transform:rotate(90deg)}
.fn-toggle-label{font-size:.8rem;font-weight:600;color:var(--col)}
.fn-toggle-count{font-size:.72rem;color:#999;margin-left:auto}
.fn-list{display:none;flex-direction:column;gap:8px;padding-bottom:4px}
.fn-list.open{display:flex}
.fn-item{background:#f7f8fc;border-radius:8px;padding:10px 12px;
  border-left:3px solid var(--col);opacity:.9}
.fn-nr{font-size:.68rem;font-weight:700;color:var(--col);letter-spacing:.04em;margin-bottom:4px}
.fn-text{font-size:.86rem;line-height:1.6;color:#2a2a2a}
#ks-footer{padding:12px 16px 16px;border-top:1px solid #eee}
#ks-back{width:100%;padding:13px;background:var(--col);color:#fff;border:none;
  border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit}
#ks-back:active{opacity:.85}
#ks-src{font-size:.65rem;color:#bbb;text-align:center;margin-top:6px}
</style>
</head>
<body>
<div id="topbar">
  <div id="tb-row">
    <div id="wn-block"><div id="wn-big">1</div><div id="wn-lbl">Woche</div></div>
    <div id="tb-meta">
      <div id="tb-short">–</div>
      <div id="tb-date">–</div>
      <div id="tb-block">–</div>
    </div>
    <div id="nav-btns">
      <button class="nav-btn" onclick="nav(-1)">&#8592;</button>
      <button class="nav-btn" onclick="nav(1)">&#8594;</button>
    </div>
  </div>
  <div id="progress"><div id="progress-bar"></div></div>
</div>
<div id="modebar">
  <button class="mode-btn active" onclick="setMode(0)">📖 Volltext</button>
  <button class="mode-btn"        onclick="setMode(1)">🔍 Einstieg</button>
  <button class="mode-btn"        onclick="setMode(2)">⚓ Anker</button>
</div>
<div id="dots"></div>
<div id="mode-hint">Vers antippen → Kommentar lesen</div>
<div id="slider"><div id="slides"></div></div>

<div id="ks" onclick="bgClick(event)">
  <div id="ks-bg"></div>
  <div id="ks-panel">
    <div id="ks-handle"></div>
    <div id="ks-header">
      <div id="ks-hrow">
        <div><div id="ks-ref"></div><div id="ks-verse"></div></div>
        <button id="ks-close" onclick="closeKS()">&#x2715;</button>
      </div>
    </div>
    <div id="ks-body">
      <div id="ks-komm"></div>
      <div id="ks-fn-area"></div>
    </div>
    <div id="ks-footer">
      <button id="ks-back" onclick="closeKS()">← Zurück zum Lernplan</button>
      <div id="ks-src"></div>
    </div>
  </div>
</div>

<script>
const WEEKS=[{"wn": 1, "typ": "L", "zeitraum": "31.05.2026 – 06.06.2026", "date_start": "2026-05-31", "date_end": "2026-06-06", "short": "Aufbruch in die Weisheit", "thema": "Fundament der Weisheit I – Anfang und Suchen", "verse": [{"ref": "1,7", "text": "Die Furcht des HERRN ist der Anfang der Erkenntnis; die Narren verachten Weisheit und Unterweisung.", "optional": false}, {"ref": "2,1", "text": "Mein Sohn, wenn du meine Reden annimmst und meine Gebote bei dir verwahrst,", "optional": false}, {"ref": "2,2", "text": "so dass du dein Ohr aufmerksam auf Weisheit hören lässt, dein Herz neigst zum Verständnis;", "optional": false}, {"ref": "2,3", "text": "ja, wenn du den Verstand anrufst, deine Stimme erhebst zum Verständnis,", "optional": false}, {"ref": "2,4", "text": "wenn du ihn suchst wie Silber und ihm nachspürst wie nach verborgenen Schätzen,", "optional": false}, {"ref": "2,5", "text": "dann wirst du die Furcht des HERRN verstehen und die Erkenntnis Gottes finden.", "optional": false}], "color": "#1F3864", "block": "Block I – Fundament & Gottesbeziehung"}, {"wn": 2, "typ": "L", "zeitraum": "07.06.2026 – 13.06.2026", "date_start": "2026-06-07", "date_end": "2026-06-13", "short": "Weisheit schützt und trägt", "thema": "Fundament der Weisheit II – Wirkung und Vertrauen", "verse": [{"ref": "2,9", "text": "Dann wirst du Gerechtigkeit verstehen und Recht und Geradheit, jede Bahn des Guten.", "optional": false}, {"ref": "2,10", "text": "Denn Weisheit wird in dein Herz kommen, und Erkenntnis wird deiner Seele lieblich sein.", "optional": false}, {"ref": "2,11", "text": "Besonnenheit wird über dich wachen, Verständnis dich behüten:", "optional": false}, {"ref": "2,12", "text": "um dich zu erretten von dem bösen Weg, von dem Mann, der Verkehrtes redet;", "optional": false}, {"ref": "3,5", "text": "Vertraue auf den HERRN mit deinem ganzen Herzen, und stütze dich nicht auf deinen Verstand.", "optional": false}, {"ref": "3,6", "text": "Erkenne ihn auf allen deinen Wegen, und er wird gerade machen deine Pfade.", "optional": false}, {"ref": "22,19", "text": "Damit dein Vertrauen auf den HERRN sei, habe ich heute dich, ja dich belehrt.", "optional": false}], "color": "#1F3864", "block": "Block I – Fundament & Gottesbeziehung"}, {"wn": 3, "typ": "L", "zeitraum": "14.06.2026 – 20.06.2026", "date_start": "2026-06-14", "date_end": "2026-06-20", "short": "Das Böse hassen – Gott fürchten", "thema": "Furcht des HERRN als Lebenshaltung", "verse": [{"ref": "8,13", "text": "Die Furcht des HERRN ist: das Böse hassen. Stolz und Hochmut und den Weg des Bösen und den Mund der Verkehrtheit hasse ich.", "optional": false}, {"ref": "10,27", "text": "Die Furcht des HERRN mehrt die Tage, aber die Jahre der Gottlosen werden verkürzt.", "optional": false}, {"ref": "14,2", "text": "Wer in seiner Geradheit wandelt, fürchtet den HERRN; wer aber in seinen Wegen verkehrt ist, verachtet ihn.", "optional": false}, {"ref": "15,16", "text": "Besser wenig mit der Furcht des HERRN, als ein großer Schatz und Unruhe dabei.", "optional": false}, {"ref": "16,6", "text": "Durch Güte und Wahrheit wird die Ungerechtigkeit gesühnt, und durch die Furcht des HERRN weicht man vom Bösen.", "optional": false}, {"ref": "23,17", "text": "Dein Herz beneide nicht die Sünder, sondern beeifere sich jeden Tag um die Furcht des HERRN.", "optional": false}], "color": "#1F3864", "block": "Block I – Fundament & Gottesbeziehung"}, {"wn": 4, "typ": "L", "zeitraum": "21.06.2026 – 27.06.2026", "date_start": "2026-06-21", "date_end": "2026-06-27", "short": "Gottes Blick, Gebet und Wort", "thema": "Gottes Urteil, Gebet und Gottes Wort", "verse": [{"ref": "15,8", "text": "Das Opfer der Gottlosen ist dem HERRN ein Gräuel, aber das Gebet der Aufrichtigen sein Wohlgefallen.", "optional": false}, {"ref": "15,29", "text": "Der HERR ist fern von den Gottlosen, aber das Gebet der Gerechten hört er.", "optional": false}, {"ref": "16,2", "text": "Alle Wege eines Mannes sind rein in seinen Augen, aber der HERR wägt die Geister.", "optional": false}, {"ref": "16,3", "text": "Befiehl dem HERRN deine Werke, und deine Gedanken werden zustande kommen.", "optional": false}, {"ref": "28,9", "text": "Wer sein Ohr abwendet vom Hören des Gesetzes: Sogar sein Gebet ist ein Gräuel.", "optional": false}, {"ref": "30,5", "text": "Alle Rede Gottes ist geläutert; ein Schild ist er denen, die bei ihm Zuflucht suchen.", "optional": false}], "color": "#1F3864", "block": "Block I – Fundament & Gottesbeziehung"}, {"wn": 5, "typ": "L", "zeitraum": "28.06.2026 – 04.07.2026", "date_start": "2026-06-28", "date_end": "2026-07-04", "short": "Von Gott geformt und bewahrt", "thema": "Gottes Zucht und das bewahrte Herz", "verse": [{"ref": "3,11", "text": "Mein Sohn, verwirf nicht die Züchtigung des HERRN und sei nicht unwillig über seine Zurechtweisung;", "optional": false}, {"ref": "3,12", "text": "Denn wen der HERR liebt, den züchtigt er, und zwar wie ein Vater den Sohn, an dem er Wohlgefallen hat.", "optional": false}, {"ref": "4,23", "text": "Mehr als alles, was man zu bewachen hat, behüte dein Herz; denn von ihm hängt das Leben ab.", "optional": false}, {"ref": "4,24", "text": "Tu von dir die Verkehrtheit des Mundes, und die Verdrehtheit der Lippen entferne von dir.", "optional": false}, {"ref": "4,25", "text": "Lass deine Augen geradeaus blicken und deine Wimpern gerade vor dich hinschauen.", "optional": false}, {"ref": "4,26", "text": "Ebne die Bahn deines Fußes, und alle deine Wege seien gerade;", "optional": false}, {"ref": "4,27", "text": "biege nicht ab zur Rechten noch zur Linken, wende deinen Fuß ab vom Bösen.", "optional": false}], "color": "#1F3864", "block": "Block I – Fundament & Gottesbeziehung"}, {"wn": 6, "typ": "L", "zeitraum": "05.07.2026 – 11.07.2026", "date_start": "2026-07-05", "date_end": "2026-07-11", "short": "Das Herz kennen", "thema": "Herz, Innenleben und Selbstprüfung", "verse": [{"ref": "14,13", "text": "Auch beim Lachen hat das Herz Kummer, und das Ende der Freude ist Traurigkeit.", "optional": false}, {"ref": "18,14", "text": "Der Geist eines Mannes erträgt seine Krankheit; aber ein zerschlagener Geist, wer richtet ihn auf?f", "optional": false}, {"ref": "19,3", "text": "Die Narrheit des Menschen verdirbt seinen Weg, und sein Herz grollt gegen den HERRN.", "optional": false}, {"ref": "20,5", "text": "Tiefes Wasser ist der Ratschluss im Herzen des Mannes, aber ein verständiger Mann schöpft ihn heraus.", "optional": false}, {"ref": "20,6", "text": "Die meisten Menschen rufen ein jeder seine Güte aus; aber einen zuverlässigen Mann, wer wird ihn finden?", "optional": false}, {"ref": "28,26", "text": "Wer auf sein Herz vertraut, der ist ein Tor; wer aber in Weisheit wandelt, der wird entkommen.", "optional": false}], "color": "#1F3864", "block": "Block I – Fundament & Gottesbeziehung"}, {"wn": 7, "typ": "R", "zeitraum": "12.07.2026 – 18.07.2026", "date_start": "2026-07-12", "date_end": "2026-07-18", "label": "Wiederholung I", "sub": "Wochen 1–6 · Block I"}, {"wn": 8, "typ": "L", "zeitraum": "19.07.2026 – 25.07.2026", "date_start": "2026-07-19", "date_end": "2026-07-25", "short": "Hochmut fällt – Demut trägt", "thema": "Hochmut, Demut und Selbstdarstellung", "verse": [{"ref": "15,25", "text": "Das Haus der Stolzen reißt der HERR nieder, aber die Grenze der Witwe stellt er fest.", "optional": false}, {"ref": "18,12", "text": "Vor dem Sturze wird das Herz des Mannes überheblich, und der Ehre geht Demut voraus.", "optional": false}, {"ref": "21,4", "text": "Stolz der Augen und Überheblichkeit des Herzens, die Leuchte der Gottlosen, sind Sünde.", "optional": false}, {"ref": "27,2", "text": "Es rühme dich ein anderer und nicht dein Mund, ein Fremder und nicht deine Lippen.", "optional": false}, {"ref": "29,23", "text": "Des Menschen Stolz wird ihn erniedrigen; wer aber demütig ist, wird Ehre erlangen.", "optional": false}], "color": "#375623", "block": "Block II – Innenleben & Sprache"}, {"wn": 9, "typ": "L", "zeitraum": "26.07.2026 – 01.08.2026", "date_start": "2026-07-26", "date_end": "2026-08-01", "short": "Auf geradem Weg", "thema": "Geradheit, Lauterkeit und gerechter Weg", "verse": [{"ref": "10,2", "text": "Schätze der Gottlosigkeit nützen nichts, aber Gerechtigkeit errettet vom Tod.", "optional": false}, {"ref": "11,4", "text": "Vermögen nützt nichts am Tag des Zorns, aber Gerechtigkeit errettet vom Tod.", "optional": false}, {"ref": "10,3", "text": "Der HERR lässt die Seele des Gerechten nicht hungern, aber die Gier der Gottlosen stößt er zurück.", "optional": false}, {"ref": "10,9", "text": "Wer in Lauterkeit wandelt, wandelt sicher; wer aber seine Wege krümmt, wird bekannt werden.", "optional": false}, {"ref": "11,1", "text": "Trügerische Waagschalen sind dem HERRN ein Gräuel, aber volles Gewicht ist sein Wohlgefallen.", "optional": false}, {"ref": "21,8", "text": "Vielgewunden ist der Weg des schuldbeladenen Mannes; der Lautere aber, sein Tun ist gerade.", "optional": false}, {"ref": "28,6", "text": "Besser ein Armer, der in seiner Lauterkeit wandelt, als ein Verkehrter, der auf zwei Wegen geht und dabei reich ist.", "optional": false}], "color": "#375623", "block": "Block II – Innenleben & Sprache"}, {"wn": 10, "typ": "L", "zeitraum": "02.08.2026 – 08.08.2026", "date_start": "2026-08-02", "date_end": "2026-08-08", "short": "Die gezähmte Zunge", "thema": "Selbstbeherrschung im Reden und im Geist", "verse": [{"ref": "12,16", "text": "Der Unmut des Narren tut sich am selben Tag kund, aber der Kluge verbirgt den Schimpf.", "optional": false}, {"ref": "12,23", "text": "Ein kluger Mensch hält die Erkenntnis verborgen, aber das Herz der Toren ruft Narrheit aus.", "optional": false}, {"ref": "15,1", "text": "Eine milde Antwort wendet den Grimm ab, aber ein kränkendes Wort erregt den Zorn.", "optional": false}, {"ref": "15,28", "text": "Das Herz des Gerechten überlegt, um zu antworten; aber der Mund der Gottlosen sprudelt Bosheiten hervor.", "optional": false}, {"ref": "16,32", "text": "Besser ein Langmütiger als ein Held, und wer seinen Geist beherrscht, als wer eine Stadt erobert.", "optional": false}, {"ref": "17,27", "text": "Wer seine Worte zurückhält, besitzt Erkenntnis; und wer kühlen Geistes ist, ist ein verständiger Mann.", "optional": false}], "color": "#375623", "block": "Block II – Innenleben & Sprache"}, {"wn": 11, "typ": "L", "zeitraum": "09.08.2026 – 15.08.2026", "date_start": "2026-08-09", "date_end": "2026-08-15", "short": "Schädliche Rede", "thema": "Hass, Verleumdung und verkehrte Rede", "verse": [{"ref": "10,12", "text": "Hass erregt Zwietracht, aber Liebe deckt alle Übertretungen zu.", "optional": false}, {"ref": "10,18", "text": "Wer Hass verbirgt, hat Lügenlippen; und wer Verleumdung verbreitet, ist ein Tor.", "optional": false}, {"ref": "11,12", "text": "Wer seinen Nächsten verachtet, hat keinen Verstand; der Verständige schweigt.", "optional": false}, {"ref": "11,13", "text": "Der Verleumder deckt Geheimnisse auf; der Treue deckt die Sache zu.", "optional": false}, {"ref": "26,22", "text": "Die Worte des Ohrenbläsers sind wie Leckerbissen, und sie dringen hinab in das Innerste des Leibes.", "optional": false}, {"ref": "26,24", "text": "Der Hasser verstellt sich mit seinen Lippen, aber in seinem Innern hegt er Trug.", "optional": false}], "color": "#375623", "block": "Block II – Innenleben & Sprache"}, {"wn": 12, "typ": "L", "zeitraum": "16.08.2026 – 22.08.2026", "date_start": "2026-08-16", "date_end": "2026-08-22", "short": "Belehrbar bleiben", "thema": "Belehrbarkeit, Zucht und Korrektur", "verse": [{"ref": "13,10", "text": "Durch Übermut gibt es nur Zank, bei denen aber, die sich raten lassen, Weisheit.", "optional": false}, {"ref": "10,8", "text": "Wer weisen Herzens ist, nimmt Gebote an; aber ein närrischer Schwätzer kommt zu Fall.", "optional": false}, {"ref": "18,15", "text": "Das Herz des Verständigen erwirbt Erkenntnis, und das Ohr der Weisen sucht nach Erkenntnis.", "optional": false}, {"ref": "19,25", "text": "Schlägst d  "Die Ameise lehrt", "thema": "Fleiß, Faulheit und konkrete Arbeit", "verse": [{"ref": "6,6", "text": "Geh hin zur Ameise, du Fauler, sieh ihre Wege und werde weise.", "optional": false}, {"ref": "6,7", "text": "Sie, die keinen Anführer hat, keinen Vorgesetzten noch Gebieter,", "optional": false}, {"ref": "6,8", "text": "sie bereitet im Sommer ihr Brot, sammelt in der Ernte ihre Nahrung ein.", "optional": false}, {"ref": "12,11", "text": "Wer sein Land bebaut, wird mit Brot gesättigt werden; wer aber nichtigen Dingen nachjagt, ist unverständig.", "optional": false}, {"ref": "14,23", "text": "Bei jeder Mühe wird Gewinn sein, aber Lippengerede gereicht nur zum Mangel.", "optional": false}, {"ref": "15,19", "text": "Der Weg des Faulen ist wie eine Dornenhecke, aber der Pfad der Aufrichtigen ist gebahnt.", "optional": false}, {"ref": "18,9", "text": "Auch wer sich lässig zeigt in seiner Arbeit, ist ein Bruder des Verderbers.", "optional": false}], "color": "#7B3F00", "block": "Block III – Arbeit & Besitz"}, {"wn": 16, "typ": "L", "zeitraum": "13.09.2026 – 19.09.2026", "date_start": "2026-09-13", "date_end": "2026-09-19", "short": "Arbeit, die bleibt", "thema": "Arbeit, Prioritäten und Treue", "verse": [{"ref": "12,27", "text": "Nicht erjagt der Lässige sein Wild; aber kostbares Gut eines Menschen ist es, wenn er fleißig ist.", "optional": false}, {"ref": "14,4", "text": "Wo keine Rinder sind, ist die Krippe rein; aber viel Ertrag ist durch die Kraft des Stieres.", "optional": false}, {"ref": "22,29", "text": "Siehst du einen Mann, der gewandt ist in seinem Geschäft – vor Königen wird er stehen, er wird nicht vor Niedrigen stehen.", "optional": false}, {"ref": "24,27", "text": "Besorge draußen deine Arbeit und bestelle sie dir auf dem Feld; danach magst du dann dein Haus bauen.", "optional": false}, {"ref": "27,18", "text": "Wer den Feigenbaum pflegt, wird seine Frucht essen; und wer über seinen Herrn wachte, wird geehrt werden.", "optional": false}], "color": "#7B3F00", const KOMM={"Spr 1,7": {"k": "Die Furcht des HERRN ist der Erkenntnis Anfang; <nur> Narren verachten Weisheit und Unterweisung. Am Ende des Prologs (Sprüche 1,1-7) finden wir das geistliche Fun- dament für jede Form echter Erkenntnis . Damit es sich bei Weisheit nicht um ein Konstrukt menschlicher Logik handelt, muss sie auf Gottesfurcht aufbauen. Vernunftschlüsse, so richtig sie in sich selbst sein mögen, taugen nichts, wenn sie auf der falschen Basis ruhen. Viele Fragen des Lebens können abschließend nur vom Schöpfer be- antwortet werden, der genau weiß, wozu und wie er uns gemacht hat. Erkennt der Mensch diese Grenzen seines Denkens nicht an und akzeptiert er nicht, dass er auf Gottes Offenbarung angewiesen ist, mag er durchaus „richtig“ denken, kommt aber doch zu falschen Er- gebnissen. E : D F HERRN Die Furcht des HERRN ist der Schlüssel, um „Die Sprüche“ verstehen zu können, aber was ist Furcht des HERRN ? Mit Furcht des HERRN wird ein wesentlicher Aspekt der Beziehung des Gläubigen zu seinem Gott beschrieben . Der erste Schritt auf dem Weg zur Klug- heit besteht immer in der erschütternden Einsicht, dass ich Ge- schöpf bin und dass es über mir einen Schöpfer und Richter gibt, der fordern darf, dass ich ihn fürchte (5Mose 10,12; Lukas 12,4.5). Man kann die Furcht des HERRN lernen (5Mose 17,19; 31,12; Psalm 34,12) und so verblüfft es nicht, dass Furcht des Herrn in Psalm 19 mit Begriffen wie „Gesetz“, „Zeugnis“ (Psalm 19,8), „Vorschriften“, „Gebot“ (Psalm 19,9) und „Rechtsbestimmungen“ (Psalm 19,10) gleichgesetzt wird. Zum einen versteht die Bibel also unter Furcht des HERRN den Standard , den Gott für ein richtiges, moralisches Verhalten setzt, und durch seine Knechte offenbart. Zum anderen geht es aber auch darum, nach diesem Standard zu le- ben. Es reicht nicht, dass ich weiß, was richtig ist, wenn ich das Rich- tige nicht auch tue! Gott will mehr als meinen Verstand oder ein Lip- penbekenntnis. Wer Gottesfurcht besitzt, der hat sich entschieden, das zu tun, was Gott sagt. So jemand erkennt Gott als absolute Au- torität über sich an und hält deshalb seine Gebote (3Mose 19,14; 5Mose 6,2; 28,58; 31,12). Die Furcht des HERRN ist für den Erwerb von Weisheit ebenso grundlegend, wie es Noten für die Musik oder Zahlen für die Mathe- matik sind. Nur ein echter Christ wird Salomos Spruchsammlung so benutzen können, wie Gott es sich gedacht hat. Bist du dir sicher, dass du ewiges Leben hast (1Johannes 5,13) und ein Kind Gottes bist? E : D N Gott nennt Menschen, die sich nicht um Unterweisung und Weisheit scheren, „Narren “. Sie sind in „Die Sprüche“ davon gekennzeich- net, dass sie zutiefst von der Richtigkeit ihrer eigenen Meinung überzeugt sind. Sie sind nicht so „ungefährlich“ wie die „Einfältigen“ (vgl. Sprüche 1,4), sondern Sturköpfe mit einem unangenehmen Charakter, die nichts von Weisheit wissen wollen und sich daran freuen, ihre verdrehten Ansichten - gern auch zum Schaden der Ge- sellschaft - in die Tat umzusetzen. Narren sind begriffsstutzig und ihr Leben ist geprägt von falschen Entscheidungen (Psalm 17,12) und Unverstand (Sprüche 10,14). Der Narr verachtet Zurechtwei- sung (Sprüche 15,5), redet dummes Zeug (Sprüche 12,23; 15,2; 17,28), hat sich nicht unter Kontrolle (Sprüche 12,16) und hat kein Interesse an Erkenntnis (Sprüche 15,14; 18,2). Ein Narr wird seine Narrheit nicht los (Sprüche 27,22) und glaubt, alles richtig zu ma- chen (Sprüche 12,15). Es ist sinnlos, ihn belehren zu wollen (Sprü- che 16,22; 23,9). Unfähig und unwillig, sich zu ändern, endet das Le- ben eines Narren im Fiasko und im Gericht (Sprüche 10,14; 19,29; 26,3). Welche dieser Eigenschaften treffen auf dich zu? Bist du ein Narr ? Wer moderne Beispiele für Narren sucht, der wird in der Klatsch- presse schnell fündig. Hier stoßen wir auf Menschen, die so tun, als wüssten sie den Weg, aber mit „schöner“ Regelmäßigkeit zerbre- chen ihre Ehen, landen sie in Entziehungskliniken oder sie tun Dinge, die schlichtweg Unsinn sind. Diese Welt braucht andere Vor- bilder und du könntest ein solches werden! Narren verachten Weisheit und Unterweisung und deshalb sind sie dazu verdammt, ihren selbstbestimmten, hochmütigen Weg zu Ende zu gehen. Wer das Wort des Herrn verachtet, der verachtet Gott selbst (2Samuel 12,9.10). Und niemand, der Gott verachtet, fin- det Glück, sondern nur der, der ihm vertraut (Sprüche 16,20).", "f": [{"n": "30", "t": "Obwohl ich mich möglichst eng an die unrevidierte Elberfelder Übersetzung halte, habe ich mich grundsätzlich dagegen entschieden den Begriff „Jehova“ zu übernehmen, weil es sich dabei nicht um einen Namen, sondern um ein Kunstprodukt handelt. Für „HERR“ spricht, dass auch die LXX und das Neue Testament den Eigennamen Gottes mit „Herr“ wiedergibt und die Schreibweise in Großbuchstaben („HERR“) den Lesern der Elberfelder Bibel geläufig ist."}, {"n": "31", "t": "Die Beziehung des Gläubigen zu Gott ist nach 5Mose 10,12.13 von Gottesfurcht, einem entsprechenden Lebensstil, Liebe, Dienst und Gehorsam geprägt. Gott will mir Autorität sein, sich in meinen Entscheidungen wieder finden, meine Zuneigung gewinnen, ich soll für ihn leben und seine Gebote halten."}, {"n": "32", "t": "Eine Anmerkung zum Thema Christsein: In Deutschland herrscht Verwirrung, wenn man wissen will, wer oder was ein Christ ist. In diesem Buch gebrauche ich den Begriff „Christ“ in einem Sinn, der sich eng an der Bibel orientiert. Ich glaube, dass es in allen christlichen Kreisen „echte Christen“ gibt. Ich bin aber auch davon überzeugt, dass man weder durch ein Ritual oder ein Glaubensbekenntnis und schon gar nicht durch „gute"}, {"n": "33", "t": "An dieser Stelle ein Tipp: Sage nicht zu schnell ja. Du bist das, was du lebst, nicht das, was du zu sein meinst. Viele „Christen“ haben einen Glauben, der nur ein Lippenbekenntnis ist, aber hinter dem kein Leben steht. Unter http://frogwords.de/einsteiger/ juenger- schaftskurs/thema_7 findest du eine Lektion über „Glauben“, die dir hilft, die Echtheit dei- nes Glaubens zu beurteilen."}, {"n": "34", "t": "Der „Narr“ und der „Tor“ werden in den Sprüchen synonym gebraucht. Es handelt sich dabei um zwei Begriffe, die denselben Menschenschlag beschreiben. Vielleicht ist für den Toren ein wenig mehr Hoffnung."}, {"n": "35", "t": "Es gibt eine hohe Übereinstimmung zwischen dem, was die Bibel „Narr“ nennt, und dem, was wir heute als „Narzisst“ (ein selbstverliebter Mensch) bezeichnen."}, {"n": "36", "t": "Auch hier gilt: Es geht nicht darum, was du gerne wärest! Wie sieht dein Leben aus? Was tust du und wo weißt du nur, was richtig wäre, aber du tust es nicht? Jesus spricht davon, dass ein guter Baum gute Früchte bringt. Welche Früchte finden sich in deinem Leben? Tu lieber jetzt Buße und fange an, geistlich durchzustarten, als dich ein Leben lang über dich selbst zu täuschen. Gott kennt sowieso deine innere Einstellung zu ihm ganz genau."}]}, "Spr 2,1": {"k": "Mein Sohn, wenn du meine Reden annimmst und meine Gebote bei dir verwahrst, indem du dein Ohr auf Weisheit merken lässt, dein Herz neigst zum Verständnis; Wenn der Sohn eine Chance haben will, den Einflüsterungen des Zeitgeistes und der falschen Freunde zu entgehen, muss er sich ernstlich mit der Suche nach Weisheit beschäftigen. Er muss sein Ohr und sein Herz , also seine physischen und intellektuellen Mög- lichkeiten einsetzen, um die Reden seines Vaters erst anzunehmen und dann zu verwahren . Was Salomo fordert ist volles Engage- ment. Hier wird übrigens ganz nebenbei vorausgesetzt, dass der Vater (und die Mutter) selbst Weisheit besitzt. Seine Reden sind die Weis- heit , auf die der Sohn hören soll. Wenn der Vater von seinem Kind fordert, seine Gebote zu verwahren, dann kann er das nur tun, weil er in seinem eigenen Herzen einen Schatz an Weisheit trägt, den er selbst wiederum von seinen Eltern bekommen hat . Hinter bibli- scher Erziehung steckt also die Idee eines Staffellaufs. Weise Eltern geben ihr persönliches Wissen mit Nachdruck an die eigenen Kinder weiter; und so lernen diese die „Furcht des HERRN“ (Sprüche 2,5). Hast du als Vater oder Mutter Zeiten, in denen du dich mit dei- nen Kindern hinsetzt, um ihnen Weisheit zu vermitteln ? Wo- mit verbringt ihr als Familie die Abende? Bleibt da noch Zeit zum Reden? Weniges ist für eine Erziehung verderblicher als wenn Eltern ihren Kindern einen Maßstab aufzwingen wollen, nach dem sie selbst nicht leben (oder den sie nicht verstanden haben). Erziehung ist deshalb zu allererst eine Frage des elterlichen Charakters. Was Vä- ter und Mütter vor allem brauchen ist ein eigenes, tiefes Verständnis göttlicher Weisheit , das ihr Leben praktisch sichtbar prägt, von dem sie zutiefst überzeugt sind und das sie ihren Kinder weiterge- ben wollen. Wenn der Vater seine Reden als Gebote bezeichnet, dann um damit die autoritative Wucht zu unterstreichen, die sich hinter einer Er- ziehung verbirgt, die ihre Inhalte der Bibel entnimmt. Formal mö- gen die Sprüche sich nach Ratschlägen anhören, aber faktisch steht Gott für ihre Qualität ein. Es macht ethisch keinen großen Unter- schied, ob ein Mensch sich gegen ein klares Gebot auflehnt oder ge- gen ein geistliches Prinzip, das in Form eines Spruches daher- kommt. Immer richtet sich seine Rebellion ja nicht gegen Druckerschwärze oder menschliche Ideen, sondern gegen Gott selbst, den „Gesetzgeber und Richter“ (Jakobus 5,12). E : D H Mit „Herz“ begegnen wir dem wichtigsten anthropologischen Be- griff des Alten Testaments. Er umschließt einen körperlichen, einen seelischen und einen geistlichen Aspekt. Der Einfluss des Herzens auf den Körper sehen wir gut in der Ge- schichte aus 1Samuel 25. Als Nabal von seiner Frau das ganze Aus- maß des möglichen Unglücks erfährt, das Abigajil gerade noch ab- gewendet hat, da „erstarb sein Herz“ und „er wurde wie ein Stein“ (1Samuel 25,37). Das Ersterben des Herzens führte zu einer Läh- mung, nicht zum Tod (1Samuel 25,38). Das „Herz“ kontrolliert also in der Bibel die Körperfunktionen. Deshalb macht ein „fröhliches Herz“ das „Gesicht heiter“ (Sprüche 15,13) oder steuert ein nach- denkliches Herz die Zunge (Sprüche 15,28). Im seelischen Aspekt des „Herzens“ fließen Intellekt, Sensibilität und Willen zusammen. Mit dem Herzen kann „Kummer“ (Sprüche 12,25; 14,10), „Gelassenheit“ (Sprüche 14,30) und Freude (Sprüche 15,15) empfunden werden, aber gleichzeitig ist es der Sitz des Den- kens und Reflektierens. Weisheit kann ins Herz einziehen (Sprüche 2,10) und Unverstand ist wörtlich ein „Mangel an Herz“ (Sprüche 10,21). Im Herzen werden - da die Funktion des Gehirns den Men- schen des Altertums unbekannt war - Entscheidungen gefällt und Handlungen vorbereitet. Das Herz kann „Böses schmieden“ (Sprü- che 6,18) und den Lebensweg planen (Sprüche 16,9). Auf der geistlich-moralischen Seite ist es auch das Herz, das Gott vertrauen (Sprüche 3,5) und sich nicht von der Schönheit einer Ehebrecherin gefangen nehmen lassen soll (Sprüche 6,25). Wenn es seinen Eifer in die richtigen Bahnen lenkt und Erkenntnis (Sprüche 15,14) statt Vergeltung (Sprüche 23,17) sucht, wird es weise (Sprü- che 14,33) und verliert seine Boshaftigkeit (Sprüche 26,23). Die Ein- stellung meines Herzens ist alles entscheidend. Ein böses Herz mo- tiviert zu bösen Taten und ein reines Herz zur Liebe. Wer sein Herz „verhärtet“ (Sprüche 28,14) und für Gottes Gebote unsensibel macht, rennt in sein Verderben. Weil das „Herz“ das Zentrum des emotionalen, intellektuellen, reli- giösen und moralischen Handelns eines Menschen ist, muss es als kostbarstes Gut mehr behütet werden als irgendetwas sonst (Sprü- che 4,23). Kannst du mit eigenen Worten beschreiben, was es bedeutet, sein „Herz zu behüten“ und hast du eine Idee davon, wie das praktisch aussehen könnte? Schon im Alten Testament fordert Gott die Gläubigen auf: „Werft von euch alle eure Vergehen... und schafft euch ein neues Herz...!“ (Hesekiel 18,31). Für den Neuen Bund verheißt Gott den Gläubigen ein „neues Herz“ (Hesekiel 36,26) , d.h. Gott schenkt denen, die Buße tun, eine neue, innere Ausrichtung und den Wunsch, das Rich- tige zu tun. Solche Christen wollen Gott gefallen, seine Gebote ver- stehen und ihm dienen, aber nicht, weil sie „eigen“ sind, sondern weil Gott dieses Ansinnen in ihr Herz gelegt hat. Hast du ein neues, gereinigtes Herz? Bist du auf Gott ausgerich- tet und hast du den tiefen Wunsch, ihm zu dienen und ihm zu gefallen?", "f": [{"n": "84", "t": "Das „Herz“ steht im Alten Testament für das Denken des Menschen, also nicht wie heute, bildhaft für seine Gefühle. Siehe auch den Exkurs am Ende dieses Abschnitts."}, {"n": "85", "t": "Und zwar weil er das Gehörte für wertvoll und wichtig erachtet. Hier geht es Salomo nicht um stumpfsinniges Auswendiglernen von Bibelversen!"}, {"n": "86", "t": "Bzw. den er sich selbst mühsam erarbeitet hat. Dieser Kommentar ist gerade auch für solche Menschen geschrieben."}, {"n": "87", "t": "Falls dir Ideen und Themen fehlen, schau dir doch unser Buch „Mit Werten erziehen und prägen“ an. Dort findest du viele Tipps. Das Buch kann man im Buchhandel kaufen oder kostenlos online lesen: https://www.frogwords.de/ehe_und_familie/wertevermitt- lung_kindererziehung/index."}, {"n": "88", "t": "Erziehung ist also mehr als die Weitergabe von ein paar Lebensprinzipien, die man ir- gendwo aufgeschnappt hat. Es geht darum, das eigene - hoffentlich gute - Leben mit Gott in seiner Gänze als den „Weg des Lebens“ (vgl. Sprüche 2,19) zu erklären und weiterzu- reichen."}, {"n": "89", "t": "Apostelgeschichte 15,9: ein gereinigtes Herz."}, {"n": "90", "t": "Die Weisheit wird hier als Frau gesehen, die es zu gewinnen gilt."}]}, "Spr 2,2": {"k": "Mein Sohn, wenn du meine Reden annimmst und meine Gebote bei dir verwahrst, indem du dein Ohr auf Weisheit merken lässt, dein Herz neigst zum Verständnis; Wenn der Sohn eine Chance haben will, den Einflüsterungen des Zeitgeistes und der falschen Freunde zu entgehen, muss er sich ernstlich mit der Suche nach Weisheit beschäftigen. Er muss sein Ohr und sein Herz , also seine physischen und intellekt
