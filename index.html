 ist, sie mit dem Guten zu überfluten. Der Genusssüchtige ist ebenso unweise wie der Asket. Gibt es Momente im Leben, in denen du deine Seele mit Dingen „gesättigt“ hast, die nicht gut waren? Bist du eher der Genuss- süchtige oder der Asket?", "f": [{"n": "1013", "t": "Ein Ausdruck der Geringschätzung."}, {"n": "1014", "t": "Honigseim ist der direkt aus der Wabe fließende Honig, das beste Süßungsmittel der Antike."}, {"n": "1015", "t": "Wörtlich: Mann"}]}, "Spr 11,15": {"k": "Sehr schlecht ergeht es einem, wenn er für einen anderen Bürge geworden ist; wer aber das Handeinschlagen hasst, ist sicher. Dieser Vers greift Gedanken auf, die bereits in Sprüche 6,1-5 in gro- ßer Ausführlichkeit erläutert wurden. Es lohnt sich, die Ausführun- gen zu diesen Versen (jetzt) zu lesen. Nicht jede Hilfeleistung ist klug. 1Petrus 4,15 warnt davor, dass wir uns in fremde Sachen einmischen, die uns nichts angehen. Wir müs- sen (und dürfen) nicht jedes Problem zu unserem machen! Zuerst einmal lebt jeder Mensch sein eigenes Leben. Wir dürfen die Armen nicht im Stich lassen, wir sollen die Schwachen tragen und Nieder- gedrückten trösten, aber wir müssen auch nüchtern genug sein, um zu erkennen, dass es nicht jede Notlage unser sofortiges Eingreifen erfordert. Dasselbe gilt für Freundschafsdienste. Eine Bürgschaft will wohl überlegt sein. Wenn ich mein eigenes Schicksal mit dem Wohl und Wehe eines fremden Lebens verknüpfe, dann wird es mir sehr schlecht ergehen und dann bin ich nicht mehr sicher. Ein solches Tun ist nicht weise. Du hast ein Recht darauf, für dein eigenes Wohl- ergehen und die Sicherheit deines eigenen Lebens zu sorgen. Sei vorsichtig, wenn du durch emotionalen oder geistlichen Druck ma- nipuliert wirst, Verbindlichkeiten einzugehen, die du nicht über- schaust und die dich ohne dein weiteres Zutun ruinieren können. Wo stehst du in der Gefahr für einen Fremden ein unkalkulier- bares, persönliches Risiko einzugehen?", "f": [{"n": "469", "t": "Und damit auch das Schicksal meiner Familie!"}, {"n": "470", "t": "Die Revidierte Elberfelder ergänzt hier nach der LXX: „Eine anmutige Frau erlangt Ehre, aber ein Thron der Schande ist eine Frau, die Redlichkeit hasst. Den Faulen fehlt es an Besitz, die Fleißigen aber erlangen Reichtum“. Die LXX verlagert durch die Parallele zwischen „an- mutig“ und „Redlichkeit“ den Schwerpunkt des Parallelismus von der äußerlichen Schön- heit der Frau auf ihren Charakter. Und das erscheint mir fragwürdig."}, {"n": "471", "t": "O. Gunst, Gutwilligkeit."}, {"n": "472", "t": "Ich glaube, dass jede Frau schön ist und dass Frauen dazu berufen sind, Schönheit in die Welt zu bringen. Frauen dürfen sich nicht auf äußere Schönheit reduzieren (lassen). Ihr Innenleben muss ihrem Aussehen entsprechen. Ein guter Charakter ist wertvoller als ein guter Kajalstrich (vgl. Sprüche 11,22; 31,30; 1Timotheus 2,9.10; 1Petrus 3,3.4), aber solch richtigen Wertungen dürfen uns nicht dahin bringen, die äußerliche Schönheit einer Frau gering zu achten. Schönheit ist wichtig, weil sie wahrgenommen wird. Schönheit manipu- liert zum Guten wie zum Schlechten. Das Auge isst mit!"}, {"n": "473", "t": "Dieselbe Konstruktion wie in Sprüche 11,16!"}, {"n": "474", "t": "Kommentatoren lesen an dieser Stelle in den Begriff anmutig gern auch die innere Schönheit der Frau hinein, aber mir fällt es schwer, diesen Schwerpunkt in den Sprüchen wiederzufinden. Natürlich ist äußerliche Schönheit nicht alles, aber sie ist „etwas“! Ich glaube, dass wir es in Sprüche 31,30 mit einem Parallelismus zu tun haben, der „Anmut“ und „Schönheit“ gleichsetzt."}, {"n": "475", "t": "Vgl. Ausführungen über „Ehre“ in der Auslegung zu Sprüche 3,16."}]}, "Spr 11,17": {"k": "Sich selbst belohnt der Mildtätige , der Unbarmherzige aber tut seinem Fleisch weh. Auf den ersten Blick ist der Mildtätige ein Verlierer. Er kümmert sich um das Wohl anderer, investiert sein Vermögen, um Gutes zu tun, denkt über die Not Fremder nach und trägt die Last der Bedrückten. Aber dieser erste Blick trügt. In Wirklichkeit belohnt er sich selbst , denn Liebe „zahlt“ sich immer aus. Gütiger Umgang mit fremden Notlagen erschafft in mir einen gütigen Charakter, Freunde und An- sehen. Mit einem freundlichen Menschen hat man gern Umgang, im hilft man gern (vgl. Römer 5,7) und er versteht es, in der Familie Harmonie zu schaffen. Der Unbarmherzige hat nur Augen für sich und seine Bedürfnisse. Andere Menschen sind ihm Mittel zum Zweck, werden gnadenlos ausgenutzt und verletzt. Wie ein Bulldozer im Orchideen-Treibhaus hinterlässt er im Leben der Schwachen eine Spur der Verwüstung. Aber genau das wird ihm zum Verhängnis. Er hofft auf Erfolg, aber er tut nur sich selbst ( seinem Fleisch ) weh. In Hiob ist das Verletzen des Fleisches die schlimmste Sorte von Un- glück, die einen Menschen treffen kann (Hiob 1,12; 2,4-6), viel schlimmer als der Verlust von lieben Menschen oder seines Besit- zes. Salomo bringt mit diesem Vers also zum Ausdruck, dass Grau- samkeit auf übelste Weise auf den Täter zurück fällt. Was waren die schlimmsten Verletzungen, die dir von einem „Unbarmherzigen“ selbst zugefügt wurden? Wie gehst du mit diesen Erfahrungen um?", "f": [{"n": "476", "t": "W. Mann der Güte (o. Treue, Freundlichkeit)"}, {"n": "477", "t": "O. Grausame"}]}, "Spr 11,24": {"k": "Da ist einer, der ausstreut, und er bekommt noch mehr; und einer, der mehr spart als recht ist, und es führt nur zum Mangel. Dieser Vers vergleicht zwei Personen miteinander. Die erste ist von Großzügigkeit gekennzeichnet, die zweite von übermäßiger Spar- samkeit (o. s. FN von Unrecht). Wer Gutes ausstreut , der wird nicht arm (vgl. Prediger 11,1; 2Korin- ther 9,6)! Dabei steckt in dem Begriff ausstreut ein gewisses Maß an Sorglosigkeit . Der Geber achtet nicht peinlich genau auf seine Ga- ben, er ist nicht gewissenhaft oder vorsichtig, er gibt gern, reichlich und schießt dabei auch schon mal übers Ziel hinaus. Und diese Hal- tung wird von Gott belohnt! Wer mehr spart als recht ist , setzt mit seinem Wunsch nach Sicher- heit das Leben der Bedürftigen aufs Spiel. Er geht mit dem ihm anvertrauten, materiellen Gut nicht gut um. Bei ihm schlägt gesunde Vorsorge und verantwortliche Fürsorge in Geiz und Habsucht um. Er könnte geben, tut es aber nicht. Er hat, aber will alles für sich. Er versucht „auf die Ungewissheit des Reichtums Hoffnung zu setzen“ (1Timotheus 6,17) und vergisst „Gutes zu tun, reich zu sein in guten Werken, freigebig zu sein [und …] mitteilsam“ (1Timotheus 6,18). Sein Versuch, Schätze anzuhäufen, führt letztlich nur zum Mangel . Wenn unser Vertrauen nicht auf Gott gerichtet ist, gibt es keinen Überfluss . Wie kultivierst du bereits diese Haltung großzügigen Wegge- bens?", "f": [{"n": "486", "t": "O. zurück hält, was recht ist, d.h. er gibt nicht, obwohl er dazu beauftragt und befähigt ist."}, {"n": "487", "t": "Der Begriff ausstreut wird in der Bibel nie in Bezug auf Saat gebraucht. Es geht hier nicht um das Prinzip Säen - Ernten, sondern um das Paradoxon von Freigebigkeit, die zu Wohl- stand führt."}, {"n": "488", "t": "Mangel entsteht auch aus Faulheit (Sprüche 14,23), Hast (Sprüche 21,5), Bosheit (Sprü- che 13,25), Zügellosigkeit (Sprüche 21,17) und unkluger Großzügigkeit (Sprüche 22,16)."}, {"n": "489", "t": "W. die Seele des Segens. Hier ein „gen. of the mediated subject” (Waltke, S. 505), der die Person bezeichnet, die den Segen austeilt."}]}, "Spr 11,25": {"k": "Die segnende Seele wird reichlich gesättigt, und der Tränkende wird auch selbst getränkt. Die segnende Seele beschreibt eine Person, die anderen durch ihr Reden und Tun zum Segen wird. Sie ist großzügig, hilfsbereit, barm- herzig, liebevoll, geduldig, sie gibt, segnet, betet, unterstützt, erträgt und vergibt. Wer sich so um andere kümmert, darf sich des göttli- chen Segens sicher sein, er wird reichlich gesättigt. Wörtlich heißt es: „Er wird fett gemacht.“ Was heute im Angesicht von Diätplänen und Weight-Watcher-Abnehmstrategien mehr nach Fluch als nach Segen klingt, ist in einer Zeit, in der viele Menschen gerade genug zu essen hatten, um zu überleben, ein Bild für Reichtum, Überfluss, volle Zufriedenheit und Gesundheit. Diese Verheißung gilt in der Bibel nicht nur denen, die ein Segen sind, sondern auch den Fleißi- gen (Sprüche 13,4) und denen, die auf Gott vertrauen (Sprüche 28,25). Fleiß, Gottvertrauen und Großzügigkeit bilden das Funda- ment eines „satten“ Lebens (vgl. 1Mose 25,8). Die zweite Hälfte erklärt die erste Hälfte des Verses. Die segnende Seele ist der Tränkende . Wer anderen zu trinken gibt, wird auch selbst getränkt . Fürsorge und Hilfsbereitschaft fallen auf den zurück, der sie ausübt. Ich kann nicht geben, ohne auch (von Gott) zu emp- fangen. Wer ist dir in deinem Bekanntenkreis ein gutes Beispiel für eine „segnende Seele“?", "f": [{"n": "488", "t": "Mangel entsteht auch aus Faulheit (Sprüche 14,23), Hast (Sprüche 21,5), Bosheit (Sprü- che 13,25), Zügellosigkeit (Sprüche 21,17) und unkluger Großzügigkeit (Sprüche 22,16)."}, {"n": "489", "t": "W. die Seele des Segens. Hier ein „gen. of the mediated subject” (Waltke, S. 505), der die Person bezeichnet, die den Segen austeilt."}, {"n": "490", "t": "Vgl. die Anmerkungen zu Sprüche 10,6."}, {"n": "491", "t": "Synekdoche: Rhetorische Figur, bei der ein Begriff durch einen anderen, engerer oder weiterer Bedeutung ersetzt werden kann. Z.B. „Unser tägliches Brot gib uns heute.“"}, {"n": "492", "t": "Oder Zeiten der Not durch sein Verhalten erst provoziert!"}]}, "Spr 11,28": {"k": "Wer auf seinen Reichtum vertraut, der wird fallen; aber die Gerechten werden sprossen wie Laub. Der etwas unpräzise Parallelismus bringt folgende Wahrheit auf den Punkt: Die Gerechten vertrauen nicht auf Reichtum und wer auf Reichtum vertraut ist nicht gerecht. Der Besitz eines Reichen kann Ausdruck göttlichen Segens sein (vgl. Sprüche 8,18; 1Mose 24,35; 1Chronik 29,12; 2Chronik 1,11.12; Hiob 42,11.12), aber es ist eine große Dummheit auf Reichtum zu ver- trauen (vgl. Markus 10,21-25). Besitz und Wohlstand sind vergäng- lich (Sprüche 23,4.5) und können nicht vom (ewigen) Tod retten (Sprüche 10,2; 11,4; 18,11). Ein Leben, das an die Sicherheit des Ka- pitals glaubt, wird fallen , wie ein Haus, das auf Sand gebaut ist, wenn der Sturm kommt. Die Gerechten vertrauen auf Gott (Sprüche 3,5), suchen sein Wohl- gefallen (Sprüche 11,27) und sind großzügig (Sprüche 11,24-26). Sie werden sprossen und wachsen wie frisches Laub im Frühling. Wo möchtest du, dass dein Leben „sprosst“, d.h. sich auf die beste Weise entwickelt? Wie sieht eine Zukunft aus, die du er- träumst?", "f": [{"n": "495", "t": "Der Begriff wird für das Verhalten von Simeon und Levi (1Mose 34,30 „ins Unglück ge- bracht“), Achan (Josua 7,25), der Tochter Jeftahs (Richter 11,35), Saul nach seinem unbe- sonnenen Schwur (1Samuel 14,29), Elia nach seinem Fluchwort gegen Ahab (1König 18,17), Ahab selbst (1Könige 18,18), von Unbarmherzigen (Sprüche 11,17), Gesetzlosen (Sprüche 15,6) und Habgierigen (Sprüche 15,27) verwendet."}, {"n": "496", "t": "Auch i.S.v. „Dynastie“ (Sprüche 12,7)."}, {"n": "497", "t": "Wind ist ein Bild dafür, dass man mit nichts dasteht (Hiob 16,3; Prediger 1,14; Jesaja 26,18; Jeremia 5,13)."}]}, "Spr 21,17": {"k": "Wer Festfreude liebt, verfällt dem Mangel ; wer Wein und Öl liebt, wird nicht reich. Während der Segen des H reich macht (Sprüche 10,22), verliert der seinen Reichtum, der sein Leben ohne Gott für den Genuss lebt. Wer in diesem Leben das Ziel hat, viel zu feiern und Luxus zu genie- ßen, wird am Ende arm sein . Öl und Wein sind Symbole für Wohl- stand, Freude, Genuss und Gottes Segen. Aber wenn man diesen Din- gen um ihrer selbst Willen nachjagt, wenn sie nicht mehr Gottes Se- gen, das Beiwerk zur Freude am Herrn Jesus, sondern das eigentli- che Lebensziel darstellen, dann wird aus der Liebe zum Feiern ein Laster und eine Sünde. Wo man das Vergnügen mehr liebt als Gott (2Timotheus 3,4), dort regiert der Mangel. Welche Aspekte des Lebens können neben dem Feiern noch ein falsches Lebensziel abgeben? Liebst du Luxus und Partys mehr als den H ?", "f": [{"n": "887", "t": "S. a. Sprüche 21,20"}, {"n": "888", "t": "W. wird ein Mann des Mangels"}, {"n": "889", "t": "Das gilt im finanziellen und im geistlichen Sinn. Der Genießer verprasst sein Geld und steht auch geistlich arm vor Gott da, weil er für das falsche Ziel gelebt hat."}]}, "Spr 28,22": {"k": "Der nach Reichtum giert, hat ein böses Auge, und er erkennt nicht, dass Armut über ihn kommen wird. Der hastige Mensch, will reich werden und nimmt dabei das Gesetz nicht so ernst (Sprüche 28,20), der Geizhals, der böse auf den blickt, der – scheinbar – mehr hat, will reich werden auf Kosten der Barmherzigkeit. In seiner Gier nach Reichtum, gönnt er niemandem sonst Erfolg. Und wie so viele Dummköpfe kann er nicht vernünftig denken. Er versteht nicht den unmittelbaren Zusammenhang zwi- schen Sünde und Misserfolg. Er will den Reichtum, schaut neidisch auf jeden, dem es gut geht, aber erntet mit seiner moralischen Grundhaltung am Ende nur Armut. Kannst du gut mit dem Erfolg anderer Menschen umgehen? Bist du manchmal neidisch und hast ein „böses Auge“?", "f": [{"n": "1051", "t": "Beim Ansehen der Person geht es um Parteilichkeit (vgl. Sprüche 24,23)."}, {"n": "1052", "t": "Im Sinn von sehr schlecht (Litotes)."}]}, "Spr 5,18": {"k": "Deine Quelle sei gesegnet , und erfreue dich an der Frau deiner Jugend ; Der Vater betet zuerst für den Sohn, dass seine Frau ihm eine fort- währende Quelle an Freude sein möge und fordert seinen Sprössling dann auf, sich an der Frau seiner Jugend zu erfreuen. Was gesegnet ist, enthält die Fähigkeit, dem Partner gut zu tun. Der nächste Vers wird genauer beschreiben, woran der Vater dabei denkt, aber es ist ein schöner Gedanke: Ein Mann betet für seine Schwiegertochter, dass sie für seinen Sohn zu einem dauerhaften sexuellen Genuss wird. Wo man sich in der Bibel erfreut , da wird frohlockt und gehüpft (Je- remia 50,11), mit den Füßen gestampft und in die Hände geklatscht (Jesaja 55,12; Hesekiel 25,6), getanzt, gesungen und gelacht (vgl. 1Samuel 18,6.7). Der Sohn soll es lernen, im Blick auf seine Frau, „aus dem Häuschen“ zu sein, eine tiefe Begeisterung zu kultivieren, die sich nach außen hin entlädt. Das Gebot, erfreue dich , lässt es nicht zu, dass ein Ehepaar teilnahmslos nebeneinanderher lebt. Gott würde dieses Gebot auch nicht geben, wenn es nicht lebbar wäre. Ich kann mich anscheinend ein Leben lang an meiner Frau freuen und von ihr begeistert sein. Die Frau deiner Jugend , ist nicht „deine jugendliche Frau“, sondern (vgl. Sprüche 2,17; Maleachi 2,14) die Frau, die der Sohn in seiner Jugend geheiratet hat. Als Augenwesen stehen Männer in der Ge- fahr, dass sie junge Frauen besonders attraktiv finden und sich von ihren Reizen verführen lassen (vgl. Hiob 31,1; Jesus Sirach 9,5). Aber Gottes Gebot weist in eine andere Richtung! Gott ist ein Gott der Freude und der sexuellen Ekstase, aber im Rahmen einer Bun- desbeziehung zwischen zwei Ehepartnern, die sich aneinander freuen und einander dienen. Für Verheiratete: Wie sehr freust du dich über deinen Ehepart- ner?", "f": [{"n": "268", "t": "Die Verbform unterstreicht das Fortwährende der Segnung (vgl. Waltke, 2004, S. 304, FN 37)."}, {"n": "269", "t": "Ein Sammelsurium an Informationen rund um das Thema „Sexualität und Ehe“ findet sich hier: http://frogwords.de/ehekurs und http://frogwords.de/hohelied"}, {"n": "270", "t": "„Dama dama mesopotamica“, mesopotamischer Damhirsch."}, {"n": "271", "t": "„Capra ibex nubiana“, nubischer Steinbock."}, {"n": "272", "t": "O. vollständig abfüllen"}, {"n": "273", "t": "Das Wort taucht 40x im AT auf, davon allein 10x im Hohelied, wo es für die Liebe zwi- schen Mann und Frau in all ihren Spielarten steht."}]}, "Spr 5,19": {"k": "die liebliche Hirschkuh und anmutige Gämse - ihre Brüste mögen dich berauschen zu aller Zeit, taumle stets in ihrer Liebe . Uns kommen diese Vergleiche merkwürdig, beinahe abwertend vor, aber in der bäuerlichen Kultur des Nahen Ostens, die es gewohnt ist, Schönheit mit Bildern aus der Natur zu beschreiben, zeigt der Vater dem Sohn mit diesen Vergleichen die wahre Natur seiner nicht mehr ganz so jungen Frau. Sie ist auch im Alter eine liebliche und anmutige Schönheit. Gottes Herausforderung an uns Ehemänner besteht da- rin, unsere Frau mit den Augen der Liebe zu betrachten und sie zu unserem Schönheitsideal zu machen. Männer lieben Brüste und müssen sich vor fremden Busen in Acht nehmen, während die Brüste der eigenen Frau zu aller Zeit berau- schen dürfen. Eine Ehefrau hat - auch wenn sie nicht dem gesell- schaftlichen Schönheitsideal entspricht - für ihren Mann genug „Liebe“, um ihn völlig abzufüllen. Wenn ein Mann bei seiner eigenen Frau an ehelichen Freuden nicht „satt“ wird, dann liegt es nicht da- ran, dass seine Frau ihn nicht befriedigen könnte! Eine Frau hat ge- nug „Liebe“ für ihren Mann. Gott hat Ehe so konzipiert, dass zwei Eheleute einander vollständig zufriedenstellen können. Damit es dazu kommt, darf jede Ehefrau sich als eine ihren Ehemann be- schenkende Schönheit wahrnehmen und muss der Mann sich auf seine eigene Frau als Quelle der Befriedigung konzentrieren. Ein Ehemann, der fremden Frauen hinterher blickt, wird nie erleben, was es heißt: taumle stets in ihrer Liebe . Liebe kann zum Rausch werden, wenn im Bett alle Hemmungen fallen, die Liebenden sich gehen lassen und einander genießen bis die „Sicherungen durch- brennen“. Von Liebesliedern besungen und in einer sündigen Welt gesucht, verheißt Gott solche lustvollen Erfahrungen dauerhaft ( stets ) de- nen, die sich auf sein Ideal von Ehe einlassen. Gottes Weisheit ist weit davon entfernt einer platonischen Liebe anzuhängen - ganz im Gegenteil! Weisheit und Lust, Denken und Leidenschaft, Nachsinnen über Gottes Wort und Genuss ehelicher Gemeinschaft sind keine Ge- gensätze, sondern einander ergänzende Prinzipien. Nur der wirk- lich Weise findet heilige Ekstase, nur der Denkende versteht die Grundlagen für stete Leidenschaft und nur der, der Gottes Wort kennt, weiß um das hohe Ideal Gottes für eine Ehe als Lustgemeinschaft. Leidenschaft im Bett ist ein guter Schutz vor Ehe- bruch und anderen Formen der Unzucht (1Korinther 7,2.5). Für Verheiratete: Taumelt ihr schon oder lebt ihr noch neben- einander her?", "f": [{"n": "270", "t": "„Dama dama mesopotamica“, mesopotamischer Damhirsch."}, {"n": "271", "t": "„Capra ibex nubiana“, nubischer Steinbock."}, {"n": "272", "t": "O. vollständig abfüllen"}, {"n": "273", "t": "Das Wort taucht 40x im AT auf, davon allein 10x im Hohelied, wo es für die Liebe zwi- schen Mann und Frau in all ihren Spielarten steht."}, {"n": "274", "t": "Denn als solche wird sie von Gott wahrgenommen! Mir gefällt die sexuell aktive Sula- mith, wie sie in Hohelied 7,12-14 ein romantisches Wochenende plant."}, {"n": "275", "t": "S. Sprüche 2,16"}, {"n": "276", "t": "W. Bahnen, Geleise"}]}, "Spr 18,22": {"k": "Wer eine Ehefrau findet, hat Gutes gefunden und hat Wohlgefallen erlangt von dem H . Eine Ehefrau, die ein Ausdruck von Gottes Wohlgefallen ist, die muss man suchen. Hat man sie dann gefunden, hat man Gutes gefunden, ein echtes Gegenüber (1Mose 2,23), eine Gehilfin (1Mose 2,18), eine Freundin (Hohelied 4,1), eine Schwester und Braut (Hohelied 5,1) – pralle Herrlichkeit (1Korinther 11,7). Die Sprüche machen leider an anderer Stelle deutlich, dass nicht jede Ehefrau ein Geschenk Gottes ist. Wer eine Zicke (Sprüche 12,4; 21,19), eine Frustrierte (Sprüche 30,23) oder eine Ehebrecherin (Sprüche 7,10-27) heiratet, hat mehr als nur schlecht gewählt . Gilt dieser Spruch auch für einen Ehemann? Welche Kriterien muss ein potentieller Bräutigam erfüllen? Welche Typen Mann , die du in den Sprüchen schon kennen gelernt hast, sind absolut nicht heiratsfähig?", "f": [{"n": "792", "t": "O. Hand"}, {"n": "793", "t": "W. Plural welche ."}, {"n": "794", "t": "Mein Tipp: Suche bei einer Frau nach Gottesfurcht (Sprüche 31,30), Fleiß (Sprüche 31,10-27) und Klugheit (Sprüche 19,14). Wenn sie beten kann, gern mit anpackt und sich etwas sagen lässt, dann ist das eine gute Grundlage für eine funktionierende Ehe. Unglaube, Faulheit oder Uneinsichtigkeit/Besserwisserei sind Ausschlusskriterien."}]}, "Spr 27,9": {"k": "Öl und Räucherwerk erfreuen das Herz, und die Süßigkeit eines Freundes <kommt> aus dem gu- ten Ratschlag. Die Seele eines Menschen kann sich an Pflegeprodukten und gu- ten Gerüchen erfreuen. Eincremen und eine Duftkerze tun dem Wohlbefinden einfach gut und feiern unser Menschsein. Was für Salben und Aromen gilt, das gilt auch für einen guten Freund. Seine Freundschaft ist süß wie ein Nachtisch, wenn er uns aus ehrlichem Interesse und liebevoller Verbundenheit Ratschläge erteilt, die ganz ohne Hintergedanken oder Bosheit sind. Ein Freund meint es gut mit uns. Gönnst du deiner Seele genug Zeiten des Ausruhens und der Freude? Wissen deine Freunde, dass du ihren Rat schätzt?", "f": [{"n": "1016", "t": "Wörtlich: Rat der Seele"}, {"n": "1017", "t": "Der Begriff Herz kann auch den ganzen Menschen meinen, aber ich denke, hier ist eher die Psyche, das Innenleben gemeint."}, {"n": "1018", "t": "Und natürlich darf man weiterdenken: schöne Musik, ein gutes Essen, Gedichte..."}, {"n": "1019", "t": "Siehe aber auch Sprüche 17,17. Es gibt Nöte, da ist die Familie als Rückfallebene gefragt und da ist ein Freund, wohnt er auch noch so nahe und hat er uns auch noch so lieb, nicht genug."}]}, "Spr 27,17": {"k": "Eisen wird geschärft durch Eisen, und ein Mann schärft das Angesicht seines Freundes. Eine eiserne Klinge wird durch Eisen geschärft und damit brauchbar gemacht. Dasselbe tut ein Mann mit seinem Freund. Er „schärft“ sein Angesicht . Um das Bild richtig zu verstehen, muss man folgendes wissen: Im Hebräischen bezeichnet das Wort Angesicht auch die Schneide z.B. eines Beils, eines Pflugs oder eines Schwertes (vgl. Prediger 10,10). Der Begriff Angesicht bezeichnet also den Teil des Freundes, der ihn lebenstüchtig macht: seine Charakterstärke, Belastbarkeit, moralische Integrität, Weisheit, Weitsicht, Selbster- kenntnis, Korrekturfähigkeit usw. Ein Mann macht seinen Freund brauchbarer, wenn er sich an ihm reibt. Er tut das im Wesentlichen durch ehrliche, gut gemeinte Kri- tik. Hast du Menschen, die sich an dir reiben und die dich kritisie- ren dürfen? Hörst du auf gut gemeinte, ehrliche Kritik? Bist du grundsätzlich dafür offen, Korrektur anzunehmen?", "f": [{"n": "1024", "t": "Im Sinn von: jemand, Person, Mensch"}, {"n": "1025", "t": "Heute verwendet man in der Küche einen Wetzstahl, um Stahlklingen zu schärfen. Das Prinzip ist identisch."}]}, "Spr 22,15": {"k": "Narrheit ist gekettet an das Herz des Knaben; die Rute der Zucht wird sie davon entfernen. Eltern dürfen die Erziehungsaufgabe nie unterschätzen. Es ist ein Kampf gegen eine angeborene Widerspenstigkeit. Das Sinnen des menschlichen Herzens ist von Jugend an böse (1Mose 8,21). Dum- mes und falsches Verhalten muss ein Kind nicht lernen, denn Narr- heit klebt am Herzen (= Denken) von Kindern und ohne eine liebe- voll-strenge Erziehung wird das Kind sie nicht los. Eltern, die nicht klar genug Grenzen setzen, verurteilen ihre Kinder zu einem Leben in Torheit. Welche Narrheiten sind typisch für kleine Kinder? Welche Fol- gen für die Kinder und das Familienleben hat es, wenn man sie nicht bekämpft?", "f": [{"n": "907", "t": "Sie ist fremd, weil sie nicht die eigene Ehefrau ist und – übersetzt man Fremde als Aus- länderin – nicht die moralischen Grundsätze des Bundesvolkes teilt."}, {"n": "908", "t": "Vergleiche für die damit verbundenen Gefahren auch Sprüche 22,22.23."}]}, "Spr 13,24": {"k": "Wer seine Rute spart, hasst seinen Sohn, aber wer ihn lieb hat, sucht ihn heim mit Unterweisung. Der Begriff Unterweisung beschreibt die elterliche Autorität im Le- ben eines Kindes (vgl. Anmerkungen zu Sprüche 1,2). In vielen Fäl- len ist damit das gesprochene Wort gemeint. Die Sprüche gehen wie selbstverständlich davon aus, dass Kinder Korrektur brauchen. Die Rute steht dabei als Begriff für die körper- liche Züchtigung . Wer daran spart, hasst sein Kind, weil es mit sei- ner eigenen „Narrheit“ (Sprüche 22,15) allein gelassen wird. Ein Mangel an elterlicher Korrektur ist kein Ausdruck von Nachsicht oder Weisheit, sondern von Desinteresse. Wer sein eigenes Kind lieb hat , gibt ihm, was es braucht: Unterweisung . Wichtige Anmerkungen: 1. Im Bürgerlichen Gesetzbuch, § 1631, findet sich folgende Rege- lung, die Sprüche 13,24 einschränkt: „Kinder haben ein Recht auf gewaltfreie Erziehung. Körperliche Bestrafungen, seelische Verletzungen und andere entwürdigende Maßnahmen sind un- zulässig.“ In Deutschland ist die körperliche Züchtigung von Kin- dern nicht erlaubt. 2. In der Bibel tritt die „Ermahnung“ gleichberechtigt an die Seite der „Rute“ (Sprüche 29,15). 3. Erziehung darf nie zu Mitteln greifen, die „zum Zorn reizen“ (Epheser 6,4), „mutlos“ machen (Kolosser 3,21) oder kindliche Unterordnung auf Weise einfordert, die in der Gesellschaft nicht „ehrbar“ ist (1Timotheus 3,4). 4. Zorn, Wut, Unberechenbarkeit, Schreien, Toben und alle ande- ren Ausdrucksformen von Unbeherrschtheit haben im geistli- chen Leben keinen Platz und deshalb auch nicht in der Kinder- erziehung. 5. Wo Eltern in der Erziehung versagen, ist eine Bitte um Verge- bung angebracht. Es ist wichtig und richtig, wenn Kinder erle- ben, dass Vater und Mutter unter Gottes Wort stehen. Wir brau- chen keine Angst davor haben, dass wir den Respekt unserer Kinder dadurch verlieren, dass wir Sünde zugeben. Wer eigenes Fehlverhalten bekennt, gewinnt Vertrauen und zeigt, dass Gott selbst Richter über alle Familienmitglieder ist. Denkst du, dass es Kinder gibt, die ohne „Rute“ nicht erzogen werden können? Welche „Bestrafungen“ fallen dir ein, die an die Stelle einer körperlichen Züchtigung treten könnten?", "f": [{"n": "585", "t": "S.a. Sprüche 22,15; 23,13.14; 29,15."}]}, "Spr 22,6": {"k": "Erziehe den Knaben seinem Wege gemäß; er wird nicht davon weichen, auch wenn er alt wird. Angesprochen sind hier zuerst die Eltern. Sie sollen ihr Kind durch Training und klare Grenzen (vgl. Sprüche 22,15; 29,15) zu Gott hin erziehen. Es fehlt dem Knaben an Erkenntnis (Sprüche 1,4) und Verstand (Sprüche 7,7). Gibt man ihm beides rechtzeitig, kann er die fatalen Konsequenzen eines unerzogenen Lebens abwenden. Der Vers enthält eine – allerdings nicht absolute – Verheißung für tüchtige Eltern. Erziehung ist prägend und generell gilt: Ein Kind bleibt häufig auf dem Weg, den seine Eltern ihm vorgezeichnet ha- ben. Vor allem dann, wenn es die Qualität des elterlichen Lebensstils erlebt und selbst zum Glauben an Gott gefunden hat. In welchen Dingen sind deine Eltern dir ein Vorbild? Welche guten Einflüsse auf dein Leben hatte deine Erziehung? Was von dem, dass deine Eltern dir beigebracht haben (oder worin sie selbst vorbildlich gelebt haben), möchtest du unbedingt an deine Kinder weitergeben?", "f": [{"n": "905", "t": "Im Spruch ist vom Knaben die Rede, das Prinzip gilt aber natürlich auch für Mädchen!"}, {"n": "906", "t": "o. Knecht"}]}, "Spr 29,15": {"k": "Rute und Zurechtweisung geben Weisheit; aber ein sich selbst überlassenes Kind macht seiner Mutter Schande. Die Sprüche machen sehr deutlich, dass Erziehung mit Bestrafung und Zurechtweisung einher gehen muss. Wer sein Kind sich selbst und damit der Dummheit seines Herzens überlässt (vgl. Sprüche 22,15), der sorgt dafür, dass es zu einem Erwachsenen heranreift, der seinen Eltern Schande bereitet . Es ist keine Liebe, wenn man sein Kind nicht korrigiert, sondern einfach immer machen lässt, wo- rauf es gerade Lust hat. Noch schlimmer ist es jedoch, wenn man die Ungezogenheit seines Kindes entschuldigt und dadurch einen Cha- rakter in ihm festigt, der nicht die Gerechtigkeit, sondern die Selbst- sucht liebt. Lebst du dein Leben so, dass sich deine (gläubigen) Eltern über dich freuen können? Glaubst du, dass Kinder in ihrem Herzen eigentlich gut sind und man ihnen nur uneingeschränkt Raum zur eigenen Entfaltung geben muss?", "f": [{"n": "1074", "t": "Wörtlich: Junge"}, {"n": "1075", "t": "Die LXX übersetzt interessanter Weise mit Eltern ."}, {"n": "1076", "t": "Dabei wird natürlich vorausgesetzt, dass es sich um gläubige Eltern handelt, die sich wünschen, dass ihr Kind ein gerechtes und gottgläubiges Leben führt."}]}, "Spr 17,9": {"k": "Wer Sünde zudeckt, sucht nach Liebe; wer aber eine Sache immer wieder zur Sprache bringt , entzweit Vertraute. Wie zerstöre ich schnell und unproblematisch eine gute Freund- schaft? Wie entzweit man Vertraute? Ganz einfach. Man muss nur eine Sünde immer und immer wieder hervorkramen und sie dem anderen vorhalten. Wer Freundschaften bewahren und Liebe fin- den will, der muss Sünde zudecken. Wenn man etwas zudeckt , dann sieht man es nicht mehr (1Mose 7,19; 2Mose 3,6; 3Mose 13,13 usw.). Wer Sünde zudeckt , der hört auf an sie zu denken. Liebe „rechnet Böses nicht zu“ (1Korinther 13,5). Für den Weisen ist Liebe wichtiger als Rache oder „Gerechtigkeit“. Ihm sind gute Beziehun- gen wichtiger als das akribische Klären jeder noch so kleinen Un- stimmigkeit. Er weiß um seine eigene Fehlbarkeit und kann Sünde übersehen (Sprüche 19,11), überhören (Prediger 7,20-22) und er- tragen (Kolosser 3,12.13) . Sünde ist eine Realität. Wir werden selbst zu Sündern und an uns wird gesündigt. Eine ordentliche Por- tion Gelassenheit, Liebe und Selbsterkenntnis helfen uns dabei, richtig mit ihr umzugehen. Wie leicht fällt es dir, Sünde zuzudecken? Bist du jemand, der „alte Kamellen“ immer wieder hervorkramt und zur Sprache bringt? Was tust du, um tiefe Freundschaften zu pflegen?", "f": [{"n": "714", "t": "Auch wenn es manch einer zu allen Zeiten der Geschichte war! In assyrischen Tontafeln wird Bestechung der Richter als „legale“ Praxis beschrieben. Die Gerichte traten nur in Ak- tion, wenn das Bestechungsgeschenk nicht hoch genug ausfiel. (Waltke, Band 2, S. 49, FN 87)"}, {"n": "715", "t": "O. Übertretung, Rebellion"}, {"n": "716", "t": "W. wiederholt, erneut tut"}, {"n": "717", "t": "Und das gilt in besonderem Maß für die Ehe!"}, {"n": "718", "t": "Anmerkung: Es gibt Sünde, die man nicht übersehen darf, sondern ansprechen muss, weil sie den Freund zerstört oder schlichtweg nicht ertragbar ist! Die Grenzen der eigenen Belastbarkeit spielen hier ebenso eine Rolle wie die Listen mit besonders schwerwiegen- den Sünden (z. B.1Korinther 5,11) oder die Umstände, in denen sich der Freund befindet. Liebe, die übersieht, weil sie die Probleme des anderen ignoriert, um nicht helfen zu müs- sen, ist schwerlich als „Liebe“ zu bezeichnen. Das ist schlichtweg Desinteresse, das sich als Liebe tarnt."}]}, "Spr 17,14": {"k": "Wie wenn einer Wasser entfesselt , so ist der Anfang ei- nes Streits. Also: Bevor er ausbricht, beende den Konflikt. Der Spruch hat das Bild eines Staudamms vor Augen (Prediger 2,6). Wenn man den ansticht, sodass das gespeicherte Wasser ungehindert das Land dahinter überfluten kann (vgl. Hohelied 8,7), entfesselt man Zerstörung und Chaos. Das sollte man unbedingt un- terlassen! Genauso falsch wie das Aufbrechen eines Staudamms ist der Anfang eines Streits. Wer damit anfängt, setzt Kräfte frei, die er nicht mehr beherrscht und die viel mehr kaputt machen werden als er sich vorstellen kann. Ein Streit „reinigt nicht die Luft“ wie es der Volksmund sagt, sondern zerstört Beziehungen. Der Weise wird ei- nen Konflikt beenden, bevor er ausbricht. Er wird alles in seiner Macht Stehende tun, um Spannungen und Kontroversen zu ent- schärfen. Ein Streit ist nichts Gutes. Es gibt keinen guten Grund, ihn zu suchen oder ihn billigend in Kauf zu nehmen. Es mag sein, dass man ihn nicht immer vermeiden kann (vgl. Römer 12,18), aber wirklich weise ist es nur, ihm aus dem Weg zu gehen. Mit wem lebst du in Streit? Kannst du daran etwas ändern? Wie denkst du über das Streiten? Ist es für dich so negativ besetzt, wie der Spruch es ausdrückt? An welcher Stelle deines Lebens müsstest du sofort etwas ändern, wenn du den Spruch anwen- den würdest?", "f": [{"n": "722", "t": "I. S. v. einen Damm durchsticht"}, {"n": "723", "t": "Das Hebräische betont, dass beide ein Gräuel sind: „... ein Gräuel für den H sind beide – ganz bestimmt!“"}]}, "Spr 19,11": {"k": "Die Einsicht eines Menschen macht ihn langmütig, und sein Ruhm ist es, an der Sünde vorüber zu gehen. Der Kluge hat sich selbst im Griff. Einsicht macht langmütig. Der Weise wird nicht von seinen Emotionen beherrscht, steht nicht in der Gefahr, unkontrolliert zurückzuschlagen und weiß um seine ei- genen Fehler (Prediger 7,22). Geduld schafft Raum fürs Ertragen. Wer nicht gleich zornig in die Luft geht, der kann nachdenken und Sünde vergeben. Es ist ein zutiefst ehrenhafter Charakterzug, wenn man auf Angriffe zurückhaltend und deeskalierend reagieren kann. Was unterscheidet einen langmütigen Menschen von einem langweiligen? Gibt es Sünde, an der man nicht vorbei gehen darf? Wen kennst du, der souverän mit fremden Aggressionen umgeht? Was kannst du von ihm lernen?", "f": []}, "Spr 22,24": {"k": "<Spruch #3> Befreunde dich nicht mit einem Hitzkopf , und mit einem wütenden Mann geh nicht <mit>, damit du seine Wege nicht erlernst und einen Fallstrick erhältst für dein Leben. Es ist wichtig, dass wir uns unsere Freunde gut aussuchen, weil sie unser Leben, Verhalten und unser Schicksal mehr prägen als uns wir denken. Der Hitzkopf und der wütende Mann können sich beide nicht beherrschen. Sie sind nicht Herr ihrer Gefühle. Weil sie bereit sind, jederzeit in die Luft zu gehen, sind sie ein schlechtes Vorbild. Ihr Verhalten ist infektiös und hochgradig gefährlich. Wer sich – wie sie – daran gewöhnt, impulsiv zu handeln und jeden Sinn für Ver- hältnismäßigkeit vermissen lässt, der beschwört Unheil herauf. Bildhaft steht der Fallstrick für eine heimtückische Unglücksursa- che, die plötzlich über ihr Opfer hereinbricht. Wer ohne zu überle- gen seinen Gefühlen freien Lauf lässt, wer aufbrausend und irratio- nal handelt, der kann damit rechnen, dass dieses Verhalten sein Le- ben zerstören wird. Hast du einen Hitzkopf zum Freund? Hast du es schon gelernt, ruhig und gelassen auf schwierige Situationen und Personen zu reagieren? Wie sieht das Gegenstück zum Hitzkopf und wüten- den Mann aus? Welche Charaktereigenschaften sollte ein Freund besitzen, der dich gut beeinflusst?", "f": [{"n": "914", "t": "W. Mann des Zorns"}, {"n": "915", "t": "Das ist die Person, die das Darlehen gewährt hat und jetzt, nachdem der Kreditnehmer nicht zahlen kann, den Bürgen pfändet."}]}, "Spr 22,25": {"k": "<Spruch #3> Befreunde dich nicht mit einem Hitzkopf , und mit einem wütenden Mann geh nicht <mit>, damit du seine Wege nicht erlernst und einen Fallstrick erhältst für dein Leben. Es ist wichtig, dass wir uns unsere Freunde gut aussuchen, weil sie unser Leben, Verhalten und unser Schicksal mehr prägen als uns wir denken. Der Hitzkopf und der wütende Mann können sich beide nicht beherrschen. Sie sind nicht Herr ihrer Gefühle. Weil sie bereit sind, jederzeit in die Luft zu gehen, sind sie ein schlechtes Vorbild. Ihr Verhalten ist infektiös und hochgradig gefährlich. Wer sich – wie sie – daran gewöhnt, impulsiv zu handeln und jeden Sinn für Ver- hältnismäßigkeit vermissen lässt, der beschwört Unheil herauf. Bildhaft steht der Fallstrick für eine heimtückische Unglücksursa- che, die plötzlich über ihr Opfer hereinbricht. Wer ohne zu überle- gen seinen Gefühlen freien Lauf lässt, wer aufbrausend und irratio- nal handelt, der kann damit rechnen, dass dieses Verhalten sein Le- ben zerstören wird. Hast du einen Hitzkopf zum Freund? Hast du es schon gelernt, ruhig und gelassen auf schwierige Situationen und Personen zu reagieren? Wie sieht das Gegenstück zum Hitzkopf und wüten- den Mann aus? Welche Charaktereigenschaften sollte ein Freund besitzen, der dich gut beeinflusst?", "f": [{"n": "914", "t": "W. Mann des Zorns"}, {"n": "915", "t": "Das ist die Person, die das Darlehen gewährt hat und jetzt, nachdem der Kreditnehmer nicht zahlen kann, den Bürgen pfändet."}]}, "Spr 25,20": {"k": "Einer, der das Oberkleid ablegt an einem kalten Tag, <wer> Essig auf eine Wunde <schüttet>: so <handelt>, wer einem traurigen Herzen Lieder singt. Der Einfühlsame weiß, wann und wie man trauert bzw. sich freut. Für ein trauriges Herz ist ein fröhliches Lied eine Zumutung (vgl. Psalm 137,1-4). Es ist so falsch, wie das Ablegen eines Mantels ( Oberkleid ) an einem kalten Wintertag oder beißender Essig auf ei- ner frischen Wunde. Im Leben gibt es Zeiten der Freude und Zeiten der Trauer (Prediger 3,4). Sie gut auseinander halten zu können und ihnen auf eine jeweils angemessene Weise zu begegnen, das ist Weisheit. Was kann man noch falsch machen, wenn man einem Trauri- gen begegnet? Gibt es Niedergeschlagene, für die ein frohma- chendes Lied trotzdem richtig sein kann?", "f": [{"n": "981", "t": "Man findet hier auch die Übersetzung Natron (Natriumcarbonat). Obwohl die Überset- zung aufgrund von Jeremia 2,22 möglich ist, entscheide ich mich mit der LXX dagegen, weil Essig auf eine Wunde besser zu den anderen beiden Bildern passt. Es geht um Verhalten, das unnötigen Schmerz zufügt."}, {"n": "982", "t": "Es gibt passende Lieder für die Trauer, Klagelieder (vgl. 2Chronik 2,25; Klagelieder), nur die sind hier nicht gemeint."}, {"n": "983", "t": "Es geht in diesem Spruch um eine lebensbedrohliche Situation. Der Feind ist am Ver- hungern oder am Verdursten."}]}, "Spr 25,21": {"k": "Wenn einer, der dich hasst, Hunger hat, speise ihn mit Brot, und wenn ihn dürstet, gib ihm Wasser zu trinken; denn glühende Kohlen wirst du auf sein Haupt häufen, und der H wird dich belohnen. Natürlich ist es nicht schön, Feinde zu haben, aber es ist normal. Es kann (und wird irgendwann!) Menschen geben, die dich hassen. Und das Prinzip dieses Verses bezieht sich natürlich auf alle Men- schen, die uns abblitzen lassen, ignorieren, nicht ausstehen können oder auf anderer Weise zum Ausdruck bringen, dass sie uns nicht mögen. Wie gehe ich mit solchen Menschen um, die mir deutlich ge- macht haben, dass ich nicht ihr Freund bin, wenn sie in echte Not geraten? Ich helfe ihnen. Gib deinem hungrigen Feind etwas zu es- sen und gib ihm Wasser, wenn er Durst hat. Warum sollte ich das tun? Wäre es nicht viel klüger, meinen Gegner verhungern zu lassen? Wer weiß, was er mir antut, wenn er erst wieder zu Kräften gekommen ist? Es gibt zwei Gründe, warum Mitgefühl weiser ist als Erbarmungslo- sigkeit. (1) Unsere guten Werke werden bei unseren Hassern etwas bewirken. Die feurigen Kohlen auf dem Haupt sind ein Bild für die Gefühle der Reue und Scham, die sich bei den solchermaßen gelieb- ten Feinden einstellen . Wie feurige Kohlen hartes Metall zum Schmelzen bringen, so bringen gute Werke ein hartes Herz zum Schmelzen. Vielleicht entsteht sogar eine Freundschaft aus dem Hass! (2) Wenn wir auf Rache verzichten, wird Gott selbst uns dafür belohnen. Heute verzichten wir auf Rache, aber in der Ewigkeit wird sich unser Verhalten auszahlen. Gibt es Menschen, die du so sehr nicht magst, dass du ihnen nie- mals helfen würdest – egal wie groß ihre Not wäre? Betest du regelmäßig für deine Feinde?", "f": [{"n": "983", "t": "Es geht in diesem Spruch um eine lebensbedrohliche Situation. Der Feind ist am Ver- hungern oder am Verdursten."}, {"n": "984", "t": "Es gibt ein Bußritual im Alten Ägypten, bei denen man als Zeichen seiner Scham, Zer- knirschtheit und Einsicht ein Gefäß mit glühenden Kohlen auf seinen Kopf setzte, während man dabei war, die böse Tat wieder in Ordnung zu bringen."}]}, "Spr 3,27": {"k": "Enthalte dem kein Gutes vor, welcher darauf ein Anrecht hat, wenn es in der Macht deiner Hand steht, es zu tun. Der Weise weiß um seine Verpflichtung, Gutes zu tun. Menschen ha- ben ein Anrecht darauf, dass wir ihnen helfen. Das fängt da an, wo wir selbst einen Feind, der uns hasst, praktisch unterstützen, wenn er in Not geraten ist und unsere Hilfe braucht (vgl. 2Mose 23,5). Die- ses Anrecht auf Beistand findet aber dort eine Grenze, wo, wie im Fall des Arbeitsunwilligen (2Thessalonicher 3,10.12) oder des Hab- süchtigen (Sprüche 30,15), keine wirkliche Not vorliegt, sondern eine sündige Haltung, die wir durch unser Unterstützung nur noch fördern würden. Dabei können wir nicht geben, was wir nicht haben. Wenn wir nicht über die Möglichkeiten verfügen, zu helfen, haben wir dazu auch keine Verantwortung. Als reiche Europäer sollten wir jedoch nie vergessen, dass Jesus zum Thema Unterstützung von Armen fol- gende Aussage gemacht hat: „Verkauft eure Habe und gebt Almo- sen!“ (Lukas 12,33). Wir dürften alle mehr besitzen, als wir brau- chen. „Aber ich kann doch nicht jedem helfen, der in Not ist!“, könnte man einwenden. Stimmt! Jedem nicht, aber denen, die uns begeg- nen, von deren Not wir wissen und die darauf angewiesen sind, dass wir uns ihrer annehmen, wie Jesus es in der Geschichte vom barm- herzigen Samariter beschreibt (Lukas 10,30-37) . Wo steht es in deiner Macht, zu helfen, und du hast es noch nicht getan? Kennst du die hilfsbedürftigen Geschwister in dei- ner Gemeinde?", "f": [{"n": "178", "t": "Dabei ist Geben immer mit Segen verbunden! 2Korinther 9,6-14 spricht davon, dass großzügige Spender von Gott belohnt werden, selbst Genüge haben und mit ihrer Gabe Anbetung und Gemeinschaft fördern."}, {"n": "179", "t": "Nämlich die Hilfe oder die Möglichkeit zur Unterstützung"}, {"n": "180", "t": "Gemeint ist: Da du doch genug hast, um ihm zu geben. Dieser Versteil steht parallel zu „wenn es in der Macht deiner Hand steht, es zu tun.“"}]}, "Spr 12,10": {"k": "Der Gerechte kennt die Bedürfnisse seines Viehes, aber das Innere der Gesetzlosen ist grausam. Gott als Schöpfer will seine Schöpfung bebaut und bewahrt wissen (1Mose 1,15). Tiere dürfen domestiziert, in der Landwirtschaft ein- gesetzt und gegessen werden, aber der Mensch darf sie nicht grau- sam behandeln (vgl. 5Mose 22,6.7; 25,4). Der Sabbat galt auch für das Vieh (2Mose 20,10) und gestand ihm ein Recht auf Ruhe zu. Der Gerechte weiß, was seine Tiere benötigen und er gibt es ihnen. Er kümmert sich um ihre Bedürfnisse , weil er wie der Gott, dem er folgt, barmherzig, mitfühlend und fürsorglich ist. Er will, dass es sei- nem Vieh gut geht. Den Gesetzlosen fehlt dieser Antrieb. Ihr Umgang mit dem eigenen Vieh ist von Desinteresse und Grausamkeit geprägt. Sie sehen in dem Tier eine Maschine für den Profit und kein Lebewesen, das Gott wichtig ist. Ohne dass ich mich explizit für einen vegetarischen (oder ve- ganen) Lebensstil aussprechen will, stelle ich mir doch die Frage, wo die Verantwortung des Verbrauchers bei der Be- kämpfung nicht artgerechter Tierhaltung beginnt. Wenn Grau- samkeit im Umgang mit Tieren an der Tagesordnung ist, was kann ich tun, um dagegen zu protestieren bzw. mich nicht mit- schuldig zu machen?", "f": [{"n": "516", "t": "W. Seele, Leben."}, {"n": "517", "t": "O. Empfinden."}, {"n": "518", "t": "W. es mangelt ihm an Herz."}, {"n": "519", "t": "Der Spruch wird in Sprüche 28,19 wiederholt (mit etwas verändertem Schluss)."}]}, "Spr 14,31": {"k": "Wer einen Armen bedrückt, verhöhnt den, der ihn gemacht hat ; wer sich aber über den Bedürftigen erbarmt, ehrt Gott . Die Schöpfung des Menschen ist die philosophische Grundlage für die Ethik innerhalb einer Gesellschaft (vgl. Sprüche 22,2; 29,13). Weil Gott den Armen gemacht hat , deshalb hat er ein Interesse da- ran, dass mit dem Bedürftigen recht umgegangen wird. Wer den Hilfsbedürftigen bedrückt , d.h. sein Los noch schwerer macht als es eh schon ist, der verhöhnt Gott . Der Schöpfer identifi- ziert sich mit dem Geschöpf und die Verachtung, die ich einem Ar- men entgegenbringe, richtet sich gegen Gott selbst. Wenn ich den Schöpfer achten und anerkennen will, dann nur, wenn ich mich der Schwachen annehme. Es ehrt Gott nur, wer sich der Be- dürftigen erbarmt . Wer ihr Schicksal leichter macht, ihnen Unter- stützung zukommen lässt und in ihnen wertvolle Menschen – Ge- schöpfe Gottes – sieht, der handelt richtig (Sprüche 14,21) wird da- für den Segen erben (Sprüche 19,17; 22,9). Wenn du über Obdachlose, Prostituierte, Hartz IV-Empfänger, Asylanten oder Drogenabhängige nachdenkst, wie stehst du zu ihnen. Sind sie für dich wertvolle Menschen oder gesellschaft- licher „Ballast“, um den man sich nicht zu kümmern braucht?", "f": [{"n": "630", "t": "Sehr ähnlich ist Sprüche 17,5"}, {"n": "631", "t": "W.: ihn"}, {"n": "632", "t": "Das Verb, das hier steht bedeutet „Rettung finden“ oder „vertrauen“. Von den 37 Vor- kommen im AT bezieht es sich 34 Mal auf Gott (vgl. Psalm 2,12; Sprüche 30,5)."}]}, "Spr 19,17": {"k": "Es leiht dem H , wer sich über den Armen erbarmt, und seine Wohltat wird er ihm vergelten. Gott steht auf der Seite der Armen. Wer sich um die Notleidenden kümmert und sich ihrer erbarmt, der leiht Gott. Der H wird zum Schuldner dessen, der um die besorgt ist, die nichts haben. Gott selbst wird dafür sorgen, dass die Wohltat des Spenders vergolten wird. Was der Arme selbst nicht kann, tut der H . Der ist kein Dummkopf, der Mittellose gern und freigebig unterstützt. Gott selbst wird ihm seinen Einsatz erstatten. Wer sind die Armen in deiner Umgebung? Welche Möglichkei- ten gibt es, notleidende Menschen zu unterstützen? Was brau- chen Menschen vielleicht mehr als Geld?", "f": [{"n": "817", "t": "Gemeint ist der H ."}, {"n": "818", "t": "Gemeint ist der, der sich über den Armen erbarmt."}, {"n": "819", "t": "O. aber"}, {"n": "820", "t": "Mehr dazu in: https://www.ethikinstitut.de/24-gewalt-in-der-erziehung/ (Stand August 2022)"}]}, "Spr 21,13": {"k": "Wer sein Ohr verstopft vor dem Schrei des Armen, auch er wird rufen und nicht erhört werden. Der Hilfeschrei ist das laute und emotionsgeladene Rufen in einem akuten Notfall. Es ist der Schrei dessen, der angegriffen oder ernst- haft bedroht wird. Der Spruch beschreibt den Armen in Not, der keine Hilfe findet. Ein hartes Herz macht das Ohr der Reichen taub. Allerdings ist ein Mangel an Mitgefühl auch für den, der sein Ohr verstopft nicht folgenlos. Sei es jetzt oder spätestens vor Gott im Gericht (vgl. Matthäus 25,31ff; Jakobus 2,13); er wird für seinen Mangel an Barmherzigkeit bezahlen und das erleiden, was er ande- ren zugefügt hat. Wie Gott dem zum Guten vergilt, der sich über den Geringen erbarmt (Sprüche 19,17), so tut er es zum Schlechten auch mit dem Hartherzigen. Gibt es Menschen mit offensichtlichen Nöten in deiner Umge- bung, denen du nicht helfen willst? Denkst du manchmal über die Armut in der Welt nach? Spendest du bewusst dafür, um sie zu lindern?", "f": [{"n": "883", "t": "Z. T. wird Gott in alten Übersetzungen ergänzt, um die Doppeldeutigkeit aufzulösen."}, {"n": "884", "t": "S. Anmerkungen zu Sprüche 17,23"}]}, "Spr 31,9": {"k": "Tue deinen Mund auf für den Stummen, für die Rechtssache aller Unglücklichen. Tue deinen Mund auf, richte gerecht, und schaffe Recht dem Elenden und dem Bedürftigen. Es ist die Aufgabe des Königs, für den zu sprechen, der selbst keine Stimme hat; nicht, weil der im wörtlichen Sinn stumm wäre, son- dern weil er arm ist und niemanden hat, der ihn vor Gericht ange- messen verteidigen könnte. Wer seinen Fall nicht überzeugend vor- bringen, Zeugen nicht bestechen oder sich keinen fähigen Verteidi- ger leisten kann, der braucht im König einen Verbündeten. Wer Un- glück, Elend und Bedürftigkeit kennt, der darf nicht auch noch Un- recht erfahren. Dieser Spruch ergänzt die vorangehenden beiden (Sprüche 31,6.7) dahingehend, dass es eben nicht reicht, den Elenden mit Alkohol ab- zufüllen, sondern dass der in Not die volle Unterstützung des Rechtssystems genießen soll. Wie können diese beiden Verse in deinem Leben Anwendung finden? Wo müsstest du deinen Mund aufmachen, um den Stummen und Unglücklichen eine Stimme zu geben?", "f": [{"n": "1130", "t": "Die Sprüche zur starken Frau bilden ein Akrostichon. Der jeweils erste Buchstabe eines Verses ist dem hebräischen Alphabet nach angeordnet."}, {"n": "1131", "t": "Der Begriff beschreibt die Qualität einer Person oder Sache, die Erfolg verschafft, seien es Stärke, Einfluss, Tapferkeit, Reichtum, Tugend, Fitness, Fruchtbarkeit, Intelligenz."}]}, "Spr 14,12": {"k": "Da ist ein Weg, der einem Menschen richtig erscheint, <aber> im Ergebnis sind es die Wege des Todes. Der Vers warnt vor Selbstbetrug. Es passiert so leicht, dass Men- schen ihr eigenes Leben mit seinen ethischen Entscheidungen ( Weg ) falsch beurteilen. Was ihnen richtig erscheint führt doch nicht zum ewigen Leben, sondern zum eigenen Untergang. Ein Lebensstil ist nicht dann gut in Gottes Augen, wenn ich ihn gut finde! Er ist dann richtig , wenn er sich nach Gottes Geboten und Ordnungen richtet! Jesus greift diesen Gedanken auf, wenn er vor dem „breiten Weg“ warnt, der zum Verderben führt (Matthäus 7,13). Es kann sein, dass ich im Moment glaube, alles sei „schick“ und doch Wege des Todes beschreite, d.h. Entscheidungen treffe, die letztlich tödlich ausge- hen. Der begrenzte Blick menschlicher Vernunft wird nie genügen, um ein Leben richtig zu beurteilen. Wäre hätte aus rein menschli- cher Perspektive gedacht, dass das wertvollste und wichtigste Le- ben der Weltgeschichte von einem Mann geführt wird, der nie ein Buch geschrieben, nie einen Krieg geführt, nie eine Dynastie gegrün- det und nie an einer Hochschule gelehrt hat? Wer hätte sich die Se- ligpreisungen ausgedacht (Matthäus 5,3-12) oder das Konzept der Rechtfertigung aus Glauben? Wer sein Leben beurteilen will , der braucht gute Ratgeber, ein intensives Gebetsleben (vgl. Psalm 19,13), Tiefgang im Bibelverständnis und einen im besten aller Sinne „kritischen Geist“, der sich nicht von oberflächlichen Erfolgen blenden lässt. Wie beurteilst du deinen Lebensweg und worauf gründest du dein Urteil? Was gibt dir Sicherheit, dass du dich nicht irrst?", "f": [{"n": "604", "t": "Der Begriff „Zelt“ steht für ein Nomadenzelt, das auch für als Stall verwendet wurde."}, {"n": "605", "t": "Der Vers wird in Sprüche 16,25 wiederholt."}, {"n": "606", "t": "O. das Ende davon"}, {"n": "607", "t": "Der Plural weist darauf hin, dass mein Lebensweg in viele kleine Wege zerfällt. Letztlich ist unser Leben ein Mischmasch aus vielen kleinen Strängen, die ein Ganzes geben und auf ein Ziel zulaufen."}, {"n": "608", "t": "Gemeint ist hier nicht nur der körperliche Tod, sondern natürlich auch der geistliche bzw. alle Vorstufen von beiden wie zerstörte Beziehungen, eine verpasste Berufung, ver- geudete Lebenszeit, Krankheiten usw. – eben alles, was unser Leben hier zerstört und auf das wir mittels kluger Lebensentscheidungen Einfluss haben."}, {"n": "609", "t": "Und wir sind dazu nur sehr begrenzt fähig (vgl. 1Korinther 4,3.4). Meist können wir nicht mehr als grobe Sünde erkennen!"}]}, "Spr 24,11": {"k": "<Spruch #25> Zeigst du dich schlaff am Tag der Not, so ist deine Kraft ge- ring. Errette, die zum Tod geschleppt werden, und die zur Schlachtung wanken, o halte sie zurück! Wenn du sprichst: Siehe, wir wussten nichts davon, wird nicht er, der die Herzen prüft, es merken? Und er, der dein Leben behütet, es wissen? Und er vergilt dem Menschen nach seinem Tun. Wer die Kraft, den Mut oder die Zähigkeit einer Person kennen ler- nen will, der sollte sich anschauen, wie sie in Notzeiten reagiert. Wer am Tag der Not schwach und schlaff ist, der besitzt keine große Kraft. Dabei ist Kraftlosigkeit keine Tugend, denn Gott will uns ge- brauchen! Der Tag der Not bezieht sich nämlich nicht nur auf die notvollen Momente in meinem Leben! Kraft, Mut und Zähigkeit müssen sich mit Gerechtigkeit paaren und auch den retten, der un- gerechtfertigter Weise umgebracht werden soll. Was für Mord gilt, muss in gleicher Weise für alle Formen von Rechtsbruch gelten. Wo das Böse herrscht, muss der Weise einschreiten und dem helfen, dem Ungerechtigkeit zugefügt wird. Der Weise darf nicht feige sein und so tun als hätte er nichts gewusst, denn Gott lässt keine Ausrede zu! Er kennt unser Denken und unsere verborgenen Motive (= Herz ). Wir sollten zur Sünde der Tatenlosigkeit nicht auch noch die Lüge hinzufügen. Dabei ist Gott nicht nur allwissend, sondern auch der Beschützer meines Lebens. Er vergilt dem Menschen nach sei- nem Tun, d.h. er wird den Mutigen, der andere beschützt, beschüt- zen, und er wird den feigen Schwächling spüren lassen, wie sich das anfühlt, ohne Hilfe dazustehen. Wie kann man Kraft, Mut und Zähigkeit trainieren? Wie kannst du dich schützend vor Menschen stellen, denen Unrecht zuge- fügt wird? Hast du dich schon einmal mit den Themen Sklave- rei, Menschenhandel, Zwangsprostitution usw. beschäftigt?", "f": [{"n": "951", "t": "Wörtlich: deine Seele"}, {"n": "952", "t": "Honigseim ist der direkt aus der Wabe stammende Honig, das beste Süßungsmittel der Antike."}]}, "Spr 24,12": {"k": "<Spruch #25> Zeigst du dich schlaff am Tag der Not, so ist deine Kraft ge- ring. Errette, die zum Tod geschleppt werden, und die zur Schlachtung wanken, o halte sie zurück! Wenn du sprichst: Siehe, wir wussten nichts davon, wird nicht er, der die Herzen prüft, es merken? Und er, der dein Leben behütet, es wissen? Und er vergilt dem Menschen nach seinem Tun. Wer die Kraft, den Mut oder die Zähigkeit einer Person kennen ler- nen will, der sollte sich anschauen, wie sie in Notzeiten reagiert. Wer am Tag der Not schwach und schlaff ist, der besitzt keine große Kraft. Dabei ist Kraftlosigkeit keine Tugend, denn Gott will uns ge- brauchen! Der Tag der Not bezieht sich nämlich nicht nur auf die notvollen Momente in meinem Leben! Kraft, Mut und Zähigkeit müssen sich mit Gerechtigkeit paaren und auch den retten, der un- gerechtfertigter Weise umgebracht werden soll. Was für Mord gilt, muss in gleicher Weise für alle Formen von Rechtsbruch gelten. Wo das Böse herrscht, muss der Weise einschreiten und dem helfen, dem Ungerechtigkeit zugefügt wird. Der Weise darf nicht feige sein und so tun als hätte er nichts gewusst, denn Gott lässt keine Ausrede zu! Er kennt unser Denken und unsere verborgenen Motive (= Herz ). Wir sollten zur Sünde der Tatenlosigkeit nicht auch noch die Lüge hinzufügen. Dabei ist Gott nicht nur allwissend, sondern auch der Beschützer meines Lebens. Er vergilt dem Menschen nach sei- nem Tun, d.h. er wird den Mutigen, der andere beschützt, beschüt- zen, und er wird den feigen Schwächling spüren lassen, wie sich das anfühlt, ohne Hilfe dazustehen. Wie kann man Kraft, Mut und Zähigkeit trainieren? Wie kannst du dich schützend vor Menschen stellen, denen Unrecht zuge- fügt wird? Hast du dich schon einmal mit den Themen Sklave- rei, Menschenhandel, Zwangsprostitution usw. beschäftigt?", "f": [{"n": "951", "t": "Wörtlich: deine Seele"}, {"n": "952", "t": "Honigseim ist der direkt aus der Wabe stammende Honig, das beste Süßungsmittel der Antike."}]}, "Spr 24,16": {"k": "<Spruch #27> Lauere nicht als Gesetzloser, auf die Wohnung des Gerech- ten, zerstöre nicht seine Lagerstätte. Denn der Gerechte fällt sieben Mal und steht <doch> wieder auf, aber die Gesetzlosen stürzen nieder im Unglück . Warum lohnt es sich nicht kriminell zu werden und als Gesetzloser die Gerechten zu bestehlen? Warum soll sich der Weise davor hüten, das Verhalten der Bösen zu imitieren? Weil es ihm nichts bringt! Mag auch der Gerechte sieben Mal fallen, d.h. völlig ruiniert sein, wird er mit Gottes Kraft doch wieder aufstehen. Nichts und niemand kann dem Gläubigen dauerhaft Schaden zufügen. Er wird am Ende immer als Sieger vom Platz gehen (vgl. Spruch Nr. 15, Sprüche 23,17.18). Und wie das Schicksal des Gerechten unabwend- bar positiv ist, so ist die Zukunft des Gesetzlosen nur von Unglück gekennzeichnet. Steht der Gottesfürchtige immer wieder auf, so en- det das Leben des Bösen im Unglück. Welche Hoffnung steckt in diesem Vers für Gerechte, denen von bösen Mitmenschen schlimm mitgespielt wird? Was könnte ei- nen Weisen dazu bringen, selbst gesetzlos zu handeln?", "f": [{"n": "953", "t": "Oder: ... aber die Bösen fallen durch das Böse."}, {"n": "954", "t": "Und ja, die Sprüche haben hier auch die Ewigkeit im Blick. Allein auf die Zeit „unter der Sonne“ gesehen, haben die Gesetzlosen gegenüber den Gerechten den ein oder anderen Vorteil. Aber mit dem ewigen Gericht kommt für den Gläubigen spätestens der Moment des Triumphes."}]}, "Spr 28,13": {"k": "Wer seine Übertretungen versteckt, wird kein Gelingen ha- ben; wer sie aber bekennt und lässt, wird Barmherzigkeit erlan- gen. Es geht um den Umgang mit eigener Sünde ( Übertretungen ). Wer sie versteckt und so tut als hätte er nichts Falsches getan, der wird keine Barmherzigkeit finden. Weder bei Menschen noch bei Gott. Wer Gnade und Vergebung sucht, muss seine Übertretungen beken- nen und lassen. Andernfalls wird sein Leben nicht gelingen, weil Gott Sünde straft und seine geistlichen Kinder züchtigt. Es ist Gott, der uns vergeben will, wenn wir zu unseren Fehlern stehen (vgl. 1Johannes 1,8.9) und uns darum bemühen, sie nicht mehr wieder zu tun . Wie schwer fällt es dir, Sünde vor Menschen oder vor Gott zu- zugeben? Gibt es Sünde, die du immer wieder bekennst, aber es fehlen dir der Biss oder gute Ideen, sie zu lassen? Gibt es Sün- den, die du versteckst?", "f": [{"n": "1045", "t": "Ich denke, dass Gott weiß, wie schwer es uns fällt, manche Sünde zu lassen. Wir dürfen uns von dem Kampf gegen Sünde nicht entmutigen lassen! Es geht darum, jeden Tag neu, unsere Sünden zu bekennen, uns an Gottes Vergebung zu freuen und im Kampf gegen un- sere Lieblingssünden einen Schritt weiter zu kommen. Tiefsitzende Charaktersünden wer- den nicht in Tagen, sondern in Jahren verändert!"}]}, "Spr 29,1": {"k": "Ein Mensch , der, oft zurechtgewiesen, den Nacken ver- härtet, wird plötzlich zerschmettert werden <und das> ohne Hei- lung. Seinen Nacken verhärten (oder halsstarrig sein ) ist ein Bild dafür, dass ein Mensch nicht bereit ist, eine Autorität anzuerkennen. Die Formulierung wird oft für das Volk Israel verwendet, das nicht auf Gottes Gebote hören wollte, bis es zu spät war (2Mose 32,9; 2Chro- nik 36,13-16; Nehemia 9,29; Jeremia 17,23; Apostelgeschichte 7,51). Wer oft zurechtgewiesen wird, aber nicht bereit ist, von seinen Eltern oder den Weisen zu lernen, der muss erleben, wie sein Leben in einem Nu zerbricht und wie Eigensinn und Sturheit seine Existenz vernichten. Man kann nicht jeden Fehler wieder gut ma- chen und jede Dummheit wieder gerade biegen. Hörst du zu, wenn deine Eltern, deine Lehrer oder weise, ältere Christen dir Ratschläge geben? Hast du eine Neigung zur Hals- starrigkeit oder zur Korrekturbereitschaft?", "f": [{"n": "1057", "t": "Wörtlich: Mann"}]}, "Spr 16,9": {"k": "Das Herz eines Menschen plant seinen Weg, aber der HERR festigt seinen Schritt. Als Menschen dürfen und müssen wir nachdenken. Unser Gehirn ( Herz ) ist uns gegeben, damit es unser Leben plant . Das kreative Denken ist unser schöpfungsmäßiges Recht, aber auf dem Weg brauchen wir Gott, der uns beim Gehen einen Schritt nach dem an- deren festigt . Wenn der HERR uns nicht beisteht, kommen wir trotz aller klugen Planung nicht ans Ziel. Hast du schon über die kommenden Jahre nachgedacht und eine persönliche Vision bzw. eine Liste mit persönlichen Le- benszielen aufgestellt? Wo willst du hin?", "f": [{"n": "667", "t": "O. und. Hier muss kein Gegensatz vorliegen! Menschliches Planen und göttlicher Bei- stand gehen im Fall des Gerechten Hand in Hand."}, {"n": "668", "t": "O. gründet, ausrichtet, vorbereitet"}]}, "Spr 14,5": {"k": "Ein vertrauenswürdiger Zeuge lügt nicht, aber ein falscher Zeuge verbreitet Lügen. Der Charakter eines Zeuge n ist entscheidend. Ein vertrauenswürdi- ger Zeuge zeichnet sich dadurch aus, dass er nicht lügt , selbst dann nicht, wenn man ihn bedrängt, besticht oder bedroht. Der „gute Baum“ bringt „gute Frucht“ (vgl. Lukas 6,43). Sein Gegenstück, ein falscher Zeuge , verbreitet Lügen . Man darf ihm nicht glauben, weil Wahrheit für ihn keine Rolle spielt. Für Geld oder aus Angst ist er bereit, alles zu bezeugen. Wann hast du dich das letzte Mal über einen Lügner geärgert? Wie steht es um deine Charakterfestigkeit im Blick auf das Sa- gen von Wahrheit?", "f": [{"n": "593", "t": "Wie sehr hat mir eine gute To-Do-Liste, der Umstieg auf das MacBook Air und ein Smart- phone als Gebetsliste, Bibelverslerndatei und Notizbuch gut getan."}, {"n": "594", "t": "S. „Exkurs: Der Spötter“ in den Anmerkungen zu Sprüche 1,22."}]}, "Spr 17,24": {"k": "Vor dem Angesicht des Verständigen ist Weisheit, aber die Augen des Toren sind an den Enden der Erde. Was macht einen Toren so besonders dumm? Es ist seine Beschäfti- gung mit unerreichbaren, fernen Zielen. Seine Augen, d.h. sein Inte- resse, sind an den Enden der Erde . Er kümmert sich nicht um das Naheliegende. Seine Gedanken kreisen um Dinge, die unwichtig, sinnlos und weit weg sind. Für den Toren ist „alles“ interessant, nur nicht die wirklich wichtigen Fragen seines jetzigen Lebens. Er ver- plempert Energie und Zeit mit Themen, die ihn nicht weiter bringen. Er ist ein Träumer, der die Realität ausblendet. Für ihn zählt, das Neue, das Interessante, der letzte Schrei und das Hippe. Er will alles wissen über neue Videos, Filme, Musik, Politik oder Trends. Nur sein eigenes Leben, das interessiert ihn herzlich wenig. Ganz anders der Verständige. Vor seinem Angesicht ist Weisheit. Die Formulierung vor seinem Angesicht ist etwas ungewöhnlich. Wenn Weisheit vor dem Angesicht des Verständigen ist, dann hat er sie nämlich nicht nur vor Augen , i.S.v. verinnerlicht. Wer vor den Augen eines anderen ist, der kümmert sich oder dient demjenigen, vor des- sen Augen er ist (vgl. 1Samuel 2,11; 1Könige 12,6; Esther 1,10). Hier ist es die Weisheit, die sich um den Verständigen kümmert. Wäh- rend der Tor mit seinen Gedanken ganz weit weg ist, ist dem Weisen die Weisheit ganz nahe. Und sie hilft ihm dabei, sein Leben zu meis- tern. Womit beschäftigst du dich in deinen Gedanken? Verlierst du dich in Träumerei, um der Realität mit ihren Problemen zu ent- fliehen? Benutzt du die Weisheit Gottes, um dein Leben in den Griff zu bekommen?", "f": [{"n": "742", "t": "W. Gerechten"}, {"n": "743", "t": "O. Aufrichtigkeit, das, was recht ist"}]}, "Spr 22,3": {"k": "Der Kluge sieht das Unglück und verbirgt sich; die Einfältigen aber gehen weiter und leiden Strafe . Unterscheidungsvermögen bewahrt vor Missgeschick. Es ist klug, ein Unglück rechtzeitig zu erkennen und sich vor ihm zu verbergen. Einsicht und Scharfsinn sind Tugenden, die uns vielleicht nicht vor allen Katastrophen im Leben bewahren können, die es uns aber er- lauben, einigen von ihnen auszuweichen. Im Gegensatz zum Klugen sieht der Einfältige das Unglück auf sich zukommen, aber er versteckt sich nicht vor ihm, sondern läuft mit- ten hinein. Letztlich muss er für seine Dummheit büßen. Wie verbirgt man sich vor Unglück? Welche Strategien gibt es, um einem Unglück auszuweichen? Bist du gerade dabei, sehen- den Auges in ein Unglück zu laufen?", "f": [{"n": "901", "t": "O. seine Gesundheit, Rasse, Nationalität, Hautfarbe, IQ, Begabung, Beziehungen..."}, {"n": "902", "t": "Es geht sprachlich um die Auferlegung einer Geldstrafe."}, {"n": "903", "t": "Siehe zu Furcht des H die Fußnote zu Sprüche 19,23."}]}, "Spr 28,14": {"k": "Glückselig der Mensch, der sich beständig <vor Gott> fürch- tet; wer aber sein Herz verhärtet, wird ins Unglück fallen. Es gehört zum klugen Menschsein dazu, dass man sich vor Gott fürchtet. Der H will Ehrfurcht und Verehrung. Er will gehört wer- den. Er will uns in unser Leben hineinsprechen dürfen. Wer sein Herz verhärtet, es unempfindlich gegen Gottes Reden macht, der wird ins Unglück fallen. Unglaube, Rebellion und Trotz erben keinen Segen. Wer sich nicht ermahnen und korrigieren lässt, der ist schon verloren. Anders der gehorsame Gläubige. Er maximiert seine Le- bensqualität und muss sich nicht vor Gottes Strafe fürchten. Wahres Glück und Gottesfurcht gehen immer Hand in Hand. Kannst du von dir sagen, dass du Gott beständig fürchtest und auf ihn hörst? Oder ist dein Herz vielleicht hart?", "f": []}, "Spr 29,19": {"k": "Durch Worte wird ein Knecht nicht zurechtgewiesen; obwohl er versteht, folgt er nicht. Dieser Vers beschreibt eine traurige Realität. Es gibt Menschen, die so sehr in ihrer eigenen Dummheit bzw. Boshaftigkeit gefangen sind, dass Worte allein sie nicht mehr erreichen. Selbst wenn sie verstehen, was sie falsch gemacht haben, lassen sie sich davon nicht (mehr) korrigieren. Nicht jeder Mensch liebt die Wahrheit und lässt sich durch erklä- rende Worte zu einer Lebensveränderung bewegen. Es gibt haufen- weise Menschen, die wissen, dass ihr Lebensstil falsch ist, die auch wissen, was sie ändern sollten, es aber einfach nicht tun. Sie sind dazu verdammt, das Falsche zu leben und die Folgen zu tragen. Wo passiert es dir, dass du eine Zurechtweisung verstehst, aber nicht auf sie reagierst, sondern einfach weiter machst wie zu- vor?", "f": []}};
const HINTS=["Vers antippen → Kommentar lesen",
  "Erste 3 Wörter sichtbar – Vers weitersagen · Antippen für Kommentar",
  "Hauptwörter als Anker · Rest verborgen · Antippen für Kommentar"];
let cur=0,mode=0,sx=0,sy=0,pdY=0,pdDrag=false;
const SKIP=new Set(['der','die','das','den','dem','des','ein','eine','einen','einem','eines',
 'und','aber','oder','so','wenn','denn','weil','dass','als','wie','auch','noch','nicht','nur',
 'sich','mir','dir','ihm','ihr','uns','euch','ist','sind','war','waren','wird','werden','hat',
 'haben','wurde','zu','von','vor','mit','für','auf','an','in','aus','bei','nach','über',
 'unter','durch','um','bis','seit','ab','ohne','gegen','ja','nein','mehr','doch','da','wo',
 'wer','was','ihn','es','er','sie','wir','ich','du','man','alle','alles','jeder','kein','keine',
 'mein','dein','sein','seine','diesen','deren','einem']);
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function modeText(text,m){
  if(m===0) return esc(text);
  const toks=text.split(/(\s+)/);let wi=0;
  return toks.map(tok=>{
    if(/^\s+$/.test(tok)) return tok;
    const cl=tok.replace(/[.,;:!?»«"'<>]/g,'');
    if(m===1){const show=wi++<3;if(show)return esc(tok);
      return '<span class="einstieg-hide">'+'\u00a0'.repeat(Math.max(2,cl.length))+'</span>';}
    const hh=cl==='HERR'||cl==='HERRN';
    const cp=cl.length>0&&cl[0]===cl[0].toUpperCase()&&cl[0]!==cl[0].toLowerCase()&&!SKIP.has(cl.toLowerCase());
    const show=wi===0||hh||(wi>0&&cp);wi++;
    if(show)return esc(tok);
    return '<span class="anker-hide">'+'_'.repeat(Math.max(2,cl.length))+'</span>';
  }).join('');
}
function currentWeek(){
  const t=new Date().toISOString().slice(0,10);
  for(let i=0;i<WEEKS.length;i++){
    const w=WEEKS[i];
    if(w.date_start&&w.date_end&&t>=w.date_start&&t<=w.date_end)return i;
  }
  return WEEKS.findIndex(w=>w.typ==='L');
}
function buildSlides(){
  const c=document.getElementById('slides');c.innerHTML='';
  WEEKS.forEach(w=>{
    const sl=document.createElement('div');sl.className='slide';
    if(w.typ==='R'){sl.innerHTML=`<div class="rep-card"><div class="rep-title">${w.label}</div><div class="rep-sub">${w.sub}</div><div class="rep-hint">Wiederholungswoche · kein neues Pensum</div></div>`;}
    else{
      w.verse.forEach(v=>{
        if(v.optional)return;
        const key='Spr '+v.ref;const kd=KOMM[key];
        const card=document.createElement('div');card.className='vcard';
        card.style.borderLeftColor=w.color||'#1F3864';card.dataset.raw=v.text;
        card.innerHTML=`<div class="vcard-inner"><div class="vcard-ref">${esc(v.ref)}${kd?'<span class="vcard-badge">Kommentar ›</span>':''}</div><div class="vcard-text">${modeText(v.text,mode)}</div></div>`;
        card.addEventListener('click',()=>openKS(v.ref,v.text,w.color||'#1F3864',key));
        sl.appendChild(card);
      });
    }
    c.appendChild(sl);
  });
  goTo(cur,false);buildDots();
}
function refreshTexts(){document.querySelectorAll('.vcard-text').forEach(el=>{el.innerHTML=modeText(el.closest('.vcard').dataset.raw,mode);});}
function goTo(idx,anim=true){
  cur=Math.max(0,Math.min(WEEKS.length-1,idx));
  const sl=document.getElementById('slides');
  if(!anim){sl.style.transition='none';}
  sl.style.transform=`translateX(-${cur*100}vw)`;
  if(!anim)requestAnimationFrame(()=>requestAnimationFrame(()=>{sl.style.transition='';}));
  updateTop();updateDots();
  document.getElementById('progress-bar').style.width=((cur+1)/WEEKS.length*100).toFixed(1)+'%';
}
function nav(d){goTo(cur+d);}
function updateTop(){
  const w=WEEKS[cur];const col=(w.typ==='L'?w.color:'#44546A')||'#1F3864';
  document.getElementById('topbar').style.background=col;
  document.getElementById('wn-big').textContent=w.wn;
  document.getElementById('tb-short').textContent=w.typ==='L'?w.short:w.label;
  document.getElementById('tb-date').textContent=w.zeitraum||'';
  document.getElementById('tb-block').textContent=w.typ==='L'?(w.block||''):(w.sub||'');
}
function buildDots(){
  const c=document.getElementById('dots');c.innerHTML='';
  WEEKS.forEach((w,i)=>{const d=document.createElement('div');
    d.className='dot'+(w.typ==='R'?' rep':'')+(i===cur?' active':'');
    d.onclick=()=>goTo(i);c.appendChild(d);});
}
function updateDots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));}
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',i===m));
  document.getElementById('mode-hint').textContent=HINTS[m];
  refreshTexts();
}
function openKS(ref,verseText,color,key){
  const kd=KOMM[key]||null;
  document.getElementById('ks-ref').textContent=ref;
  document.getElementById('ks-ref').style.color=color;
  document.getElementById('ks-verse').textContent=verseText;
  document.getElementById('ks-back').style.background=color;
  const kommEl=document.getElementById('ks-komm');
  kommEl.textContent=kd&&kd.k?kd.k:'Kein Kommentar vorhanden.';
  if(!(kd&&kd.k)) kommEl.style.color='#999'; else kommEl.style.color='';
  // Footnotes
  const fnArea=document.getElementById('ks-fn-area');
  fnArea.innerHTML='';
  if(kd&&kd.f&&kd.f.length>0){
    const toggle=document.createElement('div');
    toggle.className='fn-toggle';
    toggle.innerHTML=`<div class="fn-toggle-icon"><svg width="8" height="10" viewBox="0 0 8 10"><polygon points="0,0 8,5 0,10"/></svg></div><span class="fn-toggle-label">Fußnoten</span><span class="fn-toggle-count">${kd.f.length}</span>`;
    const list=document.createElement('div');
    list.className='fn-list';
    list.innerHTML=kd.f.map(fn=>`<div class="fn-item"><div class="fn-nr">Anmerkung ${esc(fn.n)}</div><div class="fn-text">${esc(fn.t)}</div></div>`).join('');
    toggle.onclick=()=>{toggle.classList.toggle('open');list.classList.toggle('open');};
    fnArea.appendChild(toggle);fnArea.appendChild(list);
  }
  document.getElementById('ks-src').textContent=kd?'J. Fischer, Kommentar zu den Sprüchen':'';
  document.getElementById('ks-body').scrollTop=0;
  document.getElementById('ks').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeKS(){document.getElementById('ks').classList.remove('open');document.body.style.overflow='';}
function bgClick(e){if(e.target===document.getElementById('ks-bg'))closeKS();}
// Swipe-down to close panel
const pnl=document.getElementById('ks-panel');
pnl.addEventListener('touchstart',e=>{pdY=e.touches[0].clientY;pdDrag=true;},{passive:true});
pnl.addEventListener('touchmove',e=>{if(!pdDrag)return;const dy=e.touches[0].clientY-pdY;if(dy>0)pnl.style.transform=`translateY(${dy}px)`;},{passive:true});
pnl.addEventListener('touchend',e=>{if(!pdDrag)return;pdDrag=false;const dy=e.changedTouches[0].clientY-pdY;pnl.style.transform='';if(dy>80)closeKS();},{passive:true});
// Week swipe
const sldr=document.getElementById('slider');
sldr.addEventListener('touchstart',e=>{if(document.getElementById('ks').classList.contains('open'))return;sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
sldr.addEventListener('touchmove',e=>{if(document.getElementById('ks').classList.contains('open'))return;if(Math.abs(e.touches[0].clientX-sx)>Math.abs(e.touches[0].clientY-sy)&&Math.abs(e.touches[0].clientX-sx)>10)e.preventDefault();},{passive:false});
sldr.addEventListener('touchend',e=>{if(document.getElementById('ks').classList.contains('open'))return;const dx=sx-e.changedTouches[0].clientX,dy=Math.abs(e.changedTouches[0].clientY-sy);if(Math.abs(dx)>50&&dy<80)nav(dx>0?1:-1);},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeKS();
  if(document.getElementById('ks').classList.contains('open'))return;
  if(e.key==='ArrowRight')nav(1);if(e.key==='ArrowLeft')nav(-1);
  if(e.key==='1')setMode(0);if(e.key==='2')setMode(1);if(e.key==='3')setMode(2);
});
// Init
buildSlides();
cur=currentWeek();updateTop();updateDots();goTo(cur,false);
</script>
</body>
