s Gebote unsensibel macht, rennt in sein Verderben. Weil das „Herz“ das Zentrum des emotionalen, intellektuellen, reli- giösen und moralischen Handelns eines Menschen ist, muss es als kostbarstes Gut mehr behütet werden als irgendetwas sonst (Sprü- che 4,23). Kannst du mit eigenen Worten beschreiben, was es bedeutet, sein „Herz zu behüten“ und hast du eine Idee davon, wie das praktisch aussehen könnte? Schon im Alten Testament fordert Gott die Gläubigen auf: „Werft von euch alle eure Vergehen... und schafft euch ein neues Herz...!“ (Hesekiel 18,31). Für den Neuen Bund verheißt Gott den Gläubigen ein „neues Herz“ (Hesekiel 36,26) , d.h. Gott schenkt denen, die Buße tun, eine neue, innere Ausrichtung und den Wunsch, das Rich- tige zu tun. Solche Christen wollen Gott gefallen, seine Gebote ver- stehen und ihm dienen, aber nicht, weil sie „eigen“ sind, sondern weil Gott dieses Ansinnen in ihr Herz gelegt hat. Hast du ein neues, gereinigtes Herz? Bist du auf Gott ausgerich- tet und hast du den tiefen Wunsch, ihm zu dienen und ihm zu gefallen?", "f": [{"n": "84", "t": "Das „Herz“ steht im Alten Testament für das Denken des Menschen, also nicht wie heute, bildhaft für seine Gefühle. Siehe auch den Exkurs am Ende dieses Abschnitts."}, {"n": "85", "t": "Und zwar weil er das Gehörte für wertvoll und wichtig erachtet. Hier geht es Salomo nicht um stumpfsinniges Auswendiglernen von Bibelversen!"}, {"n": "86", "t": "Bzw. den er sich selbst mühsam erarbeitet hat. Dieser Kommentar ist gerade auch für solche Menschen geschrieben."}, {"n": "87", "t": "Falls dir Ideen und Themen fehlen, schau dir doch unser Buch „Mit Werten erziehen und prägen“ an. Dort findest du viele Tipps. Das Buch kann man im Buchhandel kaufen oder kostenlos online lesen: https://www.frogwords.de/ehe_und_familie/wertevermitt- lung_kindererziehung/index."}, {"n": "88", "t": "Erziehung ist also mehr als die Weitergabe von ein paar Lebensprinzipien, die man ir- gendwo aufgeschnappt hat. Es geht darum, das eigene - hoffentlich gute - Leben mit Gott in seiner Gänze als den „Weg des Lebens“ (vgl. Sprüche 2,19) zu erklären und weiterzu- reichen."}, {"n": "89", "t": "Apostelgeschichte 15,9: ein gereinigtes Herz."}, {"n": "90", "t": "Die Weisheit wird hier als Frau gesehen, die es zu gewinnen gilt."}]}, "Spr 2,3": {"k": "ja, wenn du die Weisheit anrufst, deine Stimme erhebst zur Einsicht; wenn du sie suchst wie Silber, und ihr wie verborgenen Schätzen nachspürst; Haben die ersten beiden Verse die grundsätzliche Bereitschaft be- tont, sich der väterlichen Lehre auszusetzen, so wendet sich Salomo jetzt der Suche nach Weisheit zu. Wenn der Sohn einsichtig werden will, reicht es nicht, dass er passiv zuhört, wenn der Vater ihn be- lehrt, biblische Geschichten über sich ergehen lässt oder ohne in- nere Anteilnahme Bibelverse auswendig lernt. Er muss selbst aktiv werden. Weisheit und Einsicht gleichen verborgenen Schätzen , die aufgespürt werden wollen. Die Betonung liegt auf dem Aufwand, den der Schüler betreiben muss, um ans Ziel zu kommen. In Sprüche 1,20ff hatte die Weisheit gerufen und ihr Schreien wurde nicht ge- hört. Mit derselben Vehemenz soll nun der Schüler ans Werk gehen, seine Stimme zur Einsicht erheben und deutlich machen, dass er echtes Interesse daran besitzt sie zu erkennen . Die Einfältigen in Sprüche 1,28 suchten Weisheit, aber sie konnten sie nicht mehr fin- den. Ihr Leben war in die Sackgasse hinein gelaufen und nun gab es kein Zurück mehr. Ganz anders der „Sohn“! Er ist noch jung und hat noch alle Möglichkeiten offen (und Eltern, die sich um ihn küm- mern!). Wenn er sich auf die Suche nach Weisheit macht, verspricht der Vater ihm, dass er sie finden wird. Der Aufwand wird wie bei jeder Schatzsuche groß sein. Wie die Jagd nach Silber oder verbor- genen Schätzen so ist die Suche nach Einsicht ein anstrengendes, langwieriges und von persönlichen Opfern begleitetes Unterfangen, das sich letztlich aber auszahlt und alle Mühen wert ist. Ein Schatzsucher braucht Hingabe, einen Plan und die richtigen Mit- tel, um ans Ziel zu kommen; und dasselbe gilt für den Schüler der Weisheit. Er muss wollen, die Bibel studieren und von seinen Eltern lernen. Nur dann wird er sein Ziel erreichen. Und genau hier stoßen wir auf ein riesiges Problem: Wo finden sich heute Jugendliche, die den Biss haben, die Bibel zu studieren und wo finden sich Eltern, die noch bereit sind, ihre Kinder in das Wort Gottes einzuführen? Weite Teile der christlichen Gesellschaft glauben, dass man Weisheit lernt, wie man eine Fertigsuppe kocht: Aufreißen, einrühren - fertig! Aber das stimmt nicht! Göttliche Weisheit ist ein Schatz, der gesucht, ge- funden und gehoben werden will. Wer dazu nicht bereit ist, geht leer aus! Es handelt sich um einen lebenslangen Prozess, der im Jugend- alter beginnen sollte. Wir dürfen als Eltern die biblische Belehrung nicht auf das Vorlesen von biblischen Geschichten reduzieren und den gemeindlichen Veranstaltungen wie Kindergottesdienst, Kids- Club, Jugendstunde usw. den Rest überlassen. Es mag ja sein, dass uns der Anspruch, geistliche Lehrer unserer Kinder zu sein, über- fordert, aber wenn wir uns aus der Verantwortung stehlen, die Gott uns gegeben hat (Epheser 6,4), dann bleiben unsere Kinder auf der Strecke! Wäre heute nicht ein guter Tag, um Buße zu tun, und eine familiäre Kehrtwende einzuleiten? Warum nicht heute eine Famili- enkonferenz einberufen und gemeinsam darüber nachdenken, wie man miteinander auf die Jagd nach göttlicher Weisheit gehen kann? Warum nicht heute eine paar Bibelverskärtchen kaufen und mit den Kindern zwei Bibelverse vor dem Abendessen lernen? Was hält dich davon ab, jeden Monat ein ethisches Thema mit den Kindern zu besprechen und dazu einen Film anzuschauen (natürlich mit Pop- corn!)? Wen könntest du um Hilfe bitten, dass er dich in punkto Bibel- studium, Kindererziehung und Hingabe an biblische Weisheit begleitet und unterstützt?", "f": [{"n": "90", "t": "Die Weisheit wird hier als Frau gesehen, die es zu gewinnen gilt."}, {"n": "91", "t": "89 vorbereitete Themen finden sich in: Fischer, Bärbel; Fischer, Jürgen (2010): Mit Werten erziehen und prägen. Ein Praxishandbuch zur Vermittlung biblischer Werte in der christlichen Erziehung. 1. Aufl. Hünfeld: Christlicher Mediendienst."}, {"n": "92", "t": "Bei der Übersetzung des Genitivs ist es nicht ganz leicht sich zwischen dem Genitiv der Autorenschaft („die Erkenntnis, die von Gott gegeben wird“), dem Genitiv des unveräußer- lichen Besitzes („die Erkenntnis, die Gott eigen ist“) und einem objektiven Genitiv („die Erkenntnis von/über Gott“) zu entscheiden. Nicht unwahrscheinlich fließen die verschie- denen Betonungen hier zusammen. „Erkenntnis“ ist das Verstehen des göttlichen Charak- ters, was aber nur möglich ist, weil Gott sich uns offenbart."}]}, "Spr 2,4": {"k": "ja, wenn du die Weisheit anrufst, deine Stimme erhebst zur Einsicht; wenn du sie suchst wie Silber, und ihr wie verborgenen Schätzen nachspürst; Haben die ersten beiden Verse die grundsätzliche Bereitschaft be- tont, sich der väterlichen Lehre auszusetzen, so wendet sich Salomo jetzt der Suche nach Weisheit zu. Wenn der Sohn einsichtig werden will, reicht es nicht, dass er passiv zuhört, wenn der Vater ihn be- lehrt, biblische Geschichten über sich ergehen lässt oder ohne in- nere Anteilnahme Bibelverse auswendig lernt. Er muss selbst aktiv werden. Weisheit und Einsicht gleichen verborgenen Schätzen , die aufgespürt werden wollen. Die Betonung liegt auf dem Aufwand, den der Schüler betreiben muss, um ans Ziel zu kommen. In Sprüche 1,20ff hatte die Weisheit gerufen und ihr Schreien wurde nicht ge- hört. Mit derselben Vehemenz soll nun der Schüler ans Werk gehen, seine Stimme zur Einsicht erheben und deutlich machen, dass er echtes Interesse daran besitzt sie zu erkennen . Die Einfältigen in Sprüche 1,28 suchten Weisheit, aber sie konnten sie nicht mehr fin- den. Ihr Leben war in die Sackgasse hinein gelaufen und nun gab es kein Zurück mehr. Ganz anders der „Sohn“! Er ist noch jung und hat noch alle Möglichkeiten offen (und Eltern, die sich um ihn küm- mern!). Wenn er sich auf die Suche nach Weisheit macht, verspricht der Vater ihm, dass er sie finden wird. Der Aufwand wird wie bei jeder Schatzsuche groß sein. Wie die Jagd nach Silber oder verbor- genen Schätzen so ist die Suche nach Einsicht ein anstrengendes, langwieriges und von persönlichen Opfern begleitetes Unterfangen, das sich letztlich aber auszahlt und alle Mühen wert ist. Ein Schatzsucher braucht Hingabe, einen Plan und die richtigen Mit- tel, um ans Ziel zu kommen; und dasselbe gilt für den Schüler der Weisheit. Er muss wollen, die Bibel studieren und von seinen Eltern lernen. Nur dann wird er sein Ziel erreichen. Und genau hier stoßen wir auf ein riesiges Problem: Wo finden sich heute Jugendliche, die den Biss haben, die Bibel zu studieren und wo finden sich Eltern, die noch bereit sind, ihre Kinder in das Wort Gottes einzuführen? Weite Teile der christlichen Gesellschaft glauben, dass man Weisheit lernt, wie man eine Fertigsuppe kocht: Aufreißen, einrühren - fertig! Aber das stimmt nicht! Göttliche Weisheit ist ein Schatz, der gesucht, ge- funden und gehoben werden will. Wer dazu nicht bereit ist, geht leer aus! Es handelt sich um einen lebenslangen Prozess, der im Jugend- alter beginnen sollte. Wir dürfen als Eltern die biblische Belehrung nicht auf das Vorlesen von biblischen Geschichten reduzieren und den gemeindlichen Veranstaltungen wie Kindergottesdienst, Kids- Club, Jugendstunde usw. den Rest überlassen. Es mag ja sein, dass uns der Anspruch, geistliche Lehrer unserer Kinder zu sein, über- fordert, aber wenn wir uns aus der Verantwortung stehlen, die Gott uns gegeben hat (Epheser 6,4), dann bleiben unsere Kinder auf der Strecke! Wäre heute nicht ein guter Tag, um Buße zu tun, und eine familiäre Kehrtwende einzuleiten? Warum nicht heute eine Famili- enkonferenz einberufen und gemeinsam darüber nachdenken, wie man miteinander auf die Jagd nach göttlicher Weisheit gehen kann? Warum nicht heute eine paar Bibelverskärtchen kaufen und mit den Kindern zwei Bibelverse vor dem Abendessen lernen? Was hält dich davon ab, jeden Monat ein ethisches Thema mit den Kindern zu besprechen und dazu einen Film anzuschauen (natürlich mit Pop- corn!)? Wen könntest du um Hilfe bitten, dass er dich in punkto Bibel- studium, Kindererziehung und Hingabe an biblische Weisheit begleitet und unterstützt?", "f": [{"n": "90", "t": "Die Weisheit wird hier als Frau gesehen, die es zu gewinnen gilt."}, {"n": "91", "t": "89 vorbereitete Themen finden sich in: Fischer, Bärbel; Fischer, Jürgen (2010): Mit Werten erziehen und prägen. Ein Praxishandbuch zur Vermittlung biblischer Werte in der christlichen Erziehung. 1. Aufl. Hünfeld: Christlicher Mediendienst."}, {"n": "92", "t": "Bei der Übersetzung des Genitivs ist es nicht ganz leicht sich zwischen dem Genitiv der Autorenschaft („die Erkenntnis, die von Gott gegeben wird“), dem Genitiv des unveräußer- lichen Besitzes („die Erkenntnis, die Gott eigen ist“) und einem objektiven Genitiv („die Erkenntnis von/über Gott“) zu entscheiden. Nicht unwahrscheinlich fließen die verschie- denen Betonungen hier zusammen. „Erkenntnis“ ist das Verstehen des göttlichen Charak- ters, was aber nur möglich ist, weil Gott sich uns offenbart."}]}, "Spr 2,5": {"k": "dann wirst du die Furcht des HERRN verstehen und die Er- kenntnis Gottes finden. Treffen eine religiöse Erziehung der Eltern und die Bereitschaft zum Lernen auf Seiten des Jugendlichen aufeinander, garantiert Salomo den Erfolg des Unternehmens. Gott will gefunden werden (5Mose 4,29; Apostelgeschichte 17,27). Die Notwendigkeit, sich in die Ge- dankenwelt der Bibel einarbeiten zu müssen, um Erkenntnis Gottes zu finden, erscheint heute vielen auf den ersten Blick als große Hürde, vielleicht sogar als ein unüberwindbares Hindernis. Zum Glück ist es das nicht. Jesus formuliert treffend in der Bergpredigt: „Sucht und ihr werdet finden“ (Matthäus 7,7) und Salomo kann aus seiner Lebenserfahrung heraus formulieren: „Bei jeder Mühe ist Ge- winn“ (Sprüche 14,23). Es mag einige Jahre dauern, bis man sich in der Bibel heimisch fühlt, aber Generationen von Christen haben sich nach der Bekehrung zu Gott dem Studium seines Wortes zugewandt, weil sie ihren Gott noch besser kennen wollten. Sie ha- ben sich nicht mit einer Bibel zufrieden gegeben, die im Schrank steht, oder mit einem Wissen, das jederzeit über Google aus dem In- ternet abrufbar ist. Sie wollten die Furcht des HERRN verstehen, um ihr Leben mit all seinen Facetten auf Gott auszurichten. Im Zentrum unseres geistlichen Wissens steht keine abstrakte Theorie, sondern eine dreieinige Persönlichkeit, die wir erforschen dürfen (vgl. Sprü- che 25,2). Intimität und Loyalität, Erkenntnis Gottes und Gehorsam bilden im authentischen Christsein eine unauflösbare Einheit. Was wäre es dir wert, Gott besser zu verstehen und eine tiefere Beziehung zu ihm aufzubauen?", "f": [{"n": "91", "t": "89 vorbereitete Themen finden sich in: Fischer, Bärbel; Fischer, Jürgen (2010): Mit Werten erziehen und prägen. Ein Praxishandbuch zur Vermittlung biblischer Werte in der christlichen Erziehung. 1. Aufl. Hünfeld: Christlicher Mediendienst."}, {"n": "92", "t": "Bei der Übersetzung des Genitivs ist es nicht ganz leicht sich zwischen dem Genitiv der Autorenschaft („die Erkenntnis, die von Gott gegeben wird“), dem Genitiv des unveräußer- lichen Besitzes („die Erkenntnis, die Gott eigen ist“) und einem objektiven Genitiv („die Erkenntnis von/über Gott“) zu entscheiden. Nicht unwahrscheinlich fließen die verschie- denen Betonungen hier zusammen. „Erkenntnis“ ist das Verstehen des göttlichen Charak- ters, was aber nur möglich ist, weil Gott sich uns offenbart."}, {"n": "93", "t": "Mit „denn“ begründet Salomo, warum wir beim Studium der Weisheit Gott finden: Er ist ihr Schöpfer. Wer sich mit den Gedanken eines Schriftstellers beschäftigt, wird zum Kenner seiner Person. Dasselbe gilt für Gott. Wer sich mit Weisheit beschäftigt, lernt ihren Autor kennen."}, {"n": "94", "t": "„HERR“ steht betont am Anfang des Satzes."}]}, "Spr 2,9": {"k": "Dann wirst du Gerechtigkeit verstehen und Recht und Ge- radheit, jede gute Bahn . Das „dann“ bezieht sich auf den in Sprüche 2,1-8 beschriebenen, dreiteiligen pädagogischen Prozess, bei dem der Schüler (1) auf- merksam zuhört, sich (2) eigenständig auf die Suche nach Weisheit macht und (3) diese von Gott geschenkt bekommt. Wer sich derart auf eine väterlich-göttliche Belehrung einlässt, wird kein Problem haben, Gerechtigkeit , Recht und Geradheit zu verstehen. Er wird die „krummen Wege“ des Unrechts und der Ungerechtigkeit verlassen und wissen, was die gute (Lebens-) Bahn ist. Bei der „Bahn“ handelt es sich wörtlich um eine „Wagenspur“. Ist der Boden weich, drücken sich Wagenräder so tief ein, dass, ist der Boden erst einmal ausgehärtet, die folgenden Fahrzeuge den tiefen Spurrillen folgen müssen. Ebenso verhält es sich mit dem Leben ei- nes weisen Schülers: Er wird jede gute Bahn erkennen, d.h. ihm wird das ganze Spektrum an richtigen Verhaltensweisen aufgeschlossen, die zu einem guten Leben dazugehören. Und hat er sie einmal ver- standen und eingeübt, rollt er in diesen ethischen Spurrillen (fast wie von selbst) Richtung ewiges Leben . An die Stelle eines distanzierten, rein akademischen Sezierens von „Wahrheiten“ tritt die persönliche Aneignung, das Durchdringen und Praktizieren des Gelernten. Wie man das Fahrradfahren nur dadurch erlernt, dass man sich aufs Fahrrad setzt und losfährt, so ist Weisheit nicht allein ein Wissen, sondern eine Fertigkeit, die sich durch den Gebrauch im Alltag entwickelt und vertieft . Der Sohn soll das Gehörte parat haben und einsetzen können, wenn die Situ- ation es erfordert. Übrigens braucht es ungefähr sechs Wochen, um aus einem wieder- holten Verhalten eine Gewohnheit werden zu lassen. Wer sich heute vornimmt, ein bestimmtes Verhalten zu ändern, sollte sich nicht da- von frustrieren lassen, wenn es ein Weilchen braucht, bis das neue Verhalten für ihn normal wird. Wie viel Zeit in der Woche wärest du bereit aufzuwenden, um tiefe geistliche Spurrillen auszubilden?", "f": [{"n": "100", "t": "Nur ein paar ausgewählte Belegstellen: Jesaja 43,11; Jeremia 30,11; Jesaja 49,26; 2Sa- muel 22,3; Jesaja 45,21; Hosea 13,4; Lukas 1,46.47; 1Timotheus 4,10; Apostelgeschichte 13,23; Lukas 2,11; 1Johannes 4,14; Jesaja 12,2; 2Mose 15,2; Psalm 68,20; 27,1."}, {"n": "101", "t": "W. Wagenspur"}, {"n": "102", "t": "Leider gibt es auch das Gegenteil, Menschen, die so geübt sind in der Sünde, dass sie wie von allein immer wieder in böse Verhaltensweisen verfallen."}, {"n": "103", "t": "Deshalb ist der Weise immer auch jemand, der Fehler gemacht hat."}, {"n": "104", "t": "Beschreibt den Verständnisprozess aus Sprüche 2,9 genauer."}, {"n": "105", "t": "Die Bibel nennt diesen Vorgang auch „Beschneidung des Herzens“ (5Mose 10,16). „Um- kehr“, „Bekehrung“ und „Buße“ beschreiben einen bewussten Akt des Abschneidens alles rebellischen, selbstbestimmten Denkens. Im Moment der Bekehrung bitte ich Gott um Ver- gebung und kann mit dem Zöllner im Gleichnis beten: „O Gott, sei mir, dem Sünder, gnädig!“ (Lukas 18,13)"}, {"n": "106", "t": "Ein erneuertes Herz will gut gepflegt sein! Gott will sein Wort auf unser Herz schreiben und es in unser Inneres legen. Damit diese Verheißung Wirklichkeit wird, müssen wir viel über sein Wort nachdenken (Psalm 1,2), es nicht vergessen (Psalm 119,16) und getreulich tun, was wir verstanden haben, d.h. unser Herz nicht betrügen (Jakobus 1,25.26). Wo diese Voraussetzungen fehlen, findet der Heilige Geist als Quelle aller geistlichen Veränderung"}]}, "Spr 2,10": {"k": "Denn Weisheit wird in dein Herz kommen und Erkenntnis wird deiner Seele lieb sein; Wer sein „Herz zum Verständnis neigt“ (Sprüche 2,2), wird von Gott erleuchtet und gewinnt Freude an Erkenntnis. Wenn die Bibel davon spricht, dass das Gesetz Gottes aufs Herz, dem intellektuellen Zent- rum des Menschen, geschrieben ist (Jeremia 31,33; Hesekiel 36,26), dann bringt sie damit zum Ausdruck, dass der Gläubige sich Gottes Gebote zu eigen gemacht hat, sie liebt und sie aus einem inneren Im- puls der Willigkeit heraus gerne befolgt. Dieser Lernprozess (Römer 12,2) ist mehr als eine menschlich-intellektuelle Leistung! Gott selbst schenkt Weisheit (Sprüche 2,6). Deshalb heißt es in der Bibel einerseits „schafft euch ein neues Herz“ (Hesekiel 18,31) und ande- rerseits „ich werde euch […] ein fleischernes (= empfindsames) Herz geben“ (Hesekiel 36,26). Die Folge echter Umkehr ist ein von Weisheit erneuertes Herz (5Mose 30,2.6). Wenn der Mensch vor Gott zerbricht , wird er für Gott unwiderstehlich (Psalm 51,19) und Gott selbst wird seiner Seele Erkenntnis lieb machen . Hast du ein „beschnittenes Herz“? Wie kam es dazu?", "f": [{"n": "104", "t": "Beschreibt den Verständnisprozess aus Sprüche 2,9 genauer."}, {"n": "105", "t": "Die Bibel nennt diesen Vorgang auch „Beschneidung des Herzens“ (5Mose 10,16). „Um- kehr“, „Bekehrung“ und „Buße“ beschreiben einen bewussten Akt des Abschneidens alles rebellischen, selbstbestimmten Denkens. Im Moment der Bekehrung bitte ich Gott um Ver- gebung und kann mit dem Zöllner im Gleichnis beten: „O Gott, sei mir, dem Sünder, gnädig!“ (Lukas 18,13)"}, {"n": "106", "t": "Ein erneuertes Herz will gut gepflegt sein! Gott will sein Wort auf unser Herz schreiben und es in unser Inneres legen. Damit diese Verheißung Wirklichkeit wird, müssen wir viel über sein Wort nachdenken (Psalm 1,2), es nicht vergessen (Psalm 119,16) und getreulich tun, was wir verstanden haben, d.h. unser Herz nicht betrügen (Jakobus 1,25.26). Wo diese Voraussetzungen fehlen, findet der Heilige Geist als Quelle aller geistlichen Veränderung"}, {"n": "107", "t": "O. dem bösen Weg. Wegen der Parallele zum „Mann der Verkehrtes redet“ entscheide ich mich für die Übersetzung „Weg des Bösen (=Übeltäters)“."}]}, "Spr 2,11": {"k": "Besonnenheit wird über dich wachen, Verständnis dich be- hüten, Mit einem von Gott veränderten Herzen, in dem Weisheit und Er- kenntnis wohnen, kommt Schutz. In einem dynamischen Prozess sucht der Einfältige nach Weisheit (Sprüche 2,3), findet sie bei Gott (Sprüche 2,6), wird von Gott behütet (Sprüche 2,7.8) und bewahrt sich selbst durch Besonnenheit und Verständnis. In dem Maß, wie wir mit Gott leben, ihn verstehen und von Gott verändert werden, verschwimmen die Grenzen zwischen „menschlicher Weisheit“ und „Gottesfurcht“, weil wir darin geübt sind, das Richtige zu tun. Wer die Wahrheit kennt, weiß eben, wie man den Fallen des Lebens aus- weicht. Hast du für dieses zuletzt beschriebene Prinzip ein Beispiel aus deinem Leben parat?", "f": [{"n": "107", "t": "O. dem bösen Weg. Wegen der Parallele zum „Mann der Verkehrtes redet“ entscheide ich mich für die Übersetzung „Weg des Bösen (=Übeltäters)“."}, {"n": "108", "t": "Die hebräische Poesie erlaubt den Wechsel von der Einzahl in die Mehrzahl."}, {"n": "109", "t": "Natürlich hat nicht jeder Übeltäter einen religiösen Hintergrund, aber für die monothe- istisch geprägte Gesellschaft Israels, war ein religiöses Elternhaus die Regel und nicht die Ausnahme."}]}, "Spr 2,12": {"k": "um dich zu erretten von dem Weg des Übeltäters , von dem Mann, der Verkehrtes redet; Die reife Frömmigkeit und das ethische Unterscheidungsvermögen des Sohnes retten ihn vor dem Einfluss, den Übeltäter mit ihrer falschen, aber attraktiven Einstellung zum Leben über ihn gewinnen wollen. Dieses Versprechen geht wie selbstverständlich davon aus, dass der Sohn in Situationen kommen wird, in denen Verkehrtes ge- sagt wird, sich richtig anhört und als verheißungsvolle Alternative zur Weisheit Gottes (und der elterlichen Erziehung) wahrgenom- men wird. Machen wir uns nichts vor: Worte sind verführerisch und stellen eine Macht dar, die den Einfältigen auf den Weg des Übeltä- ters führt, aber der kluge Mann kennt den Weg „der Guten“ (Sprüche 2,20) und lässt sich nicht in die Irre führen. In einer Welt voller Lü- gen brauchen wir Rettung. Wer das nicht glaubt, hat schon verloren. Glaubst du, dass du in einer Welt voller Lügen lebst, die auf dich einprasseln, wenn du den Fernseher anmachst, eine Il- lustrierte öffnest oder einfach nur einem Gespräch in der U- Bahn lauschst?", "f": [{"n": "107", "t": "O. dem bösen Weg. Wegen der Parallele zum „Mann der Verkehrtes redet“ entscheide ich mich für die Übersetzung „Weg des Bösen (=Übeltäters)“."}, {"n": "108", "t": "Die hebräische Poesie erlaubt den Wechsel von der Einzahl in die Mehrzahl."}, {"n": "109", "t": "Natürlich hat nicht jeder Übeltäter einen religiösen Hintergrund, aber für die monothe- istisch geprägte Gesellschaft Israels, war ein religiöses Elternhaus die Regel und nicht die Ausnahme."}]}, "Spr 3,5": {"k": "Vertraue auf den HERRN mit deinem ganzen Herzen und stütze dich nicht auf deinen Verstand. Auch wenn der Vater in Sprüche 3,1 auf „meine Belehrung“ und „meine Gebote“ verweist, so geht es ihm nicht darum, einen unper- sönlichen Verhaltenskodex weiter zu geben. Die Lehren des Vaters sind nämlich nur soweit brauchbar und gut, wie Gott sich zu ihnen stellt. Unser Vertrauen soll auf den HERRN gerichtet sein, nicht auf die Vorväter und ihr Wissen. Wir können nicht ohne eine Basis des Vertrauens leben. In jedem Leben gibt es Dinge, die wir für wahr halten und auf die wir uns verlassen; Dinge von denen wir anneh- men, dass sie unserem Leben Sicherheit geben. Weil Gott durch den Vater zum Sohn spricht , schafft er mittels der Belehrung eine Grundlage dafür, dass der Sohn gläubig wird (vgl. Sprüche 22,17- 19). Am Wert der Unterweisung kann das Kind etwas über den Wert Gottes ablesen. In dem Maß wie sich Gottes Wort als wahr, wirksam und lebendig erweist (vgl. Hebräer 4,12.13), in dem Maß lernt es Gott als heiligen, weisen und liebenden Gott kennen. Der Weise hat es gelernt, Gott ganz zu vertrauen. Mit seinem ganzen Herzen , d.h. mit seiner ganzen Intellektualität, seinem Wollen und seiner Entscheidungskraft (s. Exkurs: Das Herz) rechnet er mit Gott. Er hängt sich an Gottes Zusagen, lässt sich vor Sünde warnen, wird von den Geboten inspiriert. Und während er auf Gott vertraut, be- wahrt er eine gesunde Skepsis hinsichtlich des eigenen Denkens. Wenn Salomo schreibt, stütze dich nicht auf deinen Verstand , dann rät er nicht zur Gedankenlosigkeit. Es geht ihm nicht um blinden Ka- davergehorsam! Ganz im Gegenteil! Der Gläubige ist ein Denker und sinnt über das Gesetz nach (Psalm 1,2). Nur ist er sich der Grenzen seines Verstandes wohl bewusst. Weit davon entfernt, allwissend zu sein, ist jeder Mensch auf göttliche Offenbarung angewiesen. Es ist erschreckend, zu sehen, was Menschen ohne Gott alles glauben: An- gefangen von den wildesten Verschwörungstheorien, über Ge- schichten mit Außerirdischen bis hin zu der Lüge vom „guten Herz des Menschen“, die schon durch einen flüchtigen Blick in die Tages- zeitung widerlegt werden kann. Der Gott dieser Welt, der Teufel, hat das Denken der Menschen verblendet (2Korinther 4,4). Sie stützen sich auf ihren Verstand, aber begreifen nicht, wie bröselig dieses Fundament ist, wie sehr ihr Denken von Emotionen, Einstellungen, Halbwahrheiten und Ängsten geprägt ist. Deshalb warnt Salomo: Stütze dich nicht auf deinen Verstand. Wir sollen ihn benutzen, um uns Gott zu nähern, aber als Fundament, als Grundlage für unser Le- ben sind Scharfsinn und menschliche Klugheit untauglich. Egal, wie wahr mir ein Gedanke erscheint, er kann eine Lüge sein! Und wenn er Gottes Wort widerspricht, dann ist er es auch! Kannst du dich an einen Gedanken erinnern, von dem du für eine Weile geglaubt hast, dass er wahr ist, und dann gemerkt hast, dass er eine Lüge ist? Wie kam es zu der Veränderung in deiner Bewertung? Weise Menschen sind nicht naiv, sondern prüfen ihre Gedanken und was ihnen erzählt wird (1Thessalonicher 5,21; Philipper 4,8; 2Ko- rinther 10,5).", "f": [{"n": "140", "t": "Und das tut er immer dann, wenn Eltern ihrer pädagogischen Pflicht zur Unterweisung der Kinder nachkommen (vgl. 5Mose 6,7; Epheser 6,4)."}, {"n": "141", "t": "Nicht nur den 10 Geboten, sondern auch allen anderen."}, {"n": "142", "t": "Natürlich nur, wenn ich Gott vertraue!"}, {"n": "143", "t": "Und natürlich auch zum Heiligen Geist, nur dass das nicht in Johannes 14,21 steht."}]}, "Spr 3,6": {"k": "Erkenne ihn auf allen deinen Wegen, und er wird deine Pfade gerade machen. Dieser Vers enthält auf eine etwas verborgene Weise eine wunder- bare Verheißung. Wenn der Vater dem Sohn rät, erkenne den HERRN, dann spricht er von einem intimen, persönlichen Kennen- lernen der Person Gottes (vgl. Sprüche 1,2). Man kann Gott auf allen Wegen erkennen! Das ist eine absolut unglaubliche Aussage! Mein Leben mit seinen Höhen und Tiefen ist ein Mittel, um Gott zu erfas- sen. Es spielt keine Rolle, ob Gott mich im Bild des Hirten aus Psalm 23 von grüner Aue zu grüner Aue führt oder durchs „Tal des Todes- schattens“. Auf allen Wegen kann ich etwas über seinen Charakter lernen . Und genau das ist unser Lebenszweck: Gotteserkenntnis! Die Essenz „ewigen Lebens“ besteht darin, Gott immer besser ken- nen zu lernen (Johannes 17,3). Indem ich auf Gott vertraue, mich mit seinem Wort beschäftige und das Gelernte in meinem Leben an- wende, wächst meine Beziehung zum Vater und zum Sohn (Jo- hannes 14,21). Und wo diese Beziehung wächst, wird Gott meine Pfade gerade machen , denn Leben gelingt nur in der Gemeinschaft mit Gott. Dieser Vers ist ein Gebot: Erkenne ihn ! Gott hat uns unser Leben nicht gegeben, damit wir uns über die guten Tage freuen und an den bösen möglichst früh schlafen gehen. Jeder Moment unseres Lebens ist eine Chance, Gott näher zu kommen. Wir müssen nur eines tun: So leben, wie es ihm gefällt. Christsein ist so einfach. Jesus hat so recht, wenn er sagt: „Meine Last ist leicht“ (Matthäus 11,30b). Was tust du, wenn du fröhlich bist, was, wenn du traurig bist, was, wenn du krank bist? Wenn du wissen willst, was du tun musst, um Gott näher zu kommen: Du findest die Antwort in Ja- kobus 5,13.14.", "f": [{"n": "142", "t": "Natürlich nur, wenn ich Gott vertraue!"}, {"n": "143", "t": "Und natürlich auch zum Heiligen Geist, nur dass das nicht in Johannes 14,21 steht."}]}, "Spr 22,19": {"k": "Damit du dein Vertrauen auf den H <setzt>, habe ich heute dich, ja dich, belehrt. Der Lehrer hat beim Lehren nicht nur den Charakter des Schülers im Blick (vgl. Sprüche 22,18). Viel wichtiger ist ihm dessen leben- dige Glaubensbeziehung zum H . Die Vermittlung von Weisheit bringt den Schüler in Kontakt mit dem Gott, der hinter aller Weis- heit steckt und durch seinen Geist und sein Wort den Lehrer belehrt hat. Weil das, was Gott sagt, stimmt und lebbar ist und sich im Leben des Weisen schon bewährt hat, weiß der Schüler, dass er sein Leben Gott anvertrauen kann. Weisheit ist nicht Selbstzweck. Ein „weises“ Leben, das Gottes Weisheit benutzt, aber den vergisst, von dem die Weisheit kommt, ist eine Narretei. Aber genau an dieser Stelle un- terscheidet sich Salomo von den „Weisen“ des Nahen Ostens. Das Ziel aller geistlichen Erziehung ist eben nicht nur ein vernünftiges Leben in Frieden, Reichtum und Anstand. Das Ziel der Erziehung be- steht darin, das eigene Kind mit dem H zu konfrontieren, der als moralische Instanz über der Erziehung thront, das Leben der Lehrer/Eltern beherrscht und durch das Mittel der Belehrung Ein- zug ins Leben der Schüler/Kinder erhält. Das wesentliche Prinzip dabei ist der Glaube ( Vertrauen auf den H ). Wenn die Lehrer/El- tern Glauben vorleben und erklären, machen sie ihn den Schü- lern/Kindern lieb. Ganz nebenbei wird an dieser Stelle deutlich, dass Glaube sehr praktisch ist. Glaube zeigt sich eben nicht nur in meinem prinzipiellen Ja zu Gottes Vergebung, sondern im Alltag. Ge- lebter Glaube nimmt Gott ganz ernst. Bist du gläubig? Hast du eine Gottesbeziehung, die über ein paar fromme Floskeln und einen Gottesdienstbesuch hinaus geht?", "f": [{"n": "909", "t": "Oder das eigene Kind, wenn man hier nicht den Lehrer, sondern die Eltern als Beleh- rende versteht."}, {"n": "910", "t": "Die 30 Sprüche beginnen mit Sprüche 22,20.21."}]}, "Spr 8,13": {"k": "Die Furcht des HERRN ist: das Böse hassen. Stolz und Hochmut und den Weg des Bösen und falsches Gerede hasse ich. Es gibt kein Leben mit Gott (= Furcht des HERRN ) ohne Hass auf das Böse (vgl. Psalm 97,10). Deshalb kann die Weisheit auch so direkt gegen Stolz und Hochmut , den Weg des Bösen und falsches Gerede Stellung beziehen. Hier werden drei Brandherde des Widerstands gegen Gott sichtbar: Eine falsche Einstellung zur eigenen Kleinheit vor dem Schöpfer, die Lust auf einen sündigen Lebensstil und auf Worte, die das eigene Fehlverhalten beschönigen.", "f": [{"n": "360", "t": "W. Erkenntnis der Besonnenheit (Der Begriff „Erkenntnis“ kann auch negativ verwen- det werden im Sinn von „Intrige“. Vgl. Sprüche 12,2). S. dazu Exkurs: Die Furcht des HERRN"}, {"n": "362", "t": "W. Mund der Verkehrtheit"}, {"n": "363", "t": "Die Masoreten überliefern den Text sowohl als „Richter der Erde“ wie auch als „Richter der Gerechtigkeit“. Beide Überlieferungstraditionen finden Unterstützung in alten Texten. Da schon in Sprüche 15b von „gerechten Entscheidungen“ die Rede ist, entscheide ich mich gegen Waltke (S. 389) für die oben übersetzte Form."}]}, "Spr 10,27": {"k": "Die Furcht des HERRN mehrt die Tage, aber die Jahre der Gesetzlosen werden verkürzt. Dieser Vers kann relativ und absolut gelesen werden. Relativ gilt, dass Gottesfurcht zu einem langen Leben führt (vgl. Sprüche 3,2.16; 4,10), weil sie dem Menschen hilft, einen aus Dummheit selbstver- schuldeten vorzeitigen Tod zu vermeiden. Leider sind wir nicht al- lein für den praktischen Ausgang unseres Lebens verantwortlich und so sterben auch Gläubige durch Querschläger einer Schießerei oder bei einem Autounfall. Absolut gilt der Vers, weil nur der Gläu- bige ewig lebt und die Sprüche nicht sauber zwischen einem dies- seitigen und einem jenseitigen Aspekt des Lebens trennen (Siehe der Exkurs „Das Leben“). Die Zukunft des Gesetzlosen ist ein kurzes Leben, er „ist […] nicht mehr“ (Sprüche 10,25) und wird „das Land nicht bewohnen“ (Sprü- che 10,30). Die Perspektive auf sein Leben ist eine irdische, wobei die Sprüche nicht zwischen der alten und der neuen Erde unter- scheiden. Diese Verse sagen m.E. nicht aus, dass der Gottlose ver- nichtet wird, sondern sie beschreiben den Zustand des Ungerechten aus dem Blickwinkel des Gerechten. Der eine geht in die Weite des Lebens und der andere verliert alles, was er zu haben meint.", "f": [{"n": "435", "t": "Siehe Exkurs „Die Furcht des HERRN“."}, {"n": "436", "t": "Freude in der Bibel ist aktiv. Es handelt sich dabei nicht um ein stilles, nach innen ge- wandtes Freuen, sondern um Frohlocken (Jeremia 50,11), es wird in die Hände geklatscht (Jesaja 55,12), Musik gemacht und getanzt (1Samuel 18,6)."}]}, "Spr 14,2": {"k": "Wer den HERRN fürchtet, wandelt in seiner Geradheit; wer aber auf seinen krummen Wegen <wandelt>, verach- tet ihn. Zwei Lebensstile werden miteinander verglichen, indem Salomo für das Leben das Bild eines Weges verwendet. Der Gottesfürchtige geht auf einem geraden Weg, der Gottlose ist auf krummen Wegen unterwegs. Zwei Dinge gehören unauflöslich zusammen: Gottesfurcht und Ge- radheit . Wer den HERRN fürchtet , der hat ein inneres Bedürfnis ( sei- ner ), Gott zu gefallen und seine Gebote zu halten. Meine Gottesbe- ziehung schlägt sich unmittelbar in meinen Einstellungen, meinem Charakter und meinen Lebensentscheidungen nieder. Das Leben des Gottlosen ist von krummen Wegen geprägt. Er hat nicht ein Ziel, dem er folgt, sondern er wird von den unterschied- lichsten Impulsen mal hierhin mal dorthin gelenkt. Sein grundsätz- licher Mangel an Gottesfurcht macht ihn zu einem Spielball aller möglichen Einflüsse (Werbung, Lust, Umstände, Ängste usw.). Mo- ral spielt für ihn eine bestenfalls untergeordnete Rolle . Durch sein Verhalten verachtet er den HERRN. An welchen „geraden“ Entscheidungen kann deine Umwelt se- hen, dass du Gott fürchtest?", "f": [{"n": "586", "t": "Gemeint ist die Geradheit des Wandelnden nicht die Geradheit Gottes."}, {"n": "587", "t": "O. verkehrt, verdreht, pervers, böse"}, {"n": "588", "t": "Hier wie an vielen anderen Stellen in den Sprüchen werden die Gottlosen immer super negativ dargestellt. Woher kommt es, dass mir auch liebe Gottlose bekannt sind? Ich denke die „lieben Gottlosen“ sind ein Produkt von 2000 Jahren christlicher Kulturgeschichte. Das Böse wird durch gute Gesetze eingedämmt, christliches Denken im Hinblick auf Schwache ist Allgemeingut geworden und Erfahrungen mit exzessivem Bösen im 20. Jahrhundert ha- ben das Denken auch geprägt. Heute kann in begrenztem Maß, durch Gesellschaft und Er- ziehung verordnet auch der Ungläubige moralisch „gerade“ leben, ohne den HERRN des- halb zu fürchten. Die „krummen Wege“ sind in vielen Leben nicht mehr so deutlich zu se- hen. Und doch glaube ich, dass es sie gibt. Eine humanistische Einstellung ist noch keine Weisheit. Vor allem dann nicht, wenn Sünde gesellschaftlich toleriert wird und sich Weis- heit im Widerstand, im „nein“ artikuliert."}, {"n": "589", "t": "In diesem Vers gibt es ein Verständnisproblem im Hinblick auf das Wort Spross . Das Wort kommt nur noch in Jesaja 11,1 als „junger Trieb“ oder „Schössling“ vor, aber diese Übersetzung ergibt nur einen ungenauen Parallelismus mit bewahren . Deshalb übersetzen andere mit „Rute“. Ich folge dieser Übersetzung nicht."}]}, "Spr 15,16": {"k": "Besser wenig mit der Furcht des Herrn als ein großes Ver- mögen und Ärger damit. Der Gläubige ist nicht immer der Reiche. Es kann sein, dass die Furcht des Herrn mit einem kleinen Einkommen einher geht. Und doch ist es besser , Gott zu kennen, ihm zu gehorchen und ein anstän- diges Leben in Einfachheit zu führen, als ein großes Vermögen anzu- häufen und sich letztlich nur Ärger ans Land zu ziehen. Wohlstand zieht oft Streit, Zerstörung und kaputte Familien nach sich. Da ist es viel besser weniger zu besitzen und im Segen Gottes zu leben. Reichtum ist so verführerisch! Bist du sicher, dass du den Göt- zen „Habsucht“ ganz aus deinem Leben verbannt hast?", "f": []}, "Spr 16,6": {"k": "Durch Güte und Wahrheit wird Sünde gesühnt und durch die Furcht des HERRN weicht man vom Bösen. Dieser Vers darf nicht falsch verstanden werden, so als ob Taten Sünde sühnen könnten. Das können sie nicht! Aber das Begriffspaar Güte und Wahrheit steht für den Charakter eines Gerechten, der sich in Aufrichtigkeit und Freundlichkeit der Nöte der Armen an- nimmt. Nur der solcherart Gerechte erfährt durch das System der Opfer Sühnung seiner Sünden (3Mose 1,4). Wenn die Haltung nicht stimmt, dann macht das Opfer keinen Sinn (vgl. 1Samuel 15,22). Ein rebellisches und liebloses Herz erfährt keine Vergebung (vgl. 4Mose 15,30). Im Neuen Testament formuliert Johannes ganz explizit: „Wenn wir aber im Licht wandeln, wie er im Licht ist, haben wir Ge- meinschaft miteinander und das Blut Jesu, seines Sohnes, reinigt uns von jeder Sünde.“ (1Johannes 1,7) Auch hier ist die Reinigung von den Sünden direkt an den „Wandel im Licht“ gekoppelt. Nur wer Gottes liebevollen Charakter imitiert, der schafft die Voraussetzung dafür, dass er von seiner Sünde gereinigt werden kann . Der Begriff Furcht des HERRN beschreibt hier den Standard, den Gott gibt, um das Gottlose und Schlechte zu erkennen. Wer Gottes Wort kennt und anwendet, der weicht vom Bösen . Das Leben des Gerechten ist von einem Lebensstil geprägt, der Got- tes Liebe und Heiligkeit widerspiegelt. Der Gerechte ist nicht perfekt, sonst bräuchte er keine Sühnung mehr, aber er missbraucht auch nicht die Vergebung, um einen laxen Umgang mit Sünde zu rechtfertigen. Gelebte Liebe und Gehorsam bilden die Grundlage für Vergebung und Heiligung. Wie würdest du auf die Frage antworten: Bist du heiliger oder lieber? Wovon hast du mehr? Von Gehorsam oder von Güte? Wie kannst du das, den Bereich, in dem du besser bist, noch stärken?", "f": [{"n": "662", "t": "O. Treue, Festigkeit"}, {"n": "663", "t": "S. Exkurs: Die Furcht des HERRN"}, {"n": "664", "t": "S. die Ausführungen zu diesem Begriffspaar in den Anmerkungen zu Sprüche 3,3."}, {"n": "665", "t": "Das Wie der Reinigung findet sich in 1Johannes 1,9: durch Bekenntnis."}, {"n": "666", "t": "W. Mann"}]}, "Spr 23,17": {"k": "<Spruch #15> Dein Herz beneide nicht die Sünder, sondern eifere allezeit um die Furcht des H . Ganz gewiss gibt es ein Ende, und deine Hoffnung wird nicht abgeschnitten werden. Als Mensch muss ich mich entscheiden, wonach ich mich ausstrecke. Führe ich das Leben der Sünder mit seinen irdischen Erfolgen und Vergnügungen oder eifere ich danach, Gott zu gefallen und für ihn zu leben? Als Christ kann es schnell dahin kommen, dass ich mich als Verlierer fühle und mir das Leben wünsche, das meine ungläubi- gen Nachbarn führen. Neidisch blicke ich auf Menschen, die es scheinbar „leichter“ haben, weil sie Gottes Gebote nicht kennen und nicht in einer Gemeinde eingebunden sind. Aber Vorsicht! Mein Neid ist nicht gerechtfertigt! Wer allezeit eine tiefe Glaubensbezie- hung mit Gott ( Furcht des H ) nachjagt, der hat einen unschätz- baren Vorteil im Leben. Seine (ewige) Hoffnung wird sich als wahr erweisen. Die Hoffnung der Gottesfürchtigen auf ein ewiges, erfüll- tes Leben bei Gott wird sich nicht als Trug herausstellen. Das Ende kommt gewiss. Gott hält Gericht, bestraft die Sünder und belohnt die Gerechten. Mag es auch sein, dass die Guten in diesem Leben öfter als es ihnen lieb ist, den Kürzeren ziehen, auf lange Sicht gehört ihnen die einzige Zukunft, für die es sich zu leben lohnt. Beneidest du manchmal Menschen, die mehr „Freiheiten“ ha- ben? Wie eiferst du um die Furcht des H ? Mit welcher Hoff- nung lebst du?", "f": [{"n": "931", "t": "Siehe Exkurs „Die Furcht des HERRN“"}, {"n": "932", "t": "Mit Schlummer ist der leichte Schlaf, das Dösen des Angetrunkenen und Satten gemeint."}]}, "Spr 15,8": {"k": "Das Opfer der Gesetzlosen ist dem HERRN ein Gräuel, aber das Gebet der Aufrichtigen <findet> sein Wohlgefallen. Wenn mein Herz Gott nicht gehört, dann will er auch kein anderes Opfer von mir. Und er will es nicht nur nicht, sondern er empfindet Abscheu, es ist ihm ein Gräuel . Das Opfer der Gesetzlosen will Gott manipulieren (Magie) oder täuschen, aber was für ein „Gott“ muss das sein, der darauf hereinfällt! Dagegen können die Aufrichtigen beten und Gott hat Wohlgefallen daran. Es geht ihnen um den HERRN und nicht um ein Ritual. Sie sind nicht wie Kain, der ein Opfer brachte, aber sich nichts von Gott sa- gen ließ (1Mose 4,3-7). Wenn du Gott ein „Opfer“ bringst, was ist deine Haltung dabei?", "f": [{"n": "643", "t": "O.: nicht so, aber ich entscheide mich eher für „nicht richtig“ oder eben „nicht in Ord- nung“, weil so der antithetische Parallelismus zur ersten Hälfte des Spruches besser zum Ausdruck gebracht wird."}]}, "Spr 15,29": {"k": "Der HERR ist fern von den Gesetzlosen, aber er hört das Gebet der Gerechten. Wenn Gott fern ist, dann bedeutet das nicht, dass er in seiner Allge- genwart abwesend wäre. Er ist fern in einem theologischen Sinn: Seine Gnade ist den Gesetzlosen nicht zugänglich, weil er nicht auf ihr Gebet hört (Jesaja 1,15). Gott hört Gebet , aber der Beter muss Gott fürchten und tun, was er sagt. Die Gerechten dürfen sicher sein, dass Gott ihr Flehen hört (1Petrus 3,12). Kommen in deinem Leben Gerechtigkeit und Gebetseifer zu- sammen?", "f": [{"n": "652", "t": "W. macht die Knochen fett. Die „Knochen“ stehen hier für das ganze Wesen aus Physis und Psyche. Das Bild beschreibt Stärke, Stabilität, Überfluss, Gesundheit und volle Zufrie- denheit."}]}, "Spr 16,2": {"k": "Alle Wege einer Person sind rein in ihren Augen, aber der HERR beurteilt die Motive . Jeder Mensch führt das Leben, von dem er denkt, dass es richtig ist. Seine Entscheidungen ( Wege ) sind rein , d.h. in seinen Augen ethisch vertretbar. Kaum jemand wird etwas tun, wovon er weiß, dass es falsch ist und ihm schaden wird. Selbst der Süchtige ist im Moment der Sucht davon überzeugt, keinen Fehler zu begehen! Gott lässt sich jedoch von unserer Selbsteinschätzung nicht beein- drucken. Es zählt nicht, was wir denken, sondern was der HERR denkt. Und der sieht nicht nur unsere Entscheidungen, er beurteilt die Motive. Für ihn zählt nicht nur, was wir tun, sondern auch das Warum, denn man kann das Richtige tun und doch damit das Fal- sche bezwecken. Bete doch darum, dass Gott dir zeigt, wo du aus einer falschen Haltung heraus das Richtige tust! Oder musst du gar nicht be- ten, weil du es schon weißt?", "f": [{"n": "658", "t": "W. Mann"}, {"n": "659", "t": "W. wägt die Geister; s.a. „Exkurs: Der Geist“ zu Sprüche 15,13"}, {"n": "660", "t": "W. rollen (auf)"}]}, "Spr 16,3": {"k": "Befiel dem HERRN deine Werke und deine Gedanken werden zustande kommen. Der Gläubige wird seine Werke Gott anbefehlen. Er wird sie im Ge- bet vorbereiten und während ihrer Durchführung den HERRN um Gelingen bitten. Der Gerechte will, dass nur zustande kommt, was Gott gefällt. Und indem er als Beter eng mit dem HERRN lebt ver- schwindet die Grenze zwischen seinen Gedanken und denen Gottes. Es sind tatsächlich seine Werke und Gedanken , die Realität werden. Er hat sie sich gewünscht, gebetet und dafür gearbeitet, aber sie kommen eben auch zustande , weil sein Wille mit dem Willen Gottes Hand in Hand geht. Er tut, „was er den Vater tun sieht“ (Johannes 5,19) und will wie Jesus nur Gottes Willen tun (Johannes 5,30; 6,38). Hast du schon die gute Gewohnheit gelernt, alle Aufgaben eines Tages mit Gott im Gebet zu besprechen, bevor du anfängst, sie zu erledigen?", "f": [{"n": "660", "t": "W. rollen (auf)"}, {"n": "661", "t": "W. Hand in Hand. Der Ausdruck beschreibt, dass etwas ganz sicher ist (vgl. Sprüche 6,1). Vgl. Sprüche 11,21."}]}, "Spr 28,9": {"k": "Wer sein Ohr abwendet vom Hören auf das Gesetz: selbst sein Gebet ist ein Gräuel. Wird ein Mensch taub für die Gesetze Gottes, wird Gott taub für seine Gebete. Wer die Gebote Gottes kennt, sich dann aber abwen- det und nicht mehr auf das hören will, was Gott sagt, der muss schlimme Konsequenzen tragen. Nicht nur sein Verhalten, sondern selbst sein Gebet wird für Gott zum Gräuel. Gott will weder mit sei- nem Tun, noch mit seinem Reden etwas zu schaffen haben. Hast du dich ganz oder bei bestimmten Geboten vom Hören auf das Gesetz abgewendet und entschieden, bewusst ungehorsam zu leben?", "f": [{"n": "1044", "t": "Siehe auch die Anmerkungen zu Sprüche 2,7."}]}, "Spr 30,5": {"k": "Wer ist je in den Himmel hinaufgestiegen und <wieder> zu- rückgekommen ? Wer hat den Wind in seine Fäuste gesammelt? Wer hat die Wasser in einen Mantel eingewickelt? Wer hat aufgerichtet alle Enden der Erde? Was ist sein Name, und was der Name seines Sohnes, wenn du es weißt? Alle Rede Gottes ist geläutert; ein Schild ist er denen, die auf ihn trauen. Tue nichts zu seinen Worten hinzu, damit er dich nicht überführe und du als Lügner erfunden werdest. Jetzt spricht Agur zu Ithniel und stellt ihm erst einmal Fragen, die zeigen sollen, wie groß der Abstand zwischen dem Geschöpf und dem Schöpfer ist. Kein Mensch kann die Dinge tun, die Agur erfragt. So wenig wie der Mensch diese Dinge tun kann, so wenig ist er in der Lage, göttliche Weisheit zu erlangen. Nur Gott kennt den Him- mel und kann darüber berichten (vgl. Johannes 3,13). Ihm ist alles möglich: Er allein kann in seinen Fäusten sammeln, was kein Mensch festhalten kann, den Wind. Er hat die Naturgewalten in sei- ner Gewalt ( Wind und Wasser ) und er erweist seine Weisheit darin, dass er die Enden der Erde aufgerichtet hat (vgl. ergänzend auch Hiob 28,24). Sein Wissen und sein Tun sind grenzenlos. Der Mensch kann Gott nur erkennen, wenn er selbst sich ihm offen- bart. Wer, wie Mose, seinen Namen wissen will, der muss Gott selbst fragen und auf eine Antwort hoffen. Wer wissen will, durch welchen Sohn er sich offenbart, der muss sich mit Gottes Offenbarungsge- schichte auseinandersetzen und entdecken, dass er Israel zum „Sohn“ erwählt hat (2Mose 4,22; Jeremia 4,19; 31,20; Hosea 11,1; s. a. das Zitat aus Baruch 3,37, in der Fußnote). Obwohl Gottes Weisheit für den Menschen aus sich heraus unzu- gänglich ist, schafft Gott einen Weg. Er offenbart sich nicht nur all- gemein in der Schöpfung, der Geschichte oder im Gewissen, sondern speziell in seinem Wort. Das Problem des Nichtwissens löst sich im Moment der Beziehung auf. Weisheit findet nicht der intellektuell Starke, sondern der Demütige, der sich ehrlich um eine Beziehung mit dem Schöpfer bemüht. Wer nach Gottes Namen fragt, also Gott als Person erkennen will, der findet auch in der Begegnung mit Gott dessen Weisheit. Gott allein besitzt Weisheit und offenbart sie durch sein Wort denen, die danach suchen. Erst wenn wir uns vor Gott beugen und Gott als den anerkennen, der alles vermag und für den kein Plan unausführbar ist (Hiob 42,2), öffnen wir die Tür zu seiner Weisheit, weil wir – wie Hiob – seine Stimme hören. Gott redet und Menschen schreiben auf, was Gott zu ihnen gesagt hat. Die Suche nach Weisheit beginnt also damit, dass ich eines ak- zeptiere: Es gibt Menschen, die mir Gottes Reden aufgeschrieben haben (2.Timotheus 3,16; vgl. Baruch 4,1 ). Sprüche 30,5.6 zitiert für die Qualität des Gesagten zwei Autoritäten: David und Mose. (David) Psalm 12,7: Die Worte des HERRN sind reine Worte - Silber, am Eingang zur Erde geläutert, siebenmal gereinigt. (David) Psalm 18,31: Gott - sein Weg ist untadelig; des HERRN Wort ist lauter; ein Schild ist er allen, die sich bei ihm bergen. (Mose) 5Mose 4,2 : Ihr sollt nichts hinzufügen zu dem Wort, das ich euch gebiete, und sollt nichts davon wegnehmen, damit ihr die Ge- bote des HERRN, eures Gottes, haltet, die ich euch gebiete! Die Beschäftigung mit Gottes Wort macht weise, wenn wir Gott ver- trauen und nichts zu seinen Worten hinzufügen. Ansonsten stehen wir schutzlos in dieser Welt und Gott wird unser Gedanken als Lü- gen entlarven. Wie denkst du über die Bibel? Ist sie für dich eine ganz kost- bare Sammlung von Aussprüchen Gottes, die dich weise ma- chen wollen? Mit wie viel Erwartung und Ehrfurcht liest du und studierst du die Bibel?", "f": [{"n": "1090", "t": "Das apokryphe Buch Baruch 3,29.31.36.37: „Wer stieg zum Himmel hinauf und holte sie (die Weisheit) und brachte sie aus den Wolken herab... Nur er, der alles weiß, - er kennt sie, er hat sie erkundet mit seiner Einsicht, - er der die Erde gegründet für ewig... Das ist unser Gott – ein anderer gilt nicht neben ihm – er hat erkundet jeglichen Weg zur Weisheit und hat sie verliehen Jakob, seinem Knecht, und Israel, seinem Liebling!“"}, {"n": "1091", "t": "Baruch 4,1: Sie (die Weisheit) ist das Buch der Gebote Gottes, das Gesetz, das in Ewigkeit besteht: Alle, die an ihr halten, gewinnen das Leben, die sie verlassen, verfallen dem Tode!"}, {"n": "1092", "t": "Siehe auch: 5Mose 5,22; 13,1; vgl. Offenbarung 22,18"}, {"n": "1093", "t": "Der Begriff umfasst das Bedeutungsspektrum Nichtigkeit, Nichtigkeit im Reden שָׁ וְא (= Lüge) und Falschheit. Falschheit und Lügenwort sind m.E. ein Hendiadyoin für Lü- gen, die mit böser Absicht erzählt werden, also üble Nachrede bzw. Verleumdung, Dif- famierung, Denunziation..."}, {"n": "1094", "t": "Andere (bekanntere und besser ausgebildete) Kommentatoren sehen hier eher das Re- den Agurs als das Reden über Agur. Dann würde er darum bitten, die Wahrheit zu sagen. Irgendwie leuchtet mir das aber nicht ein. Ich muss Gott nicht explizit darum bitten, dass ich nicht lüge, ich sollte es einfach nicht tun. Ich kann ihn aber darum bitten, dass er mich vor den gemeinen Lügen anderer bewahrt und dass ich meinen Lebensabend verbringen darf, ohne im Zentrum einer medialen Schlammschlacht zu stehen."}, {"n": "1095", "t": "Oder: mir zusteht (weil ich es zum Überleben brauche)"}]}, "Spr 3,11": {"k": "Mein Sohn verwirf nicht die Züchtigung des HERRN und verabscheue seine Zurechtweisung nicht, Wie soll sich der Sohn verhalten, wenn er ungehorsam ist und Got- tes Züchtigung erfährt? Er soll sie annehmen. Bei des HERRN Züchtigung kann es sich um Krankheit handeln (1Korinther 11,30), Misslingen (Jeremia 5,25; Haggai 1,6-11) oder um eine andere Form von Leid , die den Betroffenen dazu bringt, zu Gott umzukehren. Wer Gottes zurechtbringendes Eingreifen in das eigene Leben ver- abscheut und verwirft, der verpasst auch Gottes Segen. Das ist das Drama derer, die vor Gott davon laufen. Das Glück, das sie suchen, finden sie nicht. Hiob bringt es gut auf den Punkt: „Siehe, glücklich der Mensch, den Gott straft! So verwirf denn nicht die Züchtigung des Allmächtigen. Denn er bereitet Schmerz und verbindet, er zer- schlägt und seine Hände heilen“ (Hiob 5,17.18). Heilung folgt auf den Schmerz, wenn der Gezüchtigte Gottes Strafe akzeptiert und Buße tut (vgl. 2Korinther 7,10). Ein Vater, der sein Kind in Gottes Sinn erzieht, kann davon ausgehen, dass Gott an seine Seite tritt und die Wahrheit seines Wortes durch Zurechtweisung unterstreicht. Und dieses Prinzip gilt über die Zeit der Kindheit hinaus. Fragst du dich bei Krankheit, Misslingen und Leid, ob es eine Strafe Gottes sein könnte, die dich auf den „Pfad der Tugend“ zurückbringen will?", "f": [{"n": "151", "t": "Der ungerechte Mammon ist wahrscheinlich deshalb „ungerecht“, weil er ungerecht verteilt ist."}, {"n": "152", "t": "Der Begriff „Mammon“ leitet sich von dem aramäischen Begriff für „Reichtum“ ab. Er kam als Lehnwort über das Hebräische, Griechische und Lateinische ins Deutsche."}, {"n": "153", "t": "Der Begriff „Züchtigung“ (s.a. Anmerkungen zu Sprüche 1,2) steht für die verbale (Er- mahnung: Psalm 50,17; Sprüche 1,8; Unterweisung: Sprüche 1,2; 6,23) und körperliche Korrektur (Sprüche 22,15; 23,13) einer Person oder eines Volkes."}, {"n": "154", "t": "S.a. Anmerkungen zu Sprüche 1,23."}, {"n": "155", "t": "Aber Vorsicht: Leid an sich ist kein Beweis für Sünde! Hiobs Freunde glauben das und werden von Gott zurechtgewiesen (Hiob 42,8). Auch der Blindgeborene in Johannes 9 wurde nicht für seine Sünde (oder die seiner Eltern) bestraft (Johannes 9,1-3)."}, {"n": "156", "t": "Gott züchtigt nicht aus einer Laune heraus, nicht weil er ärgerlich ist oder sich abrea- gieren muss. Seine Zuchtmaßnahmen sind angemessen, zielhaft und haben immer das Wohl des (geistlichen) Kindes im Blick."}]}, "Spr 3,12": {"k": "denn wen der Herr liebt, den züchtigt er, und zwar wie ein Vater den Sohn, an dem er Wohlgefallen hat. Warum soll der Sohn Gottes Züchtigung annehmen? Weil der HERR den züchtigt , den er liebt . Gottes „harte Gnade“ ist ein Beweis seines Wohlwollens, nicht seines Zorns . Würde uns Gott nicht lie- ben, wie ein Vater den Sohn , dann müsste er uns nicht züchtigen. Er könnte einfach darauf warten, dass wir im Gericht den gerechten Lohn für unser Tun empfangen (Prediger 12,13.14; Römer 2,5.6.16). Asaf erkennt diese Zusammenhänge in Psalm 73. Zuerst ist er frus- triert, beneidet die Sünder und fragt sich, warum es ihnen so gut geht, dann aber geht er ins Heiligtum, denkt über das Ende der Gott- losen nach und erkennt in welcher furchtbaren Täuschung sie leben (Psalm 73,17.18). Wir sind als Gläubige in Gottes Augen wie ein Kind, an dem die Eltern Wohlgefallen haben und sich besonders viel Zeit für die Erziehung nehmen. Und deshalb ist Gottes züchti- gendes Eingreifen in unser Leben auch ein Grund zur Freude! Wie furchtbar wäre es, wenn wir Gott egal wären, er uns ins Unglück lau- fen ließe und einfach zuschaute! Kannst du dich an göttliche „Stoppschilder“ in deinem Leben erinnern?", "f": [{"n": "155", "t": "Aber Vorsicht: Leid an sich ist kein Beweis für Sünde! Hiobs Freunde glauben das und werden von Gott zurechtgewiesen (Hiob 42,8). Auch der Blindgeborene in Johannes 9 wurde nicht für seine Sünde (oder die seiner Eltern) bestraft (Johannes 9,1-3)."}, {"n": "156", "t": "Gott züchtigt nicht aus einer Laune heraus, nicht weil er ärgerlich ist oder sich abrea- gieren muss. Seine Zuchtmaßnahmen sind angemessen, zielhaft und haben immer das Wohl des (geistlichen) Kindes im Blick."}, {"n": "157", "t": "Selbstverständlich ist Gott auf den Sünder zornig (Psalm 5,11), aber die Tatsache, dass Gott die Züchtigung einsetzt, um den Sünder zurechtzubringen, ist ein Ausdruck seiner Liebe. Gottes Heiligkeit verlangt nach Strafe und Gottes Liebe benutzt die Strafe als Mittel der Korrektur."}, {"n": "158", "t": "Es geht mir dabei nicht um Parteilichkeit. Eltern, die ein Kind bevorzugen, sind partei- isch und begehen einen schlimmen Fehler! Und doch gibt es immer wieder Kinder, die den Eltern durch ihr aktuelles Verhalten besonders gefallen und denen sie emotional im Mo- ment mehr zugetan sind."}, {"n": "159", "t": "S. a. die Definition von Weisheit in den Anmerkungen zu Sprüche 1,2"}]}, "Spr 4,23": {"k": "Behüte dein Herz mehr als alles, was zu bewahren ist; denn ihm entspringt die Quelle des Lebens. Wer sein Herz „behütet“, der bewacht es, wie man einen Gefangen bewacht, und „bewahrt“ es, wie die Wachen einer Stadt die Einwoh- ner vor Überfällen bewahren. Mein Herz ist das wichtigste „Organ“ meines Körpers! Mehr als alles andere gilt es, auf das Zentrum mei- nes Denkens und meiner Moral (s. Exkurs: Das Herz) zu achten. Was sich in meinen Gedanken (und meinen Emotionen) abspielt, wird zur Tat, dann zur Gewohnheit und schließlich zum Schicksal; des- halb muss ich mein Herz davor bewahren , Falsches zu denken (vgl. Philipper 4,8) sowie Böses (Sprüche 6,14) und „heillose Anschläge“ zu schmieden (Sprüche 6,18). Eine Lüge, die mein Denken, Fühlen und Träumen gefangen nimmt, nimmt mich gefangen. Von Anfang an, unterstreichen „Die Sprüche“, dass ich mein Herz dem „Ver- ständnis“ (Sprüche 2,2), den „Geboten“ (Sprüche 3,1), der „Güte und Wahrheit“ (Sprüche 3,3) und dem „Gottvertrauen“ (Sprüche 3,5) zu- wenden soll. Diese Dinge gilt es „im Innern“ des Herzens (Sprüche 4,21) zu bewahren, denn im Herzen entspringt die Quelle des Lebens , d.h. das Herz ist der Ursprung aller (körperlichen) Aktivitäten, seien es Phantasiegebilde, Worte oder Taten. Wörtlich steht im Text nicht „Quelle“ (Singular), sondern „Ausflüsse“ (s. FN, Plural), was darauf hinweist, dass das Herz auf die unterschiedlichsten Aspekte des Le- bens Auswirkungen hat. Das ganze Leben wird vom Herzen dirigiert und in die Richtung geleitet, in die das Herz will . Wann hast du in der letzten Woche dein Herz nicht behütet? Welche Gedanken hast du zugelassen, die falsch waren?", "f": [{"n": "222", "t": "W. von ihm aus sind die Ausflüsse"}, {"n": "223", "t": "Deshalb ist es so dramatisch, wenn ich nicht merke, wie sich mein Herz mit bösen Ge- danken beschäftigt, die eigentlich falsch sind, aber die ich nicht als Lüge erkenne. Ein Ge- schäftsmann, der nicht mehr erkennt, dass sich sein Denken um Habsucht und Erfolg dreht,"}, {"n": "224", "t": "O. halte von dir fern"}]}, "Spr 4,24": {"k": "Tue von dir die Verkehrtheit des Mundes, und die Ver- drehtheit der Lippen entferne von dir! Wer sein Herz bewahrt, muss es auch mit seinen Worten tun. Der Psalmist kann beten: „Bestelle, HERR, eine Wache für meinen Mund! Wache über die Tür meiner Lippen!“ (Psalm 141,3) Der Mensch ist das, was er redet (Matthäus 12,32-37; Lukas 6,45; Römer 10,10). Und unsere Art zu reden, prägt unseren Charakter, selbst dann, wenn es anfänglich „nicht so gemeint“ war - am Ende bilden sich da- raus Denk- und Redegewohnheiten. Deshalb ermahnt der Apostel Paulus die Epheser mit den Worten: „Unanständigkeit und albernes Geschwätz und Witzelei, die sich nicht geziemen“ […] „sollen nicht einmal unter euch genannt werden.“ (Epheser 5,4.3) Es gibt eine Form von Reden, die passt nicht zu Christen, weil sie die verbale Vorstufe von Unzucht, Unreinheit und Habsucht darstellt! Die Verkehrtheit des Mundes und die Verdrehtheit der Lippen bezieht sich auf Sprache, die Sachverhalte verdreht darstellt und es mit der Wahrheit nicht allzu genau nimmt. Die Aufforderung tue von dir und entferne von dir bedeutet, dass der Sohn nicht lügen, nicht betrügen, nicht übertreiben , nicht falsch darstellen, mit Worten nicht ver- letzen oder grausam sein soll. Welche Form von „Verkehrtheit des Mundes“ fand sich in den letzten Tagen am häufigsten in deinem Leben?", "f": [{"n": "224", "t": "O. halte von dir fern"}, {"n": "225", "t": "Es gibt das rhetorische Stilmittel der Übertreibung, das hier nicht gemeint ist."}, {"n": "226", "t": "O. „Wimpern“, aber die können nicht „blicken“ und sind im Deutschen kein schöner Pa- rallelismus zu „Augen“."}]}, "Spr 4,25": {"k": "Lass deine Augen geradeaus blicken und deine Pupillen stracks vor dich hin blicken. Nicht nur der Mund wird bewahrt, sondern auch die Augen stehen in der Gefahr, auf falsche Weise nach rechts und links statt gerade- aus zu blicken . Sie müssen den geraden Weg im Blick behalten, dür- fen sich nicht ablenken lassen oder mit dem „Weg der Gesetzlosen“ (Sprüche 4,19) liebäugeln. Vor dem Sohn liegt der Weg der Weisheit und ihn zu erkennen und im Auge zu behalten, darauf kommt es an. Augen werden nicht „satt“ und suchen immer neue Stimuli (Sprüche 27,20). Der Sohn muss dafür sorgen, dass sie sich nicht die falschen „Anregungen“ suchen. Die Augen eines Toren „sind am Ende der Erde“ (Sprüche 17,24), sie schauen überall hin, aber nicht auf den Weg stracks vor ihnen. Die „Lust der Augen“ (1Johannes 2,15) ist eine gefährliche Realität, die uns dazu bringen kann, die Welt mehr zu lieben als Gott. Und deshalb ist es so wichtig, dass unsere Augen fokussiert bleiben und sich nicht alles anschauen, was es zu sehen gibt. Jesaja beschreibt die Person, die Gott nahe sein kann, mit den Worten: „und seine Augen verschließt, um Böses nicht zu sehen.“ (Jesaja 33,15) Wie wir für die Worte verantwortlich sind, die aus unserem Mund herauskommen, so auch für die Dinge, die durch un- sere Augen in uns hineinkommen (vgl. Matthäus 6,22.23). Wann hast du das letzte Mal bewusst weggeschaut - freu dich jetzt an deiner Geradlinigkeit!", "f": [{"n": "225", "t": "Es gibt das rhetorische Stilmittel der Übertreibung, das hier nicht gemeint ist."}, {"n": "226", "t": "O. „Wimpern“, aber die können nicht „blicken“ und sind im Deutschen kein schöner Pa- rallelismus zu „Augen“."}, {"n": "227", "t": "O. ziehe deinen Fuß zurück"}]}, "Spr 4,26": {"k": "Gib acht auf die Bahn deines Fußes, und alle deine Wege seien gerade; biege nicht ab zur Rechten noch zur Linken, wende deinen Fuß weg vom Bösen. Weil die Augen geradeaus blicken, kann der Sohn auf die Bahn seines Fußes achtgeben. In Sprüche 1,15.16 warnt der Vater den Sohn vor dem falschen Pfad der Bösen. Die Betonung des Fußes zeigt, dass je- der Schritt wichtig ist. Damit ein Leben gerade verläuft, muss jeder einzelne Schritt (o. die meisten davon) passen. Manchmal genügt eine falsche Entscheidung, um ein Leben zu ruinieren. Das klingt vielleicht nicht fair, aber es entspricht der Realität. In Psalm 119,5 wünscht sich der Psalmist: „O dass meine Wege gerichtet wären, um deine Satzungen zu beobachten!“ Mit alle deine Wege sind die unter- schiedlichen Facetten meines Verhaltens gemeint. Im Leben soll es keine noch so kleine Abweichung zur Rechten oder zur Linken ge- ben. Im Bild des geraden Lebenswegs, der der väterlichen Unterwei- sung entspricht, soll der Sohn permanent darauf achten, ob sein Fuß in die gute Richtung geht, vom Bösen muss er sich mit allen Mitteln fernhalten. Mein Sohn, merke auf meine Weisheit, neige dein Ohr zu meiner Einsicht, um Besonnenheit zu beobachten, und damit deine Lip- pen Erkenntnis bewahren. Denn Honig träufeln die Lippen der Ehebrecherin, und glatter als Öl ist ihr Gaumen; aber im Ergebnis ist sie bitter wie Wermut, scharf wie ein zweischneidiges Schwert. Ihre Füße steigen hinab zum Tod, an dem Scheol haften ihre Schritte. Damit sie nicht den Weg des Lebens einschlage, schwei- fen ihre Bahnen <ziellos dahin>, ohne dass sie es weiß. Nun denn, ihr Söhne, hört auf mich, und weichet nicht ab von den Worten mei- nes Mundes. Halte fern von ihr deinen Weg, und nahe nicht zu der Tür ihres Hauses: damit du nicht anderen deine Blüte gibst und deine Würde dem Grausamen; damit nicht Fremde sich sättigen an deinem Vermögen und dein mühsam Erworbenes nicht komme in eines Ausländers Haus; und du an deinem (Lebens)Ende nicht stöhnst, wenn dein Fleisch und dein Leib dahinschwinden, und sagst: Wie habe ich die Unterweisung gehasst, und mein Herz hat die Korrektur verschmäht! Und ich habe nicht gehört auf die Stimme meiner Unterweiser und mein Ohr nicht zugeneigt meinen Lehrern. Schnell war ich in richtig großen Schwierigkeiten, in- mitten der Versammlung und der Gemeinde. Trinke Wasser aus deiner Zisterne und Fließendes aus deinem Brunnen. Sollen nach außen sich ergießen deine Quellen, deine Wasserbäche auf die Stra- ßen? Dir allein sollen sie gehören, und nicht Fremden mit dir. Deine Quelle sei gesegnet, und erfreue dich an der Frau deiner Ju- gend; die liebliche Hirschkuh und anmutige Gämse - ihre Brüste mögen dich berauschen zu aller Zeit, taumle stets in ihrer Liebe. Und warum solltest du, mein Sohn, an einer Ehebrecherin taumeln und den Busen einer Fremden umarmen? Denn vor den Augen des HERRN sind eines jeden Wege, und alle seine Entscheidungen wägt er ab. Die eigenen Missetaten werden ihn, den Gesetzlosen, fangen, und in seiner Sünde Fesseln wird er festgehalten werden. Sterben wird er, weil ihm Zucht mangelt, und in der Größe seiner Torheit taumelt er dahin. Die Warnungen vor der Ehebrecherin in Sprüche 5, 6 und 7 zei- gen, dass menschliche Sexualität der vielleicht am meisten ange- fochtene Bereich der Ethik ist. Ob es sich um vorehelichen Sex, Ehe- bruch, den Umgang mit Prostituierten oder Kindesmissbrauch han- delt, die Liste der Verfehlungen ist lang und Salomo greift aus ihr den Fall heraus, der in der damaligen Zeit für einen jungen Mann die schlimmsten Folgen haben konnte : den Sex mit einer verheirate- ten Frau, deren Gemahl davon Wind bekommt. Vieles von dem, was Salomo dazu sagen wird, kommt uns ein wenig altmodisch, fast schon komisch vor, weil ein Ehebrecher heutzutage weder eine Be- strafung noch gesellschaftliche Ächtung zu fürchten hat. Wie soll man dann mit den Aussagen zum Ehebruch umgehen? Man sollte sie ernst nehmen! Auch wenn die Gesellschaft dem Ehebre- cher nicht mehr mit Härte begegnet, so gilt doch, dass Gott selbst „Hurer“ und „Ehebrecher“ richten wird (Hebräer 13,4). Ich glaube, dass Salomo Eltern einlädt, mit ihren Kindern nicht nur über die Probleme der Antike zu reden, sondern sich genau anzu- schauen, was in der Gesellschaft passiert (vgl. Sprüche 7,6) und die eigene Belehrung zum Thema „sexuelle Verführung“ und „Unzucht“ darauf abzustimmen . Welche Themen müssten Eltern heute mit ihren Kindern be- sprechen? Mag das von Salomo verwendete Beispiel auch nicht mehr der Mo- derne entsprechen, weil in seiner Zeit weder unverheiratete Mäd- chen noch sichere Verhütungsmittel zur Verfügung standen, so lassen sich doch bestimmte Prinzipien im Text erkennen, wie sexu- elle Verführung vorgeht und abgewehrt werden kann - Prinzipien, die wir unseren Kindern unbedingt mitgeben sollten .", "f": [{"n": "227", "t": "O. ziehe deinen Fuß zurück"}, {"n": "228", "t": "Die Textpassagen über die Ehebrecherin, lassen sich natürlich auch auf den Umgang mit einem Ehebrecher anwenden. Was fallartig am Beispiel einer verheirateten Verführe- rin dargestellt wird, die sich einen Liebhaber angelt, gilt ebenso für Frauenhelden (oder das unverheiratete Flittchen)."}, {"n": "229", "t": "Auch heute noch ist Ehebruch eine Sünde mit verheerenden Folgen. Ich möchte nicht so verstanden werden, als wäre Ehebruch heute weniger schlimm als damals."}, {"n": "230", "t": "Dabei sollte auch das Thema „Verführung von Frauen“ nicht zu kurz kommen. Wenn der Mann von der Ehebrecherin mit Erotik, Luxus und Ehrerbietung gefangen wird, so sind Frauen empfänglich für Komplimente, Zuhören und romantisches Werben. Männer und Frauen ticken in diesen Dingen sehr unterschiedlich!"}, {"n": "231", "t": "Die unverheiratete Frau war in eine Familie eingebunden und lebte nicht allein. War sie ungebunden und hatte sie gewollten Sex mit einem unverheirateten Mann, dann war die „Strafe“ die Heirat (5Mose 22,28.29; 1Korinther 7,9)."}, {"n": "232", "t": "Die wesentlichen Prinzipien im Text lauten: Rede die Wahrheit (Sprüche 5,2), glaube der Verführerin kein Wort (Sprüche 5,3; 6,24; 7,14-21), halte dich von ihr fern (Sprüche 5,8; 7,8.9), lass dich nicht durch ihre Schönheit fangen (Sprüche 6,25), kultiviere eine lei- denschaftliche Sexualität mit deiner Ehefrau (Sprüche 5,15.17-19), werde dir der verhee- renden Folgen bewusst (Sprüche 5,4.9.10.11.14.21; 6,29.32-35; 7,22.23.26.27) und stu- diere die Taktik der Femme fatale (Sprüche 7; s. dazu die Fußnote Sprüche 7,5)."}, {"n": "233", "t": "O. bewachen, bewahren"}, {"n": "234", "t": "O. bewachen, schützen"}]}, "Spr 4,27": {"k": "Gib acht auf die Bahn deines Fußes, und alle deine Wege seien gerade; biege nicht ab zur Rechten noch zur Linken, wende deinen Fuß weg vom Bösen. Weil die Augen geradeaus blicken, kann der Sohn auf die Bahn seines Fußes achtgeben. In Sprüche 1,15.16 warnt der Vater den Sohn vor dem falschen Pfad der Bösen. Die Betonung des Fußes zeigt, dass je- der Schritt wichtig ist. Damit ein Leben gerade verläuft, muss jeder einzelne Schritt (o. die meisten davon) passen. Manchmal genügt eine falsche Entscheidung, um ein Leben zu ruinieren. Das klingt vielleicht nicht fair, aber es entspricht der Realität. In Psalm 119,5 wünscht sich der Psalmist: „O dass meine Wege gerichtet wären, um deine Satzungen zu beobachten!“ Mit alle deine Wege sind die unter- schiedlichen Facetten meines Verhaltens gemeint. Im Leben soll es keine noch so kleine Abweichung zur Rechten oder zur Linken ge- ben. Im Bild des geraden Lebenswegs, der der väterlichen Unterwei- sung entspricht, soll der Sohn permanent darauf achten, ob sein Fuß in die gute Richtung geht, vom Bösen muss er sich mit allen Mitteln fernhalten. Mein Sohn, merke auf meine Weisheit, neige dein Ohr zu meiner Einsicht, um Besonnenheit zu beobachten, und damit deine Lip- pen Erkenntnis bewahren. Denn Honig träufeln die Lippen d hte nicht so verstanden werden, als wäre Ehebruch heute weniger schlimm als damals."}, {"n": "230", "t": "Dabei sollte auch das Thema „Verführung von Frauen“ nicht zu kurz kommen. Wenn der Mann von der Ehebrecherin mit Erotik, Luxus und Ehrerbietung gefangen wird, so sind Frauen empfänglich für Komplimente, Zuhören und romantisches Werben. Männer und Frauen ticken in diesen Dingen sehr unterschiedlich!"}, {"n": "231", "t": "Die unverheiratete Frau war in eine Familie eingebunden und lebte nicht allein. War sie ungebunden und hatte sie gewollten Sex mit einem unverheirateten Mann, dann war die „Strafe“ die Heirat (5Mose 22,28.29; 1Korinther 7,9)."}, {"n": "232", "t": "Die wesentlichen Prinzipien im Text lauten: Rede die Wahrheit (Sprüche 5,2), glaube der Verführerin kein Wort (Sprüche 5,3; 6,24; 7,14-21), halte dich von ihr fern (Sprüche 5,8; 7,8.9), lass dich nicht durch ihre Schönheit fangen (Sprüche 6,25), kultiviere eine lei- denschaftliche Sexualität mit deiner Ehefrau (Sprüche 5,15.17-19), werde dir der verhee- renden Folgen bewusst (Sprüche 5,4.9.10.11.14.21; 6,29.32-35; 7,22.23.26.27) und stu- diere die Taktik der Femme fatale (Sprüche 7; s. dazu die Fußnote Sprüche 7,5)."}, {"n": "233", "t": "O. bewachen, bewahren"}, {"n": "234", "t": "O. bewachen, schützen"}]}, "Spr 14,13": {"k": "Auch beim Lachen hat das Herz Kummer und das Ende der Fröhlichkeit ist Traurigkeit. Das Leben beginnt mit einem Schrei der Unzufriedenheit und endet mit dem Leid des Todes. Alles Lachen dazwischen trägt immer den Unterton von Kummer und Traurigkeit . Jede Party hat ein Ende. Und auch wenn der Gläubige sich ewiger Freude und gottgeschenkter Hoffnung sicher sein darf, so ist das Leben diesseits der Ewigkeit, was den Spaßfaktor angeht, eher nicht so toll! Im Himmel werden wir ungetrübte, andauernde Fröhlichkeit erleben, auf der Erde nicht. In unserer Spaßgesellschaft ist Trauer „out“. Wir wollen nicht wei- nen und tun alles dafür, uns behaglich einzurichten. Wir sind Meis- ter im Verdrängen und Wegschauen, aber Traurigkeit ist nichts Schlimmes , wenn sie uns in Gottes Nähe führt, wo wir Trost er- fahren (Matthäus 5,4), und wenn sie in uns Sehnsucht nach der Ewigkeit und Distanz zum Diesseits schafft. Ein von Gott erwecktes Herz ist immer auch ein Herz, das Verlorenheit und Kummer spürt (vgl. Daniel 9,3-19) und darauf mit Gebet antwortet. Worüber bist du gerade traurig und wie gehst du mit dem Ge- fühl der Traurigkeit um? Neigst du eher zum Verdrängen oder siehst du Kummer als Chance?", "f": [{"n": "608", "t": "Gemeint ist hier nicht nur der körperliche Tod, sondern natürlich auch der geistliche bzw. alle Vorstufen von beiden wie zerstörte Beziehungen, eine verpasste Berufung, ver- geudete Lebenszeit, Krankheiten usw. – eben alles, was unser Leben hier zerstört und auf das wir mittels kluger Lebensentscheidungen Einfluss haben."}, {"n": "609", "t": "Und wir sind dazu nur sehr begrenzt fähig (vgl. 1Korinther 4,3.4). Meist können wir nicht mehr als grobe Sünde erkennen!"}, {"n": "610", "t": "Der Prediger kann sogar schreiben: „Besser Verdruss als Lachen; denn bei traurigem Gesicht ist das Herz in rechter Verfassung! Das Herz der Weisen ist im Haus der Trauer, das Herz der Toren aber im Haus der Freude.“ (Prediger 7,3.4)"}, {"n": "611", "t": "Und wahrscheinlich weiß er auch, wie man mit schwierigen Gefühlen richtig umgeht (vgl. Psalm 43,5)."}]}, "Spr 18,14": {"k": "Der Geist eines Menschen erträgt seine Krankheit; aber ein angeschlagener Geist, wer richtet ihn auf? Die Antwort auf die Frage „Wer richtet ihn auf?“ lautet: „Niemand!“ oder „Jedenfalls ist es sehr schwer!“ Und genau das ist das Problem! Es ist relativ einfach, nur krank zu sein. Solange ich dabei meine Lust am Leben, mein Lachen und meine Zuversicht nicht verliere, kann ich eine solche Zeit gut ertragen. Ich werde die Krankheit nicht toll finden, vielleicht werde ich ein bisschen mit Gott hadern und viel Zeit im Gebet (oder im Bett) verbringen, aber das war es dann auch schon! Als Mensch hat Gott mir Lebensmut (= Geist ) gegeben, um mit schwierigen Zeiten vertrauensvoll umzugehen. Diese innere Zu- versicht, dass „alles“ wieder gut wird, lässt mich mutig nach vorne schauen und nicht verzweifeln. Ganz anders sieht es aus, wenn der Geist selbst angeschlagen ist. Wer seine Lebensfreude und den inneren Antrieb verloren hat, kann sich selbst nicht am eigenen Schopf aus dem Sumpf ziehen ! Hast du im Blick auf Depressive schon mal gedacht, „Die sollen sich nicht so anstellen!“ und die ganze Ausweglosigkeit ihrer Situation dabei völlig übersehen? Verlierst du manchmal deinen Lebensmut? Was tust du, um ihn wieder zu behalten ?", "f": [{"n": "770", "t": "S. Anmerkungen zu Sprüche 15,13"}, {"n": "771", "t": "W. Mannes"}, {"n": "772", "t": "Wir sprechen heute in diesem Zusammenhang von Depressionen. Wenn man Sprüche 18,14 auf Depressive anwendet, dann wird klar, dass sie sich selbst kaum helfen können. Sie sind auf Hilfe und Begleitung von außen angewiesen."}, {"n": "773", "t": "Mir persönlich ist mein Ruhetag in diesem Zusammenhang sehr wichtig geworden. Ein Tag in der Woche voller Schlaf, Genuss und einem Denkverbot, was Gemeindeprobleme angeht... super! Mir schenkt „mein Montag“ jede Woche neu Lebensfreude und „volle Ak- kus“."}, {"n": "774", "t": "Das gilt unabhängig vom IQ!"}]}, "Spr 19,3": {"k": "Die Narrheit des Menschen verdirbt seinen Weg, aber gegen den H grollt sein Herz. Der Dumme grollt gegen den H , wenn er eigentlich Buße über seine Narrheit tun sollte. Wer uneinsichtig ist und sich für den Größ- ten hält, muss irgendwann feststellen, dass er sich irrt, weil sein Le- ben nicht gelingt. Der Lebensweg eines Narren führt ins Verderben. Er erntet, was er sät. Aber beinahe noch schlimmer als ein kaputtes Leben ist die Reaktion des Narren auf die Folgen seiner Narrheit. Er macht nicht sich selbst für seine Dummheit Vorwürfe; weit davon entfernt, einsichtig zu sein oder Verantwortung zu übernehmen, ist sein Herz auf Gott wütend. Der Narr ist nie schuld! Es sind immer die anderen! Wenn ich schon nicht an Gott glaube oder mich an seine Gebote halte, mache ich ihn doch für mein Versagen verant- wortlich. Kann man noch dümmer sein? Warst du schon einmal sauer auf Gott, obwohl du eigentlich auf dich selbst hättest sauer sein müssen? Wann hast du das letzte Mal einen Fehler in deiner Lebensführung Gott in die Schuhe geschoben?", "f": [{"n": "799", "t": "Der Begriff meint weder den ganz nahen Freund noch den Schmarotzer und Kriecher (Obwohl sich der auch um den Reichen herum aufhält!). Im Blick ist der normale Freund, jemand, der mir sympathisch ist, oder mein Nachbar."}, {"n": "800", "t": "S. die Ausführungen zu Sprüche 14,20."}, {"n": "801", "t": "Ubi amici, ibdem opes."}, {"n": "802", "t": "Bei den Freunden in Lukas 16 wird im selben Vers die Hoffnung zum Ausdruck gebracht, dass sie uns in der Ewigkeit begrüßen werden, d.h. zum Glauben gekommen sind."}]}, "Spr 20,5": {"k": "<Wie> tiefes Wasser ist ein Ratschlag im Herzen des Man- nes, und ein verständiger Mann zieht ihn heraus. Ein guter Ratschlag ist nicht leicht zu bekommen. Er liegt im Herzen (= Denken) eines Menschen, aber er liegt dort wie in tiefem Wasser: unzugänglich, schwer zu bergen, versteckt. Es braucht einen ver- ständigen Mann, einen Weisen, um ihn heraus zu ziehen und ans Licht zu bringen. Es scheint so zu sein, dass die besten Ratschläge am meisten Weisheit brauchen, weil sie am Schwersten zu bergen sind. Ein wirklich guter Rat ist das Vorrecht eines wirklich klugen Ratgebers. Wen fragst du um Rat, wenn du einen Ratschlag brauchst? Ist dein Lieblingsratgeber ein „verständiger Mann“ (bzw. eine weise Frau)?", "f": [{"n": "838", "t": "S. Anmerkungen zu Sprüche 10,9."}]}, "Spr 20,6": {"k": "Die meisten Menschen verkünden ihr eigenes Gutsein, aber einen vertrauenswürdigen Mann, wer findet ihn? Dieser Spruch vergleicht nicht das Gutsein mit der Vertrauenswür- digkeit, sondern die ungeprüfte Behauptung, gut zu sein, mit dem Wert eines wahren Freundes, der sich auch in der Realität als ver- trauenswürdig heraus gestellt hat. Wir werden vor der allgegen- wärtigen Heuchelei und Selbsttäuschung gewarnt, die so normal für die meisten Menschen ist. Sie stellen sich in ein gutes Licht, aber ein wirklicher Gefährte, der ist schwer zu finden ( wer findet ihn? ). Man darf sich also bei der Auswahl seiner Freunde nicht von deren Wor- ten blenden lassen und sollte sich auf Enttäuschungen einstellen. Wenn du über dich selber sprichst, stimmt das, was du sagst? Hast du dich in letzter Zeit mit Worten besser gemacht als du bist?", "f": [{"n": "838", "t": "S. Anmerkungen zu Sprüche 10,9."}, {"n": "839", "t": "Und dieses Ausrichten an Gottes Gerechtigkeit darf nie damit verwechselt werden, dass ich unreflektiert christliche Verhaltensmuster meiner Gemeinderichtung übernehme. Der Gerechte will Gott gefallen, nicht den Gemeindenormen! Der Gerechte denkt nach und sucht für seine Familie das Beste! Der Gerechte ist kritisch, weil er um seine eigene Be- grenztheit weiß."}]}, "Spr 28,26": {"k": "Wer auf sein Denken vertraut, der ist ein Tor; wer aber in Weisheit wandelt, der wird gerettet. Jeder Mensch muss auf etwas vertrauen. Entweder auf sein eigenes Denken oder auf offenbarte Weisheit. Ich kann mir selbst einen Reim auf das Leben und die Moral machen oder ich kann auf den Wegen gehen, die Gott vorgibt. Wer auf sich vertraut, der ist ein Dummkopf. Wer auf Gott vertraut, der wird gerettet. Der Text sagt nicht genau, wovor der Weise gerettet wird, aber es kann sich dabei um die eigene Narrheit oder um göttliche Strafe handeln. Bei welchen Themen stehst du in der Gefahr, dein eigenes Den- ken über Gottes Weisheit zu stellen? Wo hat sich dein eigenes Denken schon einmal als Dummheit herausgestellt?", "f": [{"n": "1054", "t": "Wörtlich: Herz"}, {"n": "1055", "t": "Die wenigsten Menschen machen sich selbst Gedanken. Die meisten glauben, was alle glauben, weil es ihnen von den Medien vorgegeben wird. Sie folgen unkritisch dem Zeit- geist oder den Ideen ihrer Peergroup."}, {"n": "1056", "t": "Wörtlich: versteckt"}]}, "Spr 15,25": {"k": "Der HERR zerstört das Haus des Stolzen, aber er richtet die Grenze der Witwe auf. Wie in vielen Sprüchen steht das Haus hier für die Familie und damit für die Lebensumstände eines Menschen. Wer sich erhöht und Gott nicht ernst nimmt, der muss damit leben, dass der HERR sein Feind ist. Er wird das Haus des Stolzen zugrunde richten. Niemand kann auf Segen hoffen, der sich Gott überlegen fühlt. Die Witwe steht hier stellvertretend für alle Schwachen und Verletz- lichen. Ohne Schutz durch ihren Ehemann ist sie doch nicht ohne Versorgung, weil Gott sich um sie kümmert. Er richtet ihre Grenze auf. Aufgerichtet werden hier Grenzsteine, die den Grundbesitz be- grenzen und leicht verschoben werden können. Gott selbst sorgt da- für, dass die Witwe versorgt wird und nicht den Anschlägen von Be- trügern zum Opfer fällt. Achtung: Die Verantwortung für den Schutz der Schwachen liegt bei der Gesellschaft bzw. den Familien, zu denen sie gehören (5Mose 14,28.29; 24,17.19-21; Apostelgeschichte 6,1-6; 1Tim 5,3-15)! Wo gibt es in deiner Nähe eine „Witwe“, der du dienen könntest (z.B. im Haushalt helfen, besuchen, ermutigen...)?", "f": [{"n": "649", "t": "O. Vorteil, Raub, Habsucht"}, {"n": "650", "t": "I.S.v. er bringt Unheil über sein Haus (1Mose 34,30; Josua 6,18)"}, {"n": "651", "t": "Natürlich dürfen Missionare, Prediger, Älteste oder Arme Spenden annehmen. Das Wort Gottes gebietet sogar, sie zu unterstützen. Und doch ist es immer wieder wichtig zu sehen, ob (1) ein Geschenk die Qualität eines Bestechungsgeschenkes besitzt und ob es mir (2) in meinem Dienst nützlich ist, das Geschenk anzunehmen. Gerade solche, die von Spen- den leben, müssen sich vor Habsucht besonders schützen. Die Freude an einem Geldge- schenk darf sie nicht zu einem unbesonnen Umgang damit verleiten. Manchmal ist es bes- ser, ein Geldgeschenk abzulehnen und unabhängig zu bleiben bzw. keinen falschen Ein- druck zu hinte
